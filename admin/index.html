        if (stoic.frustration || stoic.reframe || stoic.opportunity) {
            document.getElementById('stoicSection').classList.add('expanded');
            document.getElementById('stoicContent').style.display = 'block';
        }

        // Carry-forward from previous day when loading an empty note
        let taskContent = data?.tasks || '';
        let notesContent = data?.notes || '';

        if (!data) {
            const prevDate = new Date(dailyNoteDate + 'T12:00:00');
            prevDate.setDate(prevDate.getDate() - 1);
            const prevDateStr = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}-${String(prevDate.getDate()).padStart(2,'0')}`;

            const { data: prevData } = await db
                .from('daily_notes')
                .select('tasks, notes, metadata')
                .eq('note_date', prevDateStr)
                .maybeSingle();

            if (prevData) {
                // Extract migrated tasks [>] from yesterday → become open tasks [ ] today
                if (prevData.tasks) {
                    const migratedTasks = prevData.tasks
                        .split('\n')
                        .filter(line => /^- \[>\]/.test(line.trim()))
                        .map(line => line.trim().replace(/^- \[>\]\s*/, '- [ ] '))
                        .join('\n');
                    if (migratedTasks) {
                        taskContent = '### Migrated from ' + prevDateStr + '\n' + migratedTasks;
                    }
                }

                // Extract context notes (~ prefixed) from yesterday's notes section
                if (prevData.notes) {
                    const contextLines = prevData.notes
                        .split('\n')
                        .filter(line => line.trim().startsWith('~'))
                        .map(line => line.trim())
                        .join('\n');
                    if (contextLines) {
                        notesContent = '### Context from ' + prevDateStr + '\n' + contextLines;
                    }
                }

                // Also carry forward context notes stored by AI review
                if (prevData.metadata?.context_notes) {
                    const aiContext = prevData.metadata.context_notes
                        .map(c => `~ **${c.meeting_title}:** ${c.context}`)
                        .join('\n');
                    if (aiContext) {
                        notesContent = (notesContent ? notesContent + '\n\n' : '') + aiContext;
                    }
                }
            }
        }

        // Clear loading and create editors with staggered init to avoid ProseMirror race condition
        document.getElementById('editorTasks').innerHTML = '';
        document.getElementById('editorNotes').innerHTML = '';

        destroyDailyEditors();

        dailyEditors.tasks = createEditor(
            document.getElementById('editorTasks'),
            'Add tasks... (try typing "- [ ] " for a checkbox)',
            taskContent
        );

        // Stagger second editor to avoid ProseMirror init race
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        dailyEditors.notes = createEditor(
            document.getElementById('editorNotes'),
            'Quick thoughts, ideas, observations...',
            notesContent
        );

        // Build toolbars
        buildToolbar('toolbarTasks', dailyEditors.tasks, 'tasks');

        await new Promise(r => requestAnimationFrame(r));

        buildToolbar('toolbarNotes', dailyEditors.notes);

        // Load meetings: first from saved data, then merge with calendar events
        await loadMeetingsWithCalendar(data);

        // Restore review results if this note was already reviewed
        if (data?.metadata?.last_reviewed) {
            const btn = document.getElementById('dailyReviewBtn');
            if (btn) {
                btn.textContent = 'Reviewed ✓';
                btn.classList.add('reviewed');
            }

            // Full review_data available (new format)
            if (data.metadata.review_data) {
                displayReviewResults({
                    review: data.metadata.review_data,
                    writes: data.metadata.review_writes || {},
                });
            } else {
                // Old format — reconstruct from available metadata
                const partialReview = {
                    review_summary: data.metadata.review_summary || '',
                    migrated_tasks: data.metadata.migrated_tasks || [],
                    context_notes: data.metadata.context_notes || [],
                };
                displayReviewResults({
                    review: partialReview,
                    writes: data.metadata.review_writes || {},
                });
            }
        }
    }

    async function loadMeetingsWithCalendar(data) {
        meetingCards = [];
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;
        container.innerHTML = '';

        // 1. Restore saved meeting cards
        const savedMeetings = [];
        if (data?.meetings) {
            let meetings = [];
            try {
                if (data.metadata?.meetings_structured) {
                    meetings = data.metadata.meetings_structured;
                }
            } catch {}

            if (meetings.length > 0) {
                meetings.forEach(m => {
                    savedMeetings.push({ title: m.title || '', notes: m.notes || '', time: m.time || '', fromCalendar: false });
                });
            } else {
                const md = data.meetings;
                const sections = md.split(/^## /gm).filter(s => s.trim());
                if (sections.length > 0 && md.includes('## ')) {
                    sections.forEach(section => {
                        const lines = section.split('\n');
                        const title = lines[0].trim();
                        const notes = lines.slice(1).join('\n').trim();
                        savedMeetings.push({ title, notes, fromCalendar: false });
                    });
                } else if (md.trim()) {
                    savedMeetings.push({ title: '', notes: md, fromCalendar: false });
                }
            }
        }

        // 2. Fetch calendar events from Supabase (synced by capture-bot on Railway)
        let calendarEvents = [];
        try {
            const { data: calData } = await db
                .from('calendar_events')
                .select('*')
                .eq('event_date', dailyNoteDate)
                .order('start_time', { ascending: true });

            if (calData && calData.length > 0) {
                calendarEvents = calData.map(e => ({
                    uid: e.uid,
                    title: e.title,
                    startTime: e.start_time,
                    endTime: e.end_time,
                    allDay: e.all_day,
                    location: e.location,
                    organizer: e.organizer,
                    attendees: e.attendees || [],
                }));
                // Calendar events loaded for date
            }
        } catch (err) {
            console.warn('Calendar fetch failed:', err);
        }

        // 3. Create cards for saved meetings (collapsed by default)
        for (const m of savedMeetings) {
            await addMeetingCard(m.title, m.notes, { time: m.time || '' });
        }

        // 4. Add calendar events that don't already have a matching card
        const existingTitles = new Set(savedMeetings.map(m => m.title.toLowerCase().trim()));

        // Merge calendar events with saved meetings

        for (const evt of calendarEvents) {
            const title = evt.title || '';
            // Skip if we already have a card with a similar title
            if (existingTitles.has(title.toLowerCase().trim())) continue;

            // Build time string for header
            let timeStr = '';
            if (evt.startTime && evt.endTime) {
                timeStr = `${evt.startTime}-${evt.endTime}`;
            } else if (evt.startTime) {
                timeStr = evt.startTime;
            } else if (evt.allDay) {
                timeStr = 'All day';
            }

            // Build pre-populated note with meeting details
            let prefill = '';
            if (evt.location) {
                prefill += `*${evt.location}*\n\n`;
            }
            if (evt.attendees && evt.attendees.length > 0) {
                prefill += `Attendees: ${evt.attendees.slice(0, 8).join(', ')}\n\n`;
            }

            await addMeetingCard(title, prefill, { time: timeStr });
            existingTitles.add(title.toLowerCase().trim());
        }

    }

    function addMeetingCard(title, content, options = {}) {
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return Promise.resolve();

        const id = ++meetingIdCounter;
        const startExpanded = options.expanded || false;
        const timeStr = options.time || '';
        const hasContent = !!(content && content.trim());

        const cardEl = document.createElement('div');
        cardEl.className = 'meeting-card' + (startExpanded ? ' expanded' : '');
        cardEl.id = `meeting-card-${id}`;

        const safeTitle = (title || '').replace(/"/g, '&quot;');

        const safeTime = (timeStr || '').replace(/"/g, '&quot;');

        cardEl.innerHTML = `
            <div class="meeting-card-header" data-meeting-id="${id}">
                <span class="meeting-card-chevron">&#x25B8;</span>
                ${timeStr ? `<span class="meeting-card-time">${timeStr}</span>` : ''}
                <span class="meeting-card-title-display">${title || 'Untitled Meeting'}</span>
                <span class="meeting-card-indicator ${hasContent ? 'has-notes' : ''}" id="meetingIndicator-${id}">\u25CF</span>
                <div class="meeting-card-move-btns">
                    <button class="meeting-move-btn" data-dir="up" data-meeting-id="${id}" title="Move up">\u25B2</button>
                    <button class="meeting-move-btn" data-dir="down" data-meeting-id="${id}" title="Move down">\u25BC</button>
                </div>
                <button class="meeting-card-remove" data-meeting-id="${id}" title="Remove meeting">\u00d7</button>
            </div>
            <div class="meeting-card-expanded-content">
                <div class="meeting-card-meta-row">
                    <input type="text" class="meeting-card-title-input" placeholder="Meeting title..." value="${safeTitle}" data-meeting-id="${id}">
                    <input type="text" class="meeting-card-time-input" placeholder="e.g. 09:00-10:00" value="${safeTime}" data-meeting-id="${id}">
                </div>
                <div class="daily-toolbar" id="meetingToolbar-${id}"></div>
                <div class="daily-editor-wrap" id="meetingEditor-${id}"></div>
            </div>
        `;

        // Manually added cards go to top, loaded/calendar cards go to bottom
        if (startExpanded) {
            container.prepend(cardEl);
        } else {
            container.appendChild(cardEl);
        }

        // Wire header click to toggle (ignore clicks on buttons)
        cardEl.querySelector('.meeting-card-header').addEventListener('click', (e) => {
            if (e.target.closest('.meeting-card-remove') || e.target.closest('.meeting-move-btn')) return;
            toggleMeetingCard(id);
        });

        // Wire remove button
        cardEl.querySelector('.meeting-card-remove').onclick = (e) => {
            e.stopPropagation();
            removeMeetingCard(id);
        };

        // Wire move buttons
        cardEl.querySelectorAll('.meeting-move-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                moveMeetingCard(id, btn.dataset.dir);
            });
        });

        // Wire title input to update display title and trigger save
        cardEl.querySelector('.meeting-card-title-input').addEventListener('input', (e) => {
            const displayEl = cardEl.querySelector('.meeting-card-title-display');
            if (displayEl) displayEl.textContent = e.target.value || 'Untitled Meeting';
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Wire time input to update header time and trigger save
        cardEl.querySelector('.meeting-card-time-input').addEventListener('input', (e) => {
            const headerTimeEl = cardEl.querySelector('.meeting-card-time');
            const mc = meetingCards.find(m => m.id === id);
            if (mc) mc.time = e.target.value.trim();
            if (headerTimeEl) {
                headerTimeEl.textContent = e.target.value.trim();
            } else if (e.target.value.trim()) {
                // Add time span to header if it didn't have one
                const chevron = cardEl.querySelector('.meeting-card-chevron');
                if (chevron) {
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'meeting-card-time';
                    timeSpan.textContent = e.target.value.trim();
                    chevron.after(timeSpan);
                }
            }
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Store card reference (editor created lazily on first expand)
        if (startExpanded) {
            meetingCards.unshift({ id, editor: null, content: content || '', time: timeStr });
        } else {
            meetingCards.push({ id, editor: null, content: content || '', time: timeStr });
        }

        // If starting expanded, init editor immediately
        if (startExpanded) {
            return initMeetingEditor(id);
        }
        return Promise.resolve();
    }

    function toggleMeetingCard(id) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (!cardEl) return;

        const isExpanded = cardEl.classList.toggle('expanded');

        if (isExpanded) {
            // Lazy init editor on first expand
            const mc = meetingCards.find(m => m.id === id);
            if (mc && !mc.editor) {
                initMeetingEditor(id);
            }
        } else {
            // Update has-notes indicator when collapsing
            updateMeetingIndicator(id);
        }
    }

    function initMeetingEditor(id) {
        return new Promise(resolve => {
            requestAnimationFrame(() => {
                const editorEl = document.getElementById(`meetingEditor-${id}`);
                if (!editorEl) { resolve(); return; }

                const mc = meetingCards.find(m => m.id === id);
                if (!mc || mc.editor) { resolve(); return; }

                const editor = createEditor(editorEl, 'Meeting notes...', mc.content || '');
                mc.editor = editor;

                requestAnimationFrame(() => {
                    buildToolbar(`meetingToolbar-${id}`, editor);
                    resolve();
                });
            });
        });
    }

    function updateMeetingIndicator(id) {
        const mc = meetingCards.find(m => m.id === id);
        const indicator = document.getElementById(`meetingIndicator-${id}`);
        if (!mc || !indicator) return;

        const hasNotes = mc.editor ? !!(getEditorMarkdown(mc.editor).trim()) : !!(mc.content && mc.content.trim());
        indicator.classList.toggle('has-notes', hasNotes);
    }

    function moveMeetingCard(id, direction) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        const container = document.getElementById('meetingCardsContainer');
        if (!cardEl || !container) return;

        if (direction === 'up' && cardEl.previousElementSibling) {
            container.insertBefore(cardEl, cardEl.previousElementSibling);
        } else if (direction === 'down' && cardEl.nextElementSibling) {
            container.insertBefore(cardEl, cardEl.nextElementSibling.nextSibling);
        } else {
            return; // Can't move further
        }

        // Sync the meetingCards array to match new DOM order
        const newOrder = [];
        container.querySelectorAll('.meeting-card').forEach(el => {
            const idMatch = el.id.match(/meeting-card-(\d+)/);
            if (idMatch) {
                const mcId = parseInt(idMatch[1]);
                const mc = meetingCards.find(m => m.id === mcId);
                if (mc) newOrder.push(mc);
            }
        });
        meetingCards = newOrder;
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function removeMeetingCard(id) {
        const idx = meetingCards.findIndex(mc => mc.id === id);
        if (idx !== -1) {
            meetingCards[idx].editor?.destroy();
            meetingCards.splice(idx, 1);
        }
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (cardEl) cardEl.remove();
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function getMeetingsData() {
        // Collect structured meeting data
        const structured = meetingCards.map(mc => {
            const titleEl = document.querySelector(`.meeting-card-title-input[data-meeting-id="${mc.id}"]`);
            const notes = mc.editor ? getEditorMarkdown(mc.editor) : (mc.content || '');
            return {
                title: titleEl?.value?.trim() || '',
                notes: notes,
                time: mc.time || '',
            };
        }).filter(m => m.title || m.notes);

        // Also build a combined markdown string for the meetings column (backward compatible)
        const markdown = structured.map(m => {
            const heading = m.title ? `## ${m.title}\n\n` : '';
            return heading + m.notes;
        }).join('\n\n---\n\n');

        return { markdown, structured };
    }

    function buildToolbar(containerId, editor, mode = 'full') {
        const container = document.getElementById(containerId);
        if (!container || !editor) return;

        const allButtons = {
            bold: { label: 'B', cmd: () => editor.chain().focus().toggleBold().run(), active: () => editor.isActive('bold'), title: 'Bold (Cmd+B)' },
            italic: { label: 'I', cmd: () => editor.chain().focus().toggleItalic().run(), active: () => editor.isActive('italic'), title: 'Italic (Cmd+I)' },
            h1: { label: 'H1', cmd: () => editor.chain().focus().toggleHeading({ level: 1 }).run(), active: () => editor.isActive('heading', { level: 1 }), title: 'Heading 1' },
            h2: { label: 'H2', cmd: () => editor.chain().focus().toggleHeading({ level: 2 }).run(), active: () => editor.isActive('heading', { level: 2 }), title: 'Heading 2' },
            h3: { label: 'H3', cmd: () => editor.chain().focus().toggleHeading({ level: 3 }).run(), active: () => editor.isActive('heading', { level: 3 }), title: 'Heading 3' },
            bullet: { label: '\u2022', cmd: () => editor.chain().focus().toggleBulletList().run(), active: () => editor.isActive('bulletList'), title: 'Bullet list' },
            ordered: { label: '1.', cmd: () => editor.chain().focus().toggleOrderedList().run(), active: () => editor.isActive('orderedList'), title: 'Numbered list' },
            task: { label: '\u2610', cmd: () => editor.chain().focus().toggleTaskList().run(), active: () => editor.isActive('taskList'), title: 'Task list' },
            quote: { label: '\u275D', cmd: () => editor.chain().focus().toggleBlockquote().run(), active: () => editor.isActive('blockquote'), title: 'Quote' },
            sep: { type: 'sep' },
        };

        const layouts = {
            tasks: [allButtons.task, allButtons.sep, allButtons.bold, allButtons.italic],
            full: [allButtons.bold, allButtons.italic, allButtons.sep, allButtons.h1, allButtons.h2, allButtons.h3, allButtons.sep, allButtons.bullet, allButtons.ordered, allButtons.task, allButtons.quote],
        };

        const buttons = layouts[mode] || layouts.full;

        container.innerHTML = buttons.map((b, i) =>
            b.type === 'sep'
                ? '<span class="daily-toolbar-sep"></span>'
                : `<button title="${b.title}" data-idx="${i}">${b.label}</button>`
        ).join('');

        container.querySelectorAll('button[data-idx]').forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.cmd) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    b.cmd();
                });
            }
        });

        editor.on('selectionUpdate', () => updateToolbarActive(container, buttons));
        editor.on('update', () => updateToolbarActive(container, buttons));
    }

    function updateToolbarActive(container, buttons) {
        const btns = container.querySelectorAll('button[data-idx]');
        btns.forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.active) btn.classList.toggle('is-active', b.active());
        });
    }

    function scheduleDailySave() {
        dailyIsDirty = true;
        if (dailySaveTimer) clearTimeout(dailySaveTimer);
        dailySaveTimer = setTimeout(saveDailyNote, 1000);
    }

    async function saveDailyNote() {
        if (!dailyNoteDate) return;

        updateSaveStatus('saving');

        const meetingsData = getMeetingsData();

        const payload = {
            note_date: dailyNoteDate,
            tasks: getEditorMarkdown(dailyEditors.tasks),
            notes: getEditorMarkdown(dailyEditors.notes),
            meetings: meetingsData.markdown,
            metadata: {
                meetings_structured: meetingsData.structured,
                stoic_challenge: {
                    frustration: document.getElementById('stoicFrustration')?.value || '',
                    reframe: document.getElementById('stoicReframe')?.value || '',
                    opportunity: document.getElementById('stoicOpportunity')?.value || '',
                },
            },
        };

        try {
            const res = await fetch('/api/daily-notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error(await res.text());

            const result = await res.json();
            dailyNoteId = result.daily_note?.id || dailyNoteId;
            dailyIsDirty = false;
            updateSaveStatus('saved');
        } catch (err) {
            updateSaveStatus('error', 'save failed — retry in 5s');
            console.error('Daily note save failed:', err);
            // Auto-retry once after 5 seconds
            setTimeout(() => { if (dailyIsDirty) saveDailyNote(); }, 5000);
        }
    }

    async function runDailyReview() {
        if (!dailyNoteDate) return;

        const btn = document.getElementById('dailyReviewBtn');
        if (!btn || btn.classList.contains('reviewing')) return;

        // Save current note first
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            await saveDailyNote();
        }

        btn.textContent = 'Reviewing...';
        btn.classList.add('reviewing');

        try {
            const res = await fetch('/api/daily-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ note_date: dailyNoteDate }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: 'Unknown error' }));
                throw new Error(err.detail || err.error || 'Review failed');
            }

            const result = await res.json();
            btn.textContent = 'Reviewed ✓';
            btn.classList.remove('reviewing');
            btn.classList.add('reviewed');

            // Display results
            displayReviewResults(result);

        } catch (err) {
            btn.textContent = 'Review Day';
            btn.classList.remove('reviewing');
            console.error('Daily review failed:', err);
            alert('Review failed: ' + err.message);
        }
    }

    // ─── Articles ─────────────────────────────────────────────
    async function fetchArticles() {
        const f = articleFilters;
        const from = (f.page - 1) * ARTICLES_PER_PAGE;
        const to = from + ARTICLES_PER_PAGE - 1;

        let query = db.from('content')
            .select('id, title, url, source, author, tags, status, captured_at, body, metadata', { count: 'exact' })
            .eq('type', 'article')
            .order('captured_at', { ascending: false })
            .range(from, to);

        if (f.status) query = query.eq('status', f.status);
        if (f.source) query = query.eq('source', f.source);
        if (f.tag) query = query.contains('tags', [f.tag]);
        if (f.dateRange) {
            const d = new Date();
            d.setDate(d.getDate() - f.dateRange);
            query = query.gte('captured_at', d.toISOString());
        }

        const { data, count, error } = await query;
        return { data, count, error };
    }

    async function loadArticleFilterOptions() {
        if (articleSources.length && articleTopTags.length) return;

        // Fetch unique sources
        const { data: srcData } = await db.from('content')
            .select('source')
            .eq('type', 'article')
            .not('source', 'is', null)
            .order('source');
        const srcSet = new Set();
        (srcData || []).forEach(r => { if (r.source) srcSet.add(r.source); });
        articleSources = [...srcSet].sort();

        // Fetch top tags via all articles' tags arrays
        const { data: tagData } = await db.from('content')
            .select('tags')
            .eq('type', 'article')
            .not('tags', 'is', null);
        const tagCounts = {};
        (tagData || []).forEach(r => (r.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
        articleTopTags = Object.entries(tagCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 30)
            .map(([tag, count]) => ({ tag, count }));
    }

    function populateArticleDropdowns() {
        const srcSel = document.getElementById('articleSourceFilter');
        const tagSel = document.getElementById('articleTagFilter');
        if (!srcSel || !tagSel) return;

        srcSel.innerHTML = '<option value="">All sources</option>' +
            articleSources.map(s => `<option value="${esc(s)}"${articleFilters.source === s ? ' selected' : ''}>${esc(s)}</option>`).join('');
        tagSel.innerHTML = '<option value="">All tags</option>' +
            articleTopTags.map(t => `<option value="${esc(t.tag)}"${articleFilters.tag === t.tag ? ' selected' : ''}>${esc(t.tag)} (${t.count})</option>`).join('');
    }

    function updateArticlesCount() {
        const el = document.getElementById('articlesCount');
        if (!el) return;
        if (articlesTotalCount === 0) { el.textContent = 'No articles'; return; }
        const from = (articleFilters.page - 1) * ARTICLES_PER_PAGE + 1;
        const to = Math.min(articleFilters.page * ARTICLES_PER_PAGE, articlesTotalCount);
        el.textContent = `Showing ${from}\u2013${to} of ${articlesTotalCount}`;
    }

    function updatePagination(totalPages) {
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        const info = document.getElementById('articlePageInfo');
        if (!prev || !next || !info) return;
        prev.disabled = articleFilters.page <= 1;
        next.disabled = articleFilters.page >= totalPages;
        info.textContent = totalPages > 0 ? `Page ${articleFilters.page} of ${totalPages}` : '';
    }

    async function reloadArticles() {
        const tbody = document.getElementById('articlesBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading...</td></tr>';

        const { data, count, error } = await fetchArticles();
        if (error) {
            if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--red)">Error: ${esc(error.message)}</td></tr>`;
            return;
        }

        articlesData = data || [];
        articlesTotalCount = count || 0;
        const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);

        renderArticleRows(articlesData);
        updateArticlesCount();
        updatePagination(totalPages);
    }

    function wireArticleFilterEvents() {
        // Status buttons
        document.querySelectorAll('.article-status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-status-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.status = btn.dataset.status || null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Date range buttons
        document.querySelectorAll('.article-date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.dateRange = btn.dataset.days ? parseInt(btn.dataset.days) : null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Source dropdown
        const srcSel = document.getElementById('articleSourceFilter');
        if (srcSel) srcSel.addEventListener('change', () => {
            articleFilters.source = srcSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Tag dropdown
        const tagSel = document.getElementById('articleTagFilter');
        if (tagSel) tagSel.addEventListener('change', () => {
            articleFilters.tag = tagSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Pagination
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        if (prev) prev.addEventListener('click', () => { if (articleFilters.page > 1) { articleFilters.page--; reloadArticles(); } });
        if (next) next.addEventListener('click', () => {
            const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);
            if (articleFilters.page < totalPages) { articleFilters.page++; reloadArticles(); }
        });

        // Client-side search on current page
        const search = document.getElementById('searchArticles');
        if (search) search.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            if (!q) { renderArticleRows(articlesData); return; }
            const filtered = articlesData.filter(a =>
                a.title.toLowerCase().includes(q) ||
                (a.source || '').toLowerCase().includes(q) ||
                (a.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderArticleRows(filtered);
        });
    }

        articlesTotalCount = result.count || 0;
        const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);

        const statusAll = !articleFilters.status;
        const dateAll = !articleFilters.dateRange;

        main.innerHTML = `

                    <button class="filter-btn article-date-btn${articleFilters.dateRange === 30 ? ' active' : ''}" data-days="30">30d</button>
                    <button class="filter-btn article-date-btn${articleFilters.dateRange === 90 ? ' active' : ''}" data-days="90">90d</button>
                </div>
                <select class="filter-select" id="articleSourceFilter"><option value="">All sources</option></select>
                <select class="filter-select" id="articleTagFilter"><option value="">All tags</option></select>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Source</th>
                            <th>Tags</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="articlesBody"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="articlePrev" disabled>&larr; Prev</button>
                <span class="pagination-info" id="articlePageInfo"></span>
                <button id="articleNext"${totalPages <= 1 ? ' disabled' : ''}>Next &rarr;</button>
            </div>
        `;

        populateArticleDropdowns();
        renderArticleRows(articlesData);
        updateArticlesCount();
        updatePagination(totalPages);
        wireArticleFilterEvents();

        });

        document.getElementById('searchFeedItems').addEventListener('input', render);
        render();

    async function openCompanyModal(company) {
        const isNew = !company;
        if (isNew) company = { name: '', type: 'other', industry: '', website: '', notes: '', tags: [] };

        document.getElementById('contentModalTitle').textContent = isNew ? 'New Company' : 'Edit Company';
        document.getElementById('contentModalMeta').innerHTML = '';
        document.querySelector('.content-modal-scroll').scrollTop = 0;
        document.body.classList.add('content-open');

        const types = ['competitor', 'customer', 'partner', 'vendor', 'internal', 'other'];

        // Fetch people at this company
        let peopleHtml = '';
        if (!isNew) {
            const { data: compPeople } = await db
                .from('people')
                .select('id, name, role')
                .eq('company_id', company.id)
                .order('name');
            if (compPeople && compPeople.length) {
                peopleHtml = `<div class="section-heading">People (${compPeople.length})</div>
                    ${compPeople.map(p => `<div class="log-entry"><div class="log-body"><strong>${esc(p.name)}</strong>${p.role ? ` — ${esc(p.role)}` : ''}</div></div>`).join('')}`;
            }
        }

        document.getElementById('contentModalBody').innerHTML = `
            <div class="modal-edit-field">
                <div class="modal-edit-label">Name</div>
                <input class="modal-edit-input" id="editCompanyName" value="${esc(company.name)}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Type</div>
                <select class="modal-edit-input" id="editCompanyType">
                    ${types.map(t => `<option value="${t}" ${company.type === t ? 'selected' : ''}>${t.charAt(0).toUpperCase() + t.slice(1)}</option>`).join('')}
                </select>
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Industry</div>
                <input class="modal-edit-input" id="editCompanyIndustry" value="${esc(company.industry || '')}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Website</div>
                <input class="modal-edit-input" id="editCompanyWebsite" value="${esc(company.website || '')}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Notes</div>
                <textarea class="stoic-input" id="editCompanyNotes" rows="4">${esc(company.notes || '')}</textarea>
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Tags</div>
                ${buildEntityTagEditor(company.tags || [], 'company')}
            </div>
            <div class="modal-actions">
                <button class="modal-save-btn" id="saveCompanyBtn">${isNew ? 'Create' : 'Save'}</button>
                <span class="modal-save-status" id="companySaveStatus"></span>
            </div>
            ${peopleHtml}
        `;

        wireEntityTagEditor('company');

        document.getElementById('saveCompanyBtn').addEventListener('click', async () => {
            const status = document.getElementById('companySaveStatus');
            status.textContent = 'saving...';
            status.className = 'modal-save-status saving';

            const updates = {
                name: document.getElementById('editCompanyName').value.trim(),
                type: document.getElementById('editCompanyType').value,
                industry: document.getElementById('editCompanyIndustry').value.trim(),
                website: document.getElementById('editCompanyWebsite').value.trim(),
                notes: document.getElementById('editCompanyNotes').value.trim(),
                tags: getEntityTags('company'),
            };

            try {
                if (isNew) {
                    const res = await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'companies', entry: updates }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                } else {
                    const res = await fetch('/api/entity-update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'companies', id: company.id, updates }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    Object.assign(company, updates);
                }
                status.textContent = 'saved';
                status.className = 'modal-save-status saved';
                setTimeout(() => { status.textContent = ''; }, 1500);
                loadCompanies();
                loadCounts();
            } catch (err) {
                status.textContent = 'failed';
                status.className = 'modal-save-status error';
                console.error('Company save failed:', err);
            }
        });
    }

    function formatSummaryPeriod(s) {
        if (s.type === 'monthly') {
            const d = new Date(s.period_start + 'T12:00:00');
            return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
        }
        // Weekly / support
        const start = new Date(s.period_start + 'T12:00:00');
        const end = new Date(s.period_end + 'T12:00:00');
        const startDay = start.getDate();
        const endDay = end.getDate();
        const mon = start.toLocaleDateString('en-GB', { month: 'short' });
        const yr = start.getFullYear();
        return `Week of ${startDay}-${endDay} ${mon} ${yr}`;
    }

    function summaryPreview(content) {
        if (!content) return '';
        // Get first meaningful line after headings
        const lines = content.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        const first = lines[0] || '';
        return first.replace(/^\*\*|\*\*$/g, '').replace(/^- /, '').substring(0, 80);
    }

    // ─── Generate Summary ────────────────────────────────────

    function showGenerateForm(e, preType, preStart, preEnd) {
        const form = document.getElementById('summaryGenerateForm');
        if (!form) return;

        // Default to most recent complete week
        const now = new Date();
        const dayOfWeek = now.getDay();
        const lastFriday = new Date(now);
        lastFriday.setDate(now.getDate() - ((dayOfWeek + 2) % 7) - 0);
        const lastMonday = new Date(lastFriday);
        lastMonday.setDate(lastFriday.getDate() - 4);

        const defaultStart = preStart || lastMonday.toISOString().split('T')[0];
        const defaultEnd = preEnd || lastFriday.toISOString().split('T')[0];

        form.style.display = 'block';
        form.innerHTML = `
            <div class="generate-form">
                <div class="generate-form-row">
                    <label>Type:
                        <select id="genType">
                            <option value="weekly"${(preType || 'weekly') === 'weekly' ? ' selected' : ''}>Weekly</option>
                            <option value="monthly"${preType === 'monthly' ? ' selected' : ''}>Monthly</option>
                        </select>
                    </label>
                    <label>Start: <input type="date" id="genStart" value="${defaultStart}"></label>
                    <label>End: <input type="date" id="genEnd" value="${defaultEnd}"></label>
                    <button class="btn-action" id="btnDoGenerate">Generate</button>
                    <button class="btn-action btn-secondary" id="btnCancelGenerate">Cancel</button>
                </div>
                <div id="genStatus" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);"></div>
            </div>
        `;

        // Auto-adjust dates when type changes
        document.getElementById('genType').addEventListener('change', (e) => {
            if (e.target.value === 'monthly') {
                const d = new Date();
                d.setMonth(d.getMonth() - 1);
                const y = d.getFullYear();
                const m = d.getMonth();
                document.getElementById('genStart').value = `${y}-${String(m + 1).padStart(2, '0')}-01`;
                const lastDay = new Date(y, m + 1, 0).getDate();
                document.getElementById('genEnd').value = `${y}-${String(m + 1).padStart(2, '0')}-${lastDay}`;
            }
        });

        document.getElementById('btnDoGenerate').addEventListener('click', doGenerateSummary);
        document.getElementById('btnCancelGenerate').addEventListener('click', () => {
            form.style.display = 'none';
        });
    }

    async function doGenerateSummary() {
        const type = document.getElementById('genType').value;
        const periodStart = document.getElementById('genStart').value;
        const periodEnd = document.getElementById('genEnd').value;
        const status = document.getElementById('genStatus');
        const btn = document.getElementById('btnDoGenerate');

        if (!periodStart || !periodEnd) {
            status.textContent = 'Please select start and end dates.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Gathering data...';
        status.textContent = 'Querying Supabase for period data...';

        let contextData;
        try {
            if (type === 'monthly') {
                contextData = await gatherMonthlyData(periodStart, periodEnd);
            } else {
                contextData = await gatherWeeklyData(periodStart, periodEnd);
            }
        } catch (err) {
            status.textContent = `Error gathering data: ${err.message}`;
            btn.disabled = false;
            btn.textContent = 'Generate';
            return;
        }

        if (contextData.length < 100) {
            status.textContent = 'Not enough data found for this period. Check the date range.';
            btn.disabled = false;
            btn.textContent = 'Generate';
            return;
        }

        btn.textContent = 'Generating with AI...';
        status.textContent = `Sending ${contextData.length} chars to Claude...`;

        try {
            const res = await fetch('/api/generate-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type,
                    period_start: periodStart,
                    period_end: periodEnd,
                    context_data: contextData,
                }),
            });

            const result = await res.json();
            if (!res.ok || !result.ok) {
                status.textContent = `Error: ${result.error || 'Unknown error'} — ${result.detail || ''}`;
                btn.disabled = false;
                btn.textContent = 'Generate';
                return;
            }

            // Refresh list and open the new summary
            status.textContent = 'Done!';
            form.style.display = 'none';
            await loadSummaries();
            const newItem = summariesData.find(s => s.period_start === periodStart && s.type === type);
            if (newItem) openSummaryDetail(newItem);
        } catch (err) {
            status.textContent = `Error: ${err.message}`;
            btn.disabled = false;
            btn.textContent = 'Generate';
        }
    }

    async function gatherWeeklyData(startDate, endDate) {
        const [notesRes, peopleLogRes, evidenceRes, decisionsRes, projectsRes, reflectionsRes, calendarRes] = await Promise.all([
            db.from('daily_notes')
                .select('note_date, tasks, notes, meetings, metadata')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('people_log')
                .select('note_date, entry, person_id, people(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('product_evidence')
                .select('note_date, evidence, evidence_type, product_id, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('product_decisions')
                .select('note_date, decision, context, product_id, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('project_updates')
                .select('note_date, update_text, project_id, projects(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('reflections_log')
                .select('note_date, observation, coach_perspective, category')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('calendar_events')
                .select('event_date, title, start_time, end_time, attendees')
                .gte('event_date', startDate)
                .lte('event_date', endDate)
                .order('start_time'),
        ]);

        const notes = notesRes.data || [];
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        let md = `## Week: ${startDate} to ${endDate}\n\n`;

        // Daily notes by day
        for (const note of notes) {
            const d = new Date(note.note_date + 'T12:00:00');
            md += `### ${dayNames[d.getDay()]} ${note.note_date}\n\n`;

            if (note.metadata?.review_summary) {
                md += `#### Daily Review Summary\n${note.metadata.review_summary}\n\n`;
            }
            if (note.tasks) md += `#### Tasks\n${note.tasks}\n\n`;
            if (note.notes) md += `#### Notes\n${note.notes}\n\n`;
            if (note.meetings) md += `#### Meetings\n${note.meetings}\n\n`;

            // Calendar events for this day
            const dayEvents = (calendarRes.data || []).filter(e => e.event_date === note.note_date);
            if (dayEvents.length) {
                md += `#### Calendar\n`;
                for (const ev of dayEvents) {
                    const time = ev.start_time ? `(${ev.start_time}${ev.end_time ? '-' + ev.end_time : ''})` : '';
                    const attendeeList = (ev.attendees || []).slice(0, 10).join(', ');
                    md += `- **${ev.title}** ${time}${attendeeList ? ' — ' + attendeeList : ''}\n`;
                }
                md += '\n';
            }
        }

        // People interactions
        const peopleLog = peopleLogRes.data || [];
        if (peopleLog.length) {
            md += `### People Interactions This Week\n`;
            const byPerson = {};
            for (const p of peopleLog) {
                const name = p.people?.name || 'Unknown';
                if (!byPerson[name]) byPerson[name] = [];
                byPerson[name].push(`${p.note_date}: ${p.entry}`);
            }
            for (const [name, entries] of Object.entries(byPerson)) {
                md += `#### ${name}\n`;
                entries.forEach(e => { md += `- ${e}\n`; });
                md += '\n';
            }
        }

        // Product evidence
        const evidence = evidenceRes.data || [];
        if (evidence.length) {
            md += `### Product Evidence This Week\n`;
            for (const e of evidence) {
                md += `- **${e.products?.name || 'Unknown'}** (${e.evidence_type}): ${e.evidence}\n`;
            }
            md += '\n';
        }

        // Decisions
        const decisions = decisionsRes.data || [];
        if (decisions.length) {
            md += `### Decisions This Week\n`;
            for (const d of decisions) {
                md += `- **${d.products?.name || 'Unknown'}** (${d.note_date}): ${d.decision}${d.context ? ' — ' + d.context : ''}\n`;
            }
            md += '\n';
        }

        // Project updates
        const projects = projectsRes.data || [];
        if (projects.length) {
            md += `### Project Updates\n`;
            for (const p of projects) {
                md += `- **${p.projects?.name || 'Unknown'}** (${p.note_date}): ${p.update_text}\n`;
            }
            md += '\n';
        }

        // Reflections
        const reflections = reflectionsRes.data || [];
        if (reflections.length) {
            md += `### Reflections\n`;
            for (const r of reflections) {
                md += `- **${r.category || 'leadership'}** (${r.note_date}): ${r.observation}\n`;
                if (r.coach_perspective) md += `  _Coach: ${r.coach_perspective}_\n`;
            }
            md += '\n';
        }

        return md;
    }

    async function gatherMonthlyData(startDate, endDate) {
        // Try weekly summaries first (hierarchical)
        const { data: weeklySummaries } = await db
            .from('summaries')
            .select('type, period_start, period_end, content')
            .eq('type', 'weekly')
            .gte('period_start', startDate)
            .lte('period_start', endDate)
            .order('period_start');

        let md = `## Monthly Review: ${startDate} to ${endDate}\n\n`;

        if (weeklySummaries && weeklySummaries.length > 0) {
            md += `### Source: ${weeklySummaries.length} weekly summaries\n\n`;
            for (const ws of weeklySummaries) {
                md += `---\n## Weekly Summary: ${ws.period_start} to ${ws.period_end}\n\n`;
                md += ws.content + '\n\n';
            }
        } else {
            // Fallback to daily notes
            md += `### Source: Daily notes (no weekly summaries found)\n\n`;
            const dailyData = await gatherWeeklyData(startDate, endDate);
            md += dailyData;
        }

        // Also include decisions and reflections for the month
        const [decisionsRes, reflectionsRes] = await Promise.all([
            db.from('product_decisions')
                .select('note_date, decision, context, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),

                .select('note_date, observation, coach_perspective, category')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
        ]);

        const decisions = decisionsRes.data || [];
        if (decisions.length) {
            md += `\n### All Decisions This Month\n`;
            for (const d of decisions) {
                md += `- **${d.products?.name || ''}** (${d.note_date}): ${d.decision}\n`;
            }
        }

        const reflections = reflectionsRes.data || [];
        if (reflections.length) {
            md += `\n### All Reflections This Month\n`;
            for (const r of reflections) {
                md += `- **${r.category}** (${r.note_date}): ${r.observation}\n`;
            }
        }

        return md;
    }

    // ─── Helpers ──────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        const el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
    }

    function renderBody(text) {
        if (!text) return '<em style="color:var(--text-muted)">No content.</em>';
        // If the text looks like markdown (has headings, bold, links, lists)
        // render it as markdown; otherwise treat as plain text with paragraphs
        const hasMarkdown = /^#{1,4}\s|^\*\*|\[.+\]\(.+\)|^- |^\d+\.\s/m.test(text);
        if (hasMarkdown && typeof marked !== 'undefined') {
            return marked.parse(text);
        }
        // Plain text: convert line breaks to paragraphs
        return text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
    }

    function formatDate(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        const day = d.getDate().toString().padStart(2, '0');
        const mon = (d.getMonth() + 1).toString().padStart(2, '0');
        const yr = d.getFullYear().toString().slice(-2);
        const hr = d.getHours().toString().padStart(2, '0');
        const mn = d.getMinutes().toString().padStart(2, '0');
        return `${day}/${mon}/${yr} ${hr}:${mn}`;
    }

    function truncUrl(url) {
        if (!url) return '';
        try {
            const u = new URL(url);
            const path = u.pathname.length > 40 ? u.pathname.substring(0, 40) + '...' : u.pathname;
            return u.hostname + path;
        } catch { return url.substring(0, 60); }
    }

    function renderPdfThumbnails() {
        if (typeof pdfjsLib === 'undefined') return;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.querySelectorAll('.pdf-thumb').forEach(async canvas => {
            const url = canvas.dataset.pdfUrl;
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.5 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            } catch {
                // If PDF rendering fails, show icon instead
                canvas.parentElement.innerHTML = '<span class="asset-icon">📕</span>';
            }
        });
    }

    function getFileIcon(mimeType) {
        if (!mimeType) return '📄';
        if (mimeType.startsWith('image/')) return '🖼️';
        if (mimeType === 'application/pdf') return '📕';
        if (mimeType.includes('spreadsheet') || mimeType.includes('excel') || mimeType.includes('.sheet')) return '📊';
        if (mimeType.includes('presentation') || mimeType.includes('powerpoint') || mimeType.includes('.presentation')) return '📙';
        if (mimeType.includes('document') || mimeType.includes('word') || mimeType.includes('.document')) return '📘';
        if (mimeType.startsWith('text/')) return '📝';
        if (mimeType.includes('zip') || mimeType.includes('compressed')) return '📦';
        return '📄';
    }

    function formatFileSize(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0;
        let size = bytes;
        while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
        return `${size.toFixed(i > 0 ? 1 : 0)} ${units[i]}`;
    }

    function wireAssetEvents() {
        // Upload zone click
        const dropZone = document.getElementById('assetDropZone');
        const fileInput = document.getElementById('assetFileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) uploadAssetFiles(e.target.files);
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadAssetFiles(e.dataTransfer.files);
        });

        // Type filters
        document.querySelectorAll('[data-asset-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                assetFilter.type = btn.dataset.assetType || null;
                loadAssets();
            });
        });

        // Tag filter
        const tagSel = document.getElementById('assetTagFilter');
        if (tagSel) {
            tagSel.addEventListener('change', () => {
                assetFilter.tag = tagSel.value || null;
                loadAssets();
            });
        }

        // View mode toggle
        document.querySelectorAll('[data-view-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                assetViewMode = btn.dataset.viewMode;
                localStorage.setItem('assetViewMode', assetViewMode);
                loadAssets();
            });
        });

        // Copy link buttons
        document.querySelectorAll('.asset-copy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const url = btn.dataset.copyUrl;
                try {
                    await navigator.clipboard.writeText(url);
                    btn.textContent = '✓';
                    setTimeout(() => { btn.textContent = '🔗'; }, 1500);
                } catch {
                    // Fallback
                    const tmp = document.createElement('input');
                    tmp.value = url;
                    document.body.appendChild(tmp);
                    tmp.select();
                    document.execCommand('copy');
                    document.body.removeChild(tmp);
                    btn.textContent = '✓';
                    setTimeout(() => { btn.textContent = '🔗'; }, 1500);
                }
            });
        });

        // Card/row clicks → detail view
        document.querySelectorAll('.asset-card, .asset-list-row[data-asset-id]').forEach(card => {
            card.addEventListener('click', () => {
                const asset = assetsData.find(a => a.id === card.dataset.assetId);
                if (asset) openAssetDetail(asset);
            });
        });
    }

    async function uploadAssetFiles(files) {
        const progress = document.getElementById('assetUploadProgress');
        const total = files.length;
        let done = 0;

        for (const file of files) {
            progress.innerHTML = `<span style="color: var(--accent);">Uploading ${done + 1}/${total}: ${esc(file.name)}...</span>`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/assets/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    progress.innerHTML = `<span style="color: var(--red);">Failed: ${esc(file.name)} — ${err.error || 'Unknown error'}</span>`;
                    continue;
                }

                done++;
            } catch (err) {
                progress.innerHTML = `<span style="color: var(--red);">Error: ${err.message}</span>`;
            }
        }

        progress.innerHTML = `<span style="color: var(--accent);">✓ ${done}/${total} files uploaded</span>`;
        setTimeout(() => { progress.innerHTML = ''; }, 3000);

        // Refresh view and counts
        loadAssets();
        loadCounts();
    }

                            ${companyList.map(c => `<option value="${c.id}" ${assetCompanyId === c.id ? 'selected' : ''}>${esc(c.name)} (${c.type})</option>`).join('')}
                        </select>
                    </div>
                    <div class="asset-detail-field">
                        <div class="asset-detail-label">Description</div>
                        <textarea class="stoic-input" id="assetDescInput" rows="3" placeholder="Add a description...">${esc(asset.description || '')}</textarea>
                    </div>
                    <div class="asset-detail-field">
                        <div class="asset-detail-label">Tags</div>
                        ${buildTagEditor(asset.tags || [], 'asset')}
                    </div>
                    <div class="asset-detail-field">
                        <div class="asset-detail-label">Link</div>
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <input type="text" id="assetLinkInput" readonly value="${location.origin}${fileUrl}"
                                style="flex: 1; background: var(--void); color: var(--text-body); border: 1px solid var(--border-hover); border-radius: 4px; padding: 0.4rem 0.6rem; font-family: var(--mono); font-size: 0.8rem;">
                            <button class="btn-action btn-secondary" id="assetCopyLinkBtn" style="white-space: nowrap; padding: 0.4rem 0.7rem;">Copy</button>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                        <a href="${fileUrl}" target="_blank" class="btn-action" style="text-decoration: none; text-align: center; flex: 1;">Download</a>
                        <button class="btn-action btn-secondary" id="assetDeleteBtn" style="flex: 1; color: var(--red);">Delete</button>
                    </div>
                </div>
            </div>
        `;

        // Wire back button
        document.getElementById('assetBackBtn').addEventListener('click', () => loadAssets());

        // Wire copy link
        document.getElementById('assetCopyLinkBtn').addEventListener('click', async () => {
            const input = document.getElementById('assetLinkInput');
            const btn = document.getElementById('assetCopyLinkBtn');
            try {
                await navigator.clipboard.writeText(input.value);
                btn.textContent = '✓ Copied';
                setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
            } catch {
                input.select();
                document.execCommand('copy');
                btn.textContent = '✓ Copied';
                setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
            }
        });

        // Wire company dropdown
        document.getElementById('assetCompanySelect').addEventListener('change', async (e) => {
            const newMeta = { ...(asset.metadata || {}), company_id: e.target.value || null };
            await fetch('/api/entity-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table: 'assets', id: asset.id, updates: { metadata: newMeta } }),
            });
            asset.metadata = newMeta;
        });

        // Wire description save (debounced)
        let descTimer;
        document.getElementById('assetDescInput').addEventListener('input', (e) => {
            clearTimeout(descTimer);
            descTimer = setTimeout(async () => {
                await fetch('/api/entity-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'assets', id: asset.id, updates: { description: e.target.value } }),
                });
            }, 1000);
        });

        // Wire tag editor
        wireTagEditor('asset', async (newTags) => {
            await fetch('/api/entity-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table: 'assets', id: asset.id, updates: { tags: newTags } }),
            });
            asset.tags = newTags;
        });

        // Wire delete
        document.getElementById('assetDeleteBtn').addEventListener('click', async () => {
            if (!confirm(`Delete "${asset.filename}"? This cannot be undone.`)) return;
            const res = await fetch(`/api/assets/${asset.id}`, { method: 'DELETE' });
            if (res.ok) {
                loadAssets();
                loadCounts();
            } else {
                alert('Failed to delete asset');
            }
        });
    }
