    // ─── Signals ─────────────────────────────────────────────
    let signalFilters = { tag: null, dateRange: null };
    let signalSelectedIds = new Set();

    async function loadSignals() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading signals</div>';
        signalSelectedIds.clear();

        // Fetch signals + unique tags for filter
        const [{ data, error }, { data: tagRows }] = await Promise.all([
            db.from('content')
                .select('id, title, type, tags, status, captured_at, body, metadata')
                .eq('type', 'signal')
                .order('captured_at', { ascending: false })
                .limit(200),
            db.from('content')
                .select('tags')
                .eq('type', 'signal'),
        ]);

        if (error) { main.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }

        // Collect unique tags
        const tagSet = new Set();
        (tagRows || []).forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        const allTags = [...tagSet].sort();

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Signals</h2>
                <span style="flex:1"></span>
                <button class="btn" id="toggleNewSignal"><i class="icon" data-lucide="plus"></i> New Signal</button>
            </div>
            <div class="new-signal-form" id="newSignalForm">
                <input type="text" id="newSignalTitle" placeholder="Signal title..." class="input">
                <textarea id="newSignalBody" placeholder="Describe the signal — what did you observe?" class="input"></textarea>
                <div style="margin-top:0.5rem">${buildTagEditor([])}</div>
                <div class="form-actions">
                    <button class="btn" id="cancelNewSignal">Cancel</button>
                    <button class="btn btn-primary" id="saveNewSignal">Save Signal</button>
                </div>
            </div>
            <div class="filters">
                <select class="filter-select" id="signalTagFilter">
                    <option value="">All tags</option>
                    ${allTags.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('')}
                </select>
                <div class="filter-group">
                    <button class="filter-btn signal-date-btn${!signalFilters.dateRange ? ' active' : ''}" data-days="">All time</button>
                    <button class="filter-btn signal-date-btn${signalFilters.dateRange === 7 ? ' active' : ''}" data-days="7">7d</button>
                    <button class="filter-btn signal-date-btn${signalFilters.dateRange === 30 ? ' active' : ''}" data-days="30">30d</button>
                    <button class="filter-btn signal-date-btn${signalFilters.dateRange === 90 ? ' active' : ''}" data-days="90">90d</button>
                </div>
                <input type="text" class="search-input" placeholder="Search signals..." id="searchSignals">
            </div>
            <div class="signal-cards" id="signalCards"></div>
            <div class="signal-action-bar" id="signalActionBar" style="display:none">
                <span class="count-label" id="signalSelCount">0 selected</span>
                <button class="btn btn-primary" id="synthesiseBtn">Synthesise</button>
            </div>
        `;

        const allSignals = data || [];
        renderSignalCards(allSignals);

        // Wire new signal form
        document.getElementById('toggleNewSignal').addEventListener('click', () => {
            document.getElementById('newSignalForm').classList.toggle('open');
        });
        document.getElementById('cancelNewSignal').addEventListener('click', () => {
            document.getElementById('newSignalForm').classList.remove('open');
        });
        wireTagEditor();

        document.getElementById('saveNewSignal').addEventListener('click', async () => {
            const title = document.getElementById('newSignalTitle').value.trim();
            const body = document.getElementById('newSignalBody').value.trim();
            if (!title) return;
            const tags = currentTags || [];
            const btn = document.getElementById('saveNewSignal');
            btn.textContent = 'Saving...'; btn.disabled = true;
            try {
                const res = await fetch('/api/entity-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'content', data: { type: 'signal', title, body, tags, status: 'new' } }),
                });
                if (res.ok) {
                    loadSignals();
                    loadCounts();
                } else {
                    btn.textContent = 'Save Signal'; btn.disabled = false;
                }
            } catch { btn.textContent = 'Save Signal'; btn.disabled = false; }
        });

        // Wire tag filter
        document.getElementById('signalTagFilter').addEventListener('change', (e) => {
            signalFilters.tag = e.target.value || null;
            renderSignalCards(allSignals);
        });

        // Wire date filter
        document.querySelectorAll('.signal-date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.signal-date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                signalFilters.dateRange = btn.dataset.days ? parseInt(btn.dataset.days) : null;
                renderSignalCards(allSignals);
            });
        });

        // Wire search
        document.getElementById('searchSignals').addEventListener('input', () => {
            renderSignalCards(allSignals);
        });

        // Wire synthesise button
        document.getElementById('synthesiseBtn').addEventListener('click', () => {
            if (signalSelectedIds.size >= 2) openSynthesisModal(signalSelectedIds);
        });

        refreshIcons();
    }

    function filterSignals(signals) {
        let filtered = signals;
        if (signalFilters.tag) {
            filtered = filtered.filter(s => (s.tags || []).includes(signalFilters.tag));
        }
        if (signalFilters.dateRange) {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - signalFilters.dateRange);
            filtered = filtered.filter(s => new Date(s.captured_at) >= cutoff);
        }
        const q = (document.getElementById('searchSignals')?.value || '').toLowerCase();
        if (q) {
            filtered = filtered.filter(s =>
                (s.title || '').toLowerCase().includes(q) ||
                (s.body || '').toLowerCase().includes(q) ||
                (s.tags || []).some(t => t.toLowerCase().includes(q))
            );
        }
        return filtered;
    }

    function renderSignalCards(allSignals) {
        const container = document.getElementById('signalCards');
        if (!container) return;
        const filtered = filterSignals(allSignals);

        if (!filtered.length) {
            container.innerHTML = '<div class="empty">No signals match your filters.</div>';
            return;
        }

        container.innerHTML = filtered.map(s => {
            const excerpt = (s.body || '').substring(0, 150) + ((s.body || '').length > 150 ? '...' : '');
            const sources = s.metadata?.source_ids || [];
            const checked = signalSelectedIds.has(s.id) ? 'checked' : '';
            return `
                <div class="signal-card" data-id="${s.id}">
                    <div class="signal-card-header">
                        <input type="checkbox" class="signal-card-check" data-id="${s.id}" ${checked} onclick="event.stopPropagation()">
                        <div class="signal-card-title">${esc(s.title)}</div>
                    </div>
                    <div class="signal-card-body">${esc(excerpt)}</div>
                    <div class="signal-card-meta">
                        ${(s.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
                        <span style="flex:1"></span>
                        <span style="font-size:0.7rem;color:var(--text-muted)">${formatDate(s.captured_at)}</span>
                    </div>
                    <div class="signal-card-meta">
                        ${sources.map(src =>
                            `<span class="signal-card-source" data-source-type="${src.type}" data-source-id="${src.id}">
                                <i class="icon" data-lucide="link" style="width:10px;height:10px"></i> Source
                            </span>`
                        ).join('')}
                        <button class="btn-sm signal-find-related" data-id="${s.id}" onclick="event.stopPropagation()" style="font-size:0.7rem;padding:0.15rem 0.5rem">
                            <i class="icon" data-lucide="search" style="width:10px;height:10px"></i> Find Related
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        // Wire card clicks to open modal
        container.querySelectorAll('.signal-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('signal-card-check')) return;
                const item = allSignals.find(s => s.id === card.dataset.id);
                if (item) openContentModal(item);
            });
        });

        // Wire checkboxes for multi-select
        container.querySelectorAll('.signal-card-check').forEach(cb => {
            cb.addEventListener('change', () => {
                if (cb.checked) signalSelectedIds.add(cb.dataset.id);
                else signalSelectedIds.delete(cb.dataset.id);
                updateSignalActionBar();
            });
        });

        // Wire Find Related buttons
        container.querySelectorAll('.signal-find-related').forEach(btn => {
            btn.addEventListener('click', async () => {
                const signal = allSignals.find(s => s.id === btn.dataset.id);
                if (!signal) return;
                btn.textContent = 'Searching...'; btn.disabled = true;
                try {
                    const res = await fetch('/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: signal.body || signal.title, limit: 10, tables: ['content'] }),
                    });
                    const data = await res.json();
                    if (!data.ok) throw new Error(data.error);
                    const related = (data.results || []).filter(r => r.source_id !== signal.id);
                    const card = btn.closest('.signal-card');
                    let panel = card.querySelector('.related-panel');
                    if (panel) panel.remove();
                    if (!related.length) {
                        card.insertAdjacentHTML('beforeend', '<div class="related-panel" style="margin-top:0.75rem;padding:0.5rem;font-size:0.8rem;color:var(--text-muted);border-top:1px solid var(--border)">No related content found.</div>');
                    } else {
                        card.insertAdjacentHTML('beforeend', `
                            <div class="related-panel" style="margin-top:0.75rem;padding-top:0.5rem;border-top:1px solid var(--border)">
                                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.35rem">Related content:</div>
                                ${related.slice(0, 5).map(r => `
                                    <div style="font-size:0.8rem;padding:0.25rem 0;display:flex;gap:0.5rem;align-items:center">
                                        <span class="type-badge type-${(r.metadata?.type || r.source_table)}" style="font-size:0.65rem;padding:0.1rem 0.4rem">${r.metadata?.type || r.source_table}</span>
                                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.metadata?.title || r.content_text?.substring(0, 60) || '')}</span>
                                        <span style="font-size:0.7rem;color:var(--text-muted)">${Math.round(r.similarity * 100)}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        `);
                    }
                } catch (err) {
                    console.error('Find related failed:', err);
                } finally {
                    btn.innerHTML = '<i class="icon" data-lucide="search" style="width:10px;height:10px"></i> Find Related';
                    btn.disabled = false;
                    refreshIcons();
                }
            });
        });

        // Wire source links
        container.querySelectorAll('.signal-card-source').forEach(link => {
            link.addEventListener('click', async (e) => {
                e.stopPropagation();
                const sourceId = link.dataset.sourceId;
                const sourceType = link.dataset.sourceType;
                if (sourceType === 'content') {
                    const { data } = await db.from('content').select('*').eq('id', sourceId).single();
                    if (data) openContentModal(data);
                }
            });
        });

        refreshIcons();
    }

    function updateSignalActionBar() {
        const bar = document.getElementById('signalActionBar');
        const count = signalSelectedIds.size;
        if (bar) {
            bar.style.display = count >= 2 ? 'flex' : 'none';
            const label = document.getElementById('signalSelCount');
            if (label) label.textContent = `${count} selected`;
        }
    }

    async function openSynthesisModal(signalIds) {
        // Fetch selected signals
        const { data: signals } = await db.from('content')
            .select('id, title, body, tags')
            .in('id', [...signalIds]);
        if (!signals?.length) return;

        const overlay = document.createElement('div');
        overlay.className = 'synthesis-overlay';
        overlay.innerHTML = `
            <div class="synthesis-modal">
                <h3><i class="icon" data-lucide="sparkles" style="width:18px;height:18px"></i> Signal Synthesis</h3>
                <div class="synthesis-signals-list">
                    <ul>${signals.map(s => `<li>${esc(s.title)}</li>`).join('')}</ul>
                </div>
                <div class="synthesis-options">
                    <div>
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em">Format</div>
                        <label><input type="radio" name="synthFormat" value="narrative" checked> Narrative</label>
                        <label><input type="radio" name="synthFormat" value="structured"> Structured</label>
                    </div>
                    <div>
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em">Focus</div>
                        <select id="synthFocus" class="filter-select">
                            <option value="strategic-implications">Strategic implications</option>
                            <option value="trend-analysis">Trend analysis</option>
                            <option value="competitive-positioning">Competitive positioning</option>
                            <option value="risk-assessment">Risk assessment</option>
                            <option value="opportunity-identification">Opportunity identification</option>
                        </select>
                    </div>
                </div>
                <textarea id="synthContext" class="input" rows="2" placeholder="Optional: Add context or guidance for the synthesis..." style="width:100%;margin-bottom:0.75rem"></textarea>
                <div style="display:flex;gap:0.5rem">
                    <button class="btn btn-primary" id="generateSynthesis"><i class="icon" data-lucide="sparkles" style="width:14px;height:14px"></i> Generate</button>
                    <button class="btn" id="closeSynthesis">Cancel</button>
                    <span style="flex:1"></span>
                    <button class="btn" id="saveSynthesis" style="display:none"><i class="icon" data-lucide="save" style="width:14px;height:14px"></i> Save as Summary</button>
                </div>
                <div class="synthesis-result" id="synthesisResult"></div>
            </div>
        `;
        document.body.appendChild(overlay);
        refreshIcons();

        // Close
        document.getElementById('closeSynthesis').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

        let synthesisText = '';

        // Generate
        document.getElementById('generateSynthesis').addEventListener('click', async () => {
            const format = document.querySelector('input[name="synthFormat"]:checked').value;
            const focus = document.getElementById('synthFocus').value;
            const context = document.getElementById('synthContext').value.trim();
            const resultDiv = document.getElementById('synthesisResult');
            resultDiv.innerHTML = '<div class="ask-loading"><span class="spinner"></span> Synthesising signals...</div>';
            synthesisText = '';

            try {
                const res = await fetch('/api/signal-synthesis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        signal_ids: [...signalIds],
                        format, focus, context: context || undefined,
                    }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Synthesis failed');
                }

                // Handle streaming SSE response
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                resultDiv.innerHTML = '<div class="ask-answer" id="synthesisOutput"></div>';
                const output = document.getElementById('synthesisOutput');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                                    synthesisText += parsed.delta.text;
                                    output.innerHTML = marked.parse(synthesisText);
                                }
                            } catch { /* skip non-JSON lines */ }
                        }
                    }
                }

                // Show save button
                if (synthesisText) {
                    document.getElementById('saveSynthesis').style.display = '';
                }
            } catch (err) {
                resultDiv.innerHTML = `<div style="color:var(--red);font-size:0.85rem">Error: ${esc(err.message)}</div>`;
            }
        });

        // Save synthesis
        document.getElementById('saveSynthesis').addEventListener('click', async () => {
            const btn = document.getElementById('saveSynthesis');
            const format = document.querySelector('input[name="synthFormat"]:checked').value;
            const focus = document.getElementById('synthFocus').value;
            btn.textContent = 'Saving...'; btn.disabled = true;
            try {
                const res = await fetch('/api/entity-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        table: 'summaries',
                        data: {
                            type: 'signal-synthesis',
                            content: synthesisText,
                            metadata: { source_signal_ids: [...signalIds], focus, format },
                            period_start: new Date().toISOString().split('T')[0],
                            period_end: new Date().toISOString().split('T')[0],
                        },
                    }),
                });
                if (res.ok) {
                    btn.textContent = 'Saved ✓';
                } else {
                    btn.textContent = 'Save as Summary'; btn.disabled = false;
                }
            } catch {
                btn.textContent = 'Save as Summary'; btn.disabled = false;
            }
        });
    }

    // ─── Feed Items ───────────────────────────────────────────
    async function captureFeedItem(btn, itemId) {
        btn.disabled = true;
        btn.textContent = 'Capturing...';
        try {
            const resp = await fetch('/api/feed-items/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ feed_item_id: itemId }),
            });
            const text = await resp.text();
            let result;
            try { result = JSON.parse(text); } catch (_) {
                console.error('Capture response not JSON:', text.substring(0, 300));
                btn.textContent = 'Error';
                btn.disabled = false;
                return;
            }
            if (result.captured || result.already_captured) {
                btn.outerHTML = '<span style="color:var(--accent); font-size:0.75rem;">✓ Captured</span>';
            } else {
                console.error('Capture failed:', result);
                btn.textContent = result.error ? 'Failed' : 'Failed';
                btn.title = result.error || 'Unknown error';
                btn.disabled = false;
            }
        } catch (e) {
            console.error('Capture error:', e);
            btn.textContent = 'Error';
            btn.disabled = false;
        }
    }

    async function dismissFeedItem(itemId, cardEl) {
        try {
            const res = await fetch('/api/entity-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table: 'feed_items', id: itemId, updates: { dismissed: true } }),
            });
            if (res.ok && cardEl) {
                cardEl.classList.add('dismissed');
                setTimeout(() => cardEl.remove(), 300);
            }
        } catch (e) {
            console.error('Dismiss failed:', e);
        }
    }

    async function loadFeedItems() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading feed items</div>';

        const { data, error } = await db
            .from('feed_items')
            .select('id, item_title, item_url, item_summary, captured, dismissed, first_seen_at, feed_id, feeds(name)')
            .order('first_seen_at', { ascending: false })
            .limit(200);

        if (error) { main.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }
        if (!data.length) { main.innerHTML = '<div class="empty">No feed items yet.</div>'; return; }

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Feed Items</h2>
                <input type="text" class="search-input" placeholder="Filter items..." id="searchFeedItems">
            </div>
            <div class="filters" id="feedItemFilters">
                <button class="filter-btn active" data-filter="inbox">Inbox</button>
                <button class="filter-btn" data-filter="all">All</button>
                <button class="filter-btn" data-filter="captured">Captured</button>
                <button class="filter-btn" data-filter="dismissed">Dismissed</button>
            </div>
            <div class="bulk-bar" id="feedBulkBar">
                <span class="bulk-count" id="feedBulkCount">0</span> selected
                <button class="btn btn-sm btn-action" id="bulkCaptureFeed">${icon('download', 'icon-sm')} Capture</button>
                <button class="btn btn-sm" id="bulkDismissFeed" style="background:var(--void-lighter);color:var(--text-body);">${icon('x', 'icon-sm')} Dismiss</button>
                <button class="btn btn-sm" id="bulkDeselectFeed" style="background:transparent;color:var(--text-muted);">Deselect all</button>
            </div>
            <div class="feed-item-cards" id="feedItemCards"></div>
        `;

        let activeFilter = 'inbox';
        const selectedIds = new Set();

        function getFiltered() {
            const q = (document.getElementById('searchFeedItems')?.value || '').toLowerCase();
            let filtered = data;
            if (activeFilter === 'inbox') filtered = filtered.filter(i => !i.captured && !i.dismissed);
            else if (activeFilter === 'captured') filtered = filtered.filter(i => i.captured);
            else if (activeFilter === 'dismissed') filtered = filtered.filter(i => i.dismissed);
            if (q) filtered = filtered.filter(i =>
                (i.item_title || '').toLowerCase().includes(q) ||
                (i.item_summary || '').toLowerCase().includes(q) ||
                (i.feeds?.name || '').toLowerCase().includes(q)
            );
            return filtered;
        }

        function updateBulkBar() {
            const bar = document.getElementById('feedBulkBar');
            document.getElementById('feedBulkCount').textContent = selectedIds.size;
            bar.classList.toggle('active', selectedIds.size > 0);
        }

        function render() {
            const filtered = getFiltered();
            const container = document.getElementById('feedItemCards');
            container.innerHTML = filtered.length === 0
                ? '<div class="empty">No items match this filter.</div>'
                : filtered.map(i => `
                <div class="feed-item-card" data-id="${i.id}">
                    <div class="feed-item-card-header">
                        ${!i.captured && !i.dismissed ? `<input type="checkbox" class="feed-check" data-id="${i.id}" ${selectedIds.has(i.id) ? 'checked' : ''}>` : ''}
                        <div class="feed-item-card-info">
                            <div class="feed-item-card-title">${esc(i.item_title || 'Untitled')}</div>
                            <div class="feed-item-card-meta">
                                <span>${esc(i.feeds?.name || 'Unknown feed')}</span>
                                <span>·</span>
                                <span>${formatDate(i.first_seen_at)}</span>
                            </div>
                            <div class="feed-item-card-url">
                                <a href="${esc(i.item_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${esc(i.item_url)}</a>
                            </div>
                        </div>
                        <div class="feed-item-card-actions">
                            ${i.captured
                                ? `<span style="color:var(--accent); font-size:0.75rem;">✓ Captured</span>`
                                : i.dismissed
                                    ? `<span style="color:var(--text-muted); font-size:0.75rem;">Dismissed</span>`
                                    : `<button class="btn btn-sm btn-action capture-btn" data-id="${i.id}" style="font-size:0.75rem; padding:0.25rem 0.6rem;" onclick="event.stopPropagation();">${icon('download', 'icon-sm')} Capture</button>
                                       <button class="feed-item-dismiss dismiss-btn" data-id="${i.id}" onclick="event.stopPropagation();" title="Dismiss">${icon('x', 'icon-sm')}</button>`
                            }
                        </div>
                    </div>
                    ${i.item_summary ? `<div class="feed-item-card-summary">${renderBody(i.item_summary)}</div>` : ''}
                </div>
            `).join('');

            // Wire card click to expand/collapse summary
            container.querySelectorAll('.feed-item-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('button') || e.target.closest('a') || e.target.closest('input')) return;
                    card.classList.toggle('expanded');
                });
            });

            // Wire capture buttons
            container.querySelectorAll('.capture-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    captureFeedItem(btn, id);
                });
            });

            // Wire dismiss buttons
            container.querySelectorAll('.dismiss-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const card = btn.closest('.feed-item-card');
                    const item = data.find(d => d.id === id);
                    if (item) item.dismissed = true;
                    dismissFeedItem(id, card);
                });
            });

            // Wire checkboxes
            container.querySelectorAll('.feed-check').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.checked) selectedIds.add(cb.dataset.id);
                    else selectedIds.delete(cb.dataset.id);
                    updateBulkBar();
                });
            });

            refreshIcons();
            updateBulkBar();
        }

        // Bulk capture
        document.getElementById('bulkCaptureFeed')?.addEventListener('click', async () => {
            const ids = [...selectedIds];
            for (const id of ids) {
                const card = document.querySelector(`.feed-item-card[data-id="${id}"]`);
                const btn = card?.querySelector('.capture-btn');
                if (btn) await captureFeedItem(btn, id);
                const item = data.find(d => d.id === id);
                if (item) item.captured = true;
            }
            selectedIds.clear();
            render();
        });

        // Bulk dismiss
        document.getElementById('bulkDismissFeed')?.addEventListener('click', async () => {
            const ids = [...selectedIds];
            for (const id of ids) {
                const item = data.find(d => d.id === id);
                if (item) item.dismissed = true;
                await dismissFeedItem(id);
            }
            selectedIds.clear();
            render();
        });

        // Deselect all
        document.getElementById('bulkDeselectFeed')?.addEventListener('click', () => {
            selectedIds.clear();
            render();
        });

        document.getElementById('feedItemFilters').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('#feedItemFilters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            render();
        });

        document.getElementById('searchFeedItems').addEventListener('input', render);
        render();
    }

        wireEntityTagEditor('company');

        document.getElementById('saveCompanyBtn').addEventListener('click', async () => {
            const status = document.getElementById('companySaveStatus');
            status.textContent = 'saving...';
            status.className = 'modal-save-status saving';

            const updates = {

                notes: document.getElementById('editCompanyNotes').value.trim(),

            try {
                if (isNew) {
                    const res = await fetch('/api/entity-log', {

                    });
                    if (!res.ok) throw new Error(await res.text());

    async function loadProducts() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading products</div>';

        const [productsRes, companiesRes] = await Promise.all([
            db.from('products').select('id, name, description, status, tags, url, company_id, companies(name, type)').order('name', { ascending: true }),
            db.from('companies').select('id, name, type').order('name'),
        ]);

        const { data, error } = productsRes;
        const companyList = companiesRes.data || [];

        if (error) { main.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }
        if (!data.length) { main.innerHTML = '<div class="empty">No products yet.</div>'; return; }

        let activeFilter = 'all';

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Products</h2>
                <input type="text" class="search-input" placeholder="Filter by name..." id="searchProducts">
            </div>
            <div class="filters" id="productFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="internal">Our Products</button>
                <button class="filter-btn" data-filter="competitor">Competitor</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Status</th>
                            <th>Tags</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        `;

        function filterAndRender() {
            const q = (document.getElementById('searchProducts')?.value || '').toLowerCase();
            let filtered = data;
            if (activeFilter === 'internal') filtered = filtered.filter(p => p.companies?.type === 'internal');
            if (activeFilter === 'competitor') filtered = filtered.filter(p => p.companies?.type === 'competitor');
            if (q) filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(q) || (p.companies?.name || '').toLowerCase().includes(q));
            renderProductRows(filtered, companyList);
        }

        document.getElementById('productFilters').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('#productFilters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            filterAndRender();
        });

        document.getElementById('searchProducts').addEventListener('input', filterAndRender);
        filterAndRender();
    }

    function renderProductRows(data, companyList) {
        const tbody = document.getElementById('productsBody');
        tbody.innerHTML = data.map(p => `
            <tr class="expandable" data-id="${p.id}">
                <td class="title-cell"><span class="title-text">${esc(p.name)}</span></td>
                <td class="source-cell">${p.companies ? `<span class="type-badge type-${p.companies.type === 'competitor' ? 'signal' : 'article'}">${esc(p.companies.name)}</span>` : '<span style="color:var(--text-muted)">-</span>'}</td>
                <td><span class="type-badge status-${(p.status || '').replace(/\s+/g, '_')}">${esc(p.status || '-')}</span></td>
                <td>${(p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
            </tr>

        tbody.querySelectorAll('tr.expandable').forEach(row => {
            row.addEventListener('click', async () => {
                const product = data.find(p => String(p.id) === row.dataset.id);
                if (!product) return;
                await openProductModal(product);
            });
        });
    }

    async function loadCompetition() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading competitive intelligence</div>';

        // Fetch all competitor data in parallel
        const [competitorsRes, productsRes, assetsRes, contentRes, companyContentRes] = await Promise.all([
            db.from('companies').select('id, name, industry, website, notes, type').eq('type', 'competitor').order('name'),
            db.from('products').select('id, name, status, company_id, companies(name, type)').order('name'),
            db.from('assets').select('id, filename, mime_type, uploaded_at, metadata').order('uploaded_at', { ascending: false }),
            db.from('content').select('id, title, type, tags, source, captured_at, url, metadata')
                .order('captured_at', { ascending: false }).limit(500),
            db.from('company_content').select('id, company_id, content_id'),
        ]);

        const competitors = competitorsRes.data || [];
        const allProducts = productsRes.data || [];
        const allAssets = assetsRes.data || [];
        const allContent = contentRes.data || [];
        const companyContentLinks = companyContentRes.data || [];

        // Build competitor name list for smart surfacing
        const competitorNames = competitors.map(c => c.name.toLowerCase());
        const competitorIds = competitors.map(c => c.id);

        // Build set of explicitly linked content IDs per company
        const linkedContentByCompany = {};
        const linkedContentIds = new Set();
        companyContentLinks.forEach(link => {
            if (!linkedContentByCompany[link.company_id]) linkedContentByCompany[link.company_id] = [];
            linkedContentByCompany[link.company_id].push(link.content_id);
            linkedContentIds.add(link.content_id);
        });

        // Products by competitor
        const competitorProducts = allProducts.filter(p => p.companies?.type === 'competitor');

        // Assets linked to competitors
        const competitorAssets = allAssets.filter(a => {
            const compId = a.metadata?.company_id;
            return compId && competitorIds.includes(compId);
        });

        // Smart content surfacing: explicitly linked OR tag/name matches
        const competitionTags = ['competition', 'competitor', 'market-research', 'competitive'];
        const competitionContent = allContent.filter(item => {
            // Explicitly linked to a competitor
            if (linkedContentIds.has(item.id)) return true;
            // Check tags
            const tags = item.tags || [];
            if (tags.some(t => competitionTags.includes(t.toLowerCase()))) return true;
            // Check type
            if (item.type === 'signal') return true;
            // Check title/source for competitor names
            const titleLower = (item.title || '').toLowerCase();
            const sourceLower = (item.source || '').toLowerCase();
            if (competitorNames.some(name => titleLower.includes(name) || sourceLower.includes(name))) return true;
            return false;
        });

        // Build timeline: merge content + assets, sort by date
        const timeline = [];
        competitionContent.forEach(item => {
            timeline.push({
                date: item.captured_at,
                type: item.type,
                title: item.title,
                source: item.source || '',
                id: item.id,
                kind: 'content',
                url: item.url,
            });
        });
        competitorAssets.forEach(asset => {
            const company = competitors.find(c => c.id === asset.metadata?.company_id);
            timeline.push({
                date: asset.uploaded_at,
                type: 'asset',
                title: asset.filename,
                source: company?.name || '',
                id: asset.id,
                kind: 'asset',
            });
        });
        timeline.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        // Count articles/assets per competitor
        const competitorStats = {};
        competitors.forEach(c => { competitorStats[c.id] = { articles: 0, assets: 0, products: 0 }; });
        competitorProducts.forEach(p => {
            if (competitorStats[p.company_id]) competitorStats[p.company_id].products++;
        });
        competitorAssets.forEach(a => {
            const cid = a.metadata?.company_id;
            if (competitorStats[cid]) competitorStats[cid].assets++;
        });
        // Count explicitly linked articles
        competitors.forEach(c => {
            competitorStats[c.id].articles += (linkedContentByCompany[c.id] || []).length;
        });
        // Also count name-matched articles (avoid double-counting)
        competitionContent.forEach(item => {
            if (linkedContentIds.has(item.id)) return; // already counted via explicit link
            const titleLower = (item.title || '').toLowerCase();
            const sourceLower = (item.source || '').toLowerCase();
            competitors.forEach(c => {
                if (titleLower.includes(c.name.toLowerCase()) || sourceLower.includes(c.name.toLowerCase())) {
                    competitorStats[c.id].articles++;
                }
            });
        });

        // Render competitor cards
        const cardsHtml = competitors.map(c => {
            const stats = competitorStats[c.id] || { articles: 0, assets: 0, products: 0 };
            return `
                <div class="competitor-card" data-id="${c.id}">
                    <div class="competitor-card-name">${esc(c.name)}</div>
                    <div class="competitor-card-industry">${esc(c.industry || 'No industry set')}</div>
                    <div class="competitor-card-stats">
                        <span class="competitor-card-stat">${icon('box', 'icon-sm')} ${stats.products}</span>
                        <span class="competitor-card-stat">${icon('newspaper', 'icon-sm')} ${stats.articles}</span>
                        <span class="competitor-card-stat">${icon('folder-open', 'icon-sm')} ${stats.assets}</span>
                    </div>
                </div>
            `;
        }).join('');

        // Render timeline
        const timelineHtml = timeline.slice(0, 30).map(item => `
            <div class="timeline-item" data-id="${item.id}" data-kind="${item.kind}">
                <span class="timeline-date">${formatDate(item.date)}</span>
                <div class="timeline-body">
                    <div class="timeline-title">${esc(item.title)}</div>
                    ${item.source ? `<div class="timeline-source">${esc(item.source)}</div>` : ''}
                </div>
                <div class="timeline-badges">
                    <span class="type-badge type-${item.type}">${item.type}</span>
                </div>
            </div>
        `).join('');

        // Render competitor products table
        const productsHtml = competitorProducts.length === 0
            ? '<div class="empty-attention">No competitor products added yet. Add products and link them to competitor companies.</div>'
            : competitorProducts.map(p => `
                <div class="knowledge-stat-row" data-product-id="${p.id}">
                    ${icon('box')}
                    <span class="knowledge-stat-name">${esc(p.name)}</span>
                    <span style="font-size:0.75rem; color:var(--text-muted)">${esc(p.companies?.name || '')}</span>
                    <span class="type-badge status-${(p.status || '').replace(/\s+/g, '_')}" style="margin-left:auto">${esc(p.status || '')}</span>
                </div>
            `).join('');

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Competitive Intelligence</h2>
            </div>

            <div class="overview-section" style="margin-bottom: 1.5rem; padding: 1rem 1.2rem;">
                <div class="overview-section-title">Competitors (${competitors.length})</div>
                <div class="competitor-grid">
                    ${cardsHtml || '<div class="empty-attention">No competitors added yet. Add companies with type "competitor".</div>'}
                </div>
            </div>

            <div class="competition-columns">
                <div class="overview-section">
                    <div class="overview-section-title">Intelligence Timeline (${timeline.length})</div>
                    <div class="timeline-feed">
                        ${timelineHtml || '<div class="empty-attention">No competitive intelligence found. Tag articles with "competition" or add signals.</div>'}
                    </div>
                </div>
                <div class="overview-section">
                    <div class="overview-section-title">Competitor Products (${competitorProducts.length})</div>
                    ${productsHtml}
                </div>
            </div>
        `;

        // Wire competitor card clicks → open company detail
        main.querySelectorAll('.competitor-card').forEach(card => {
            card.addEventListener('click', () => {
                const competitor = competitors.find(c => c.id === card.dataset.id);
                if (competitor) navigateToCompetitorDetail(competitor.id);
            });
        });

        // Wire timeline clicks
        main.querySelectorAll('.timeline-item').forEach(el => {
            el.addEventListener('click', () => {
                if (el.dataset.kind === 'content') {
                    const item = allContent.find(c => c.id === el.dataset.id);
                    if (item) openContentModal(item);
                } else if (el.dataset.kind === 'asset') {
                    navigateToView('assets');
                }
            });
        });

        // Wire product row clicks
        main.querySelectorAll('.knowledge-stat-row[data-product-id]').forEach(el => {
            el.addEventListener('click', async () => {
                const product = allProducts.find(p => p.id === el.dataset.productId);
                if (product) await openProductModal(product);
            });
        });
    }

    async function loadCompetitorDetail(competitorId) {
        const main = document.getElementById('mainContent');

        // Fetch competitor + related data in parallel
        const [compRes, productsRes, assetsRes, contentRes, linkedContentRes] = await Promise.all([
            db.from('companies').select('*').eq('id', competitorId).single(),
            db.from('products').select('id, name, status, description, tags, url, company_id').eq('company_id', competitorId).order('name'),
            db.from('assets').select('id, filename, mime_type, uploaded_at, metadata').order('uploaded_at', { ascending: false }),
            db.from('content').select('id, title, type, tags, source, captured_at, url')
                .order('captured_at', { ascending: false }).limit(500),
            db.from('company_content').select('id, content_id, content(id, title, type, tags, source, captured_at, url)')
                .eq('company_id', competitorId),
        ]);

        if (compRes.error || !compRes.data) {

            const startTime = Date.now();
            const timerInterval = setInterval(() => {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                timerEl.textContent = `${elapsed}s`;
            }, 1000);

            try {
                const res = await fetch('/api/competitor-research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: competitor.name,
                        website: competitor.website || '',
                        industry: competitor.industry || '',
                        notes: competitor.notes || '',
                        focus,
                    }),
                });

                // Check if response is SSE stream or error JSON
                const contentType = res.headers.get('content-type') || '';
                if (!contentType.includes('text/event-stream')) {
                    clearInterval(timerInterval);
                    let errMsg = 'Unknown error';
                    try {
                        const errData = await res.json();
                        errMsg = errData.error || errData.detail || errMsg;
                    } catch (_) {
                        errMsg = `Server returned ${res.status}`;
                    }
                    resultsEl.innerHTML = `<div class="empty-attention" style="color:#ef4444;">Research failed: ${esc(errMsg)}</div>`;
                    return;
                }

                // Read the SSE stream progressively
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let reportText = '';
                let buffer = '';
                let renderTimer = null;
                const liveEl = document.getElementById('researchReportLive');

                function scheduleRender() {
                    if (renderTimer) return;
                    renderTimer = setTimeout(() => {
                        renderTimer = null;
                        if (liveEl) liveEl.innerHTML = renderBody(reportText);
                    }, 400);
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(line.slice(6));
                            if (event.type === 'status') {
                                // Update status text while waiting for Claude
                                const statusEl = document.getElementById('researchStatus');
                                if (statusEl) statusEl.textContent = event.text;
                            } else if (event.type === 'delta' && event.text) {
                                // Hide status, show report area on first delta
                                const statusEl = document.getElementById('researchStatus');
                                if (statusEl) statusEl.style.display = 'none';
                                if (liveEl) liveEl.style.display = 'block';
                                reportText += event.text;
                                scheduleRender();
                            } else if (event.type === 'error') {
                                const statusEl = document.getElementById('researchStatus');
                                if (statusEl) statusEl.style.display = 'none';
                                if (liveEl) { liveEl.style.display = 'block'; }
                                reportText += `\n\n**Error:** ${event.message}`;
                                scheduleRender();
                            }
                        } catch (_) {}
                    }
                }

                // Final render
                clearTimeout(renderTimer);
                clearInterval(timerInterval);
                lastResearchReport = reportText;
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                timerEl.textContent = `Completed in ${elapsed}s`;

                resultsEl.innerHTML = `
                    <div class="research-report">${renderBody(reportText)}</div>
                    <div class="research-actions">
                        <button class="btn-action" id="saveResearchToNotes" style="font-size:0.8rem;">
                            ${icon('file-text', 'icon-sm')} Append to Notes
                        </button>
                        <button class="btn-action" id="saveResearchAsContent" style="font-size:0.8rem; background:var(--void-lighter); color:var(--text-body);">
                            ${icon('bookmark', 'icon-sm')} Save as Article
                        </button>
                    </div>
                `;

                // Wire save buttons
                document.getElementById('saveResearchToNotes')?.addEventListener('click', async () => {
                    const saveBtn = document.getElementById('saveResearchToNotes');
                    saveBtn.textContent = 'Saving...';
                    const existingNotes = document.getElementById('editCompetitorNotes').value;
                    const datestamp = new Date().toLocaleDateString('en-GB');
                    const updatedNotes = existingNotes
                        ? existingNotes + '\n\n---\n## Research (' + datestamp + ')\n\n' + lastResearchReport
                        : '## Research (' + datestamp + ')\n\n' + lastResearchReport;
                    const saveRes = await fetch('/api/entity-update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'companies', id: competitorId, updates: { notes: updatedNotes } }),
                    });
                    if (saveRes.ok) {
                        document.getElementById('editCompetitorNotes').value = updatedNotes;
                        competitor.notes = updatedNotes;
                        saveBtn.textContent = 'Saved to notes ✓';
                        saveBtn.disabled = true;
                    } else {
                        saveBtn.textContent = 'Failed — try again';
                    }
                });

                document.getElementById('saveResearchAsContent')?.addEventListener('click', async () => {
                    const saveBtn = document.getElementById('saveResearchAsContent');
                    saveBtn.textContent = 'Saving...';
                    const datestamp = new Date().toLocaleDateString('en-GB');
                    const createRes = await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            table: 'content',
                            data: {
                                type: 'note',
                                title: `Competitive Research: ${competitor.name} (${datestamp})`,
                                body: lastResearchReport,
                                source: 'AI Research',
                                tags: ['competitive-intelligence', competitor.name.toLowerCase()],
                                status: 'new',
                                metadata: { company_id: competitorId, research_focus: focus },
                            },
                            returnRow: true,
                        }),
                    });
                    const createResult = await createRes.json();
                    if (createRes.ok && createResult.row) {
                        await fetch('/api/entity-log', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                table: 'company_content',
                                data: { company_id: competitorId, content_id: createResult.row.id },
                            }),
                        });
                        saveBtn.textContent = 'Saved as article ✓';
                        saveBtn.disabled = true;
                    } else {
                        saveBtn.textContent = 'Failed — try again';
                    }
                });

                refreshIcons();
            } catch (err) {
                clearInterval(timerInterval);
                resultsEl.innerHTML = `<div class="empty-attention" style="color:#ef4444;">Research failed: ${esc(err.message)}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `${icon('globe', 'icon-sm')} Run Research`;
                refreshIcons();
            }
        });

        refreshIcons();
    }

        document.querySelectorAll('#summaryFilters .filter-btn').forEach(btn => {

                renderSummariesList();
            });

        document.querySelectorAll('#summariesBody tr.expandable').forEach(row => {

                if (item) openSummaryDetail(item);

    function formatSummaryPeriod(s) {
        if (s.type === 'monthly') {
            const d = new Date(s.period_start + 'T12:00:00');
            return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
        }
        // Weekly / support
        const start = new Date(s.period_start + 'T12:00:00');
        const end = new Date(s.period_end + 'T12:00:00');
        const startDay = start.getDate();
        const endDay = end.getDate();
        const mon = start.toLocaleDateString('en-GB', { month: 'short' });
        const yr = start.getFullYear();
        return `Week of ${startDay}-${endDay} ${mon} ${yr}`;
    }

    function summaryPreview(content) {
        if (!content) return '';
        // Get first meaningful line after headings
        const lines = content.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        const first = lines[0] || '';
        return first.replace(/^\*\*|\*\*$/g, '').replace(/^- /, '').substring(0, 80);
    }

    function enterSummaryEditMode(item) {
        document.getElementById('summaryContent').style.display = 'none';

        editorWrap.innerHTML = `

                headers: { 'Content-Type': 'application/json' },

    // ─── Generate Summary ────────────────────────────────────

    function showGenerateForm(e, preType, preStart, preEnd) {
        const form = document.getElementById('summaryGenerateForm');
        if (!form) return;

        // Default to most recent complete week
        const now = new Date();
        const dayOfWeek = now.getDay();
        const lastFriday = new Date(now);
        lastFriday.setDate(now.getDate() - ((dayOfWeek + 2) % 7) - 0);
        const lastMonday = new Date(lastFriday);
        lastMonday.setDate(lastFriday.getDate() - 4);

        const defaultStart = preStart || lastMonday.toISOString().split('T')[0];
        const defaultEnd = preEnd || lastFriday.toISOString().split('T')[0];

        form.style.display = 'block';
        form.innerHTML = `
            <div class="generate-form">
                <div class="generate-form-row">
                    <label>Type:
                        <select id="genType">
                            <option value="weekly"${(preType || 'weekly') === 'weekly' ? ' selected' : ''}>Weekly</option>
                            <option value="monthly"${preType === 'monthly' ? ' selected' : ''}>Monthly</option>
                        </select>
                    </label>
                    <label>Start: <input type="date" id="genStart" value="${defaultStart}"></label>
                    <label>End: <input type="date" id="genEnd" value="${defaultEnd}"></label>
                    <button class="btn-action" id="btnDoGenerate">Generate</button>
                    <button class="btn-action btn-secondary" id="btnCancelGenerate">Cancel</button>
                </div>
                <div id="genStatus" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);"></div>
            </div>
        `;

        // Auto-adjust dates when type changes
        document.getElementById('genType').addEventListener('change', (e) => {
            if (e.target.value === 'monthly') {
                const d = new Date();
                d.setMonth(d.getMonth() - 1);
                const y = d.getFullYear();
                const m = d.getMonth();
                document.getElementById('genStart').value = `${y}-${String(m + 1).padStart(2, '0')}-01`;
                const lastDay = new Date(y, m + 1, 0).getDate();
                document.getElementById('genEnd').value = `${y}-${String(m + 1).padStart(2, '0')}-${lastDay}`;
            }
        });

        document.getElementById('btnDoGenerate').addEventListener('click', doGenerateSummary);
        document.getElementById('btnCancelGenerate').addEventListener('click', () => {
            form.style.display = 'none';
        });
    }

    async function doGenerateSummary() {
        const type = document.getElementById('genType').value;
        const periodStart = document.getElementById('genStart').value;
        const periodEnd = document.getElementById('genEnd').value;
        const status = document.getElementById('genStatus');
        const btn = document.getElementById('btnDoGenerate');

        if (!periodStart || !periodEnd) {
            status.textContent = 'Please select start and end dates.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Gathering data...';
        status.textContent = 'Querying Supabase for period data...';

        let contextData;
        try {
            if (type === 'monthly') {
                contextData = await gatherMonthlyData(periodStart, periodEnd);
            } else {
                contextData = await gatherWeeklyData(periodStart, periodEnd);
            }
        } catch (err) {
            status.textContent = `Error gathering data: ${err.message}`;
            btn.disabled = false;
            btn.textContent = 'Generate';
            return;
        }

        if (contextData.length < 100) {
            status.textContent = 'Not enough data found for this period. Check the date range.';
            btn.disabled = false;
            btn.textContent = 'Generate';
            return;
        }

        btn.textContent = 'Generating with AI...';
        status.textContent = `Sending ${contextData.length} chars to Claude...`;

        try {
            const res = await fetch('/api/generate-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type,
                    period_start: periodStart,
                    period_end: periodEnd,
                    context_data: contextData,
                }),
            });

            const result = await res.json();
            if (!res.ok || !result.ok) {
                status.textContent = `Error: ${result.error || 'Unknown error'} — ${result.detail || ''}`;
                btn.disabled = false;
                btn.textContent = 'Generate';
                return;
            }

            // Refresh list and open the new summary
            status.textContent = 'Done!';
            form.style.display = 'none';
            await loadSummaries();
            const newItem = summariesData.find(s => s.period_start === periodStart && s.type === type);
            if (newItem) openSummaryDetail(newItem);
        } catch (err) {
            status.textContent = `Error: ${err.message}`;
            btn.disabled = false;
            btn.textContent = 'Generate';
        }
    }

    // ─── Data Gathering ──────────────────────────────────────

    async function gatherWeeklyData(startDate, endDate) {
        const [notesRes, peopleLogRes, evidenceRes, decisionsRes, projectsRes, reflectionsRes, calendarRes] = await Promise.all([
            db.from('daily_notes')
                .select('note_date, tasks, notes, meetings, metadata')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('people_log')
                .select('note_date, entry, person_id, people(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('product_evidence')
                .select('note_date, evidence, evidence_type, product_id, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('product_decisions')
                .select('note_date, decision, context, product_id, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('project_updates')
                .select('note_date, update_text, project_id, projects(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('reflections_log')
                .select('note_date, observation, coach_perspective, category')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('calendar_events')
                .select('event_date, title, start_time, end_time, attendees')
                .gte('event_date', startDate)
                .lte('event_date', endDate)
                .order('start_time'),
        ]);

        const notes = notesRes.data || [];
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        let md = `## Week: ${startDate} to ${endDate}\n\n`;

        // Daily notes by day
        for (const note of notes) {
            const d = new Date(note.note_date + 'T12:00:00');
            md += `### ${dayNames[d.getDay()]} ${note.note_date}\n\n`;

            if (note.metadata?.review_summary) {
                md += `#### Daily Review Summary\n${note.metadata.review_summary}\n\n`;
            }
            if (note.tasks) md += `#### Tasks\n${note.tasks}\n\n`;
            if (note.notes) md += `#### Notes\n${note.notes}\n\n`;
            if (note.meetings) md += `#### Meetings\n${note.meetings}\n\n`;

            // Calendar events for this day
            const dayEvents = (calendarRes.data || []).filter(e => e.event_date === note.note_date);
            if (dayEvents.length) {
                md += `#### Calendar\n`;
                for (const ev of dayEvents) {
                    const time = ev.start_time ? `(${ev.start_time}${ev.end_time ? '-' + ev.end_time : ''})` : '';
                    const attendeeList = (ev.attendees || []).slice(0, 10).join(', ');
                    md += `- **${ev.title}** ${time}${attendeeList ? ' — ' + attendeeList : ''}\n`;
                }
                md += '\n';
            }
        }

        // People interactions
        const peopleLog = peopleLogRes.data || [];
        if (peopleLog.length) {
            md += `### People Interactions This Week\n`;
            const byPerson = {};
            for (const p of peopleLog) {
                const name = p.people?.name || 'Unknown';
                if (!byPerson[name]) byPerson[name] = [];
                byPerson[name].push(`${p.note_date}: ${p.entry}`);
            }
            for (const [name, entries] of Object.entries(byPerson)) {
                md += `#### ${name}\n`;
                entries.forEach(e => { md += `- ${e}\n`; });
                md += '\n';
            }
        }

        // Product evidence
        const evidence = evidenceRes.data || [];
        if (evidence.length) {
            md += `### Product Evidence This Week\n`;
            for (const e of evidence) {
                md += `- **${e.products?.name || 'Unknown'}** (${e.evidence_type}): ${e.evidence}\n`;
            }
            md += '\n';
        }

        // Decisions
        const decisions = decisionsRes.data || [];
        if (decisions.length) {
            md += `### Decisions This Week\n`;
            for (const d of decisions) {
                md += `- **${d.products?.name || 'Unknown'}** (${d.note_date}): ${d.decision}${d.context ? ' — ' + d.context : ''}\n`;
            }
            md += '\n';
        }

        // Project updates
        const projects = projectsRes.data || [];
        if (projects.length) {
            md += `### Project Updates\n`;
            for (const p of projects) {
                md += `- **${p.projects?.name || 'Unknown'}** (${p.note_date}): ${p.update_text}\n`;
            }
            md += '\n';
        }

        // Reflections
        const reflections = reflectionsRes.data || [];
        if (reflections.length) {
            md += `### Reflections\n`;
            for (const r of reflections) {
                md += `- **${r.category || 'leadership'}** (${r.note_date}): ${r.observation}\n`;
                if (r.coach_perspective) md += `  _Coach: ${r.coach_perspective}_\n`;
            }
            md += '\n';
        }

        return md;
    }

    async function gatherMonthlyData(startDate, endDate) {
        // Try weekly summaries first (hierarchical)
        const { data: weeklySummaries } = await db
            .from('summaries')
            .select('type, period_start, period_end, content')
            .eq('type', 'weekly')
            .gte('period_start', startDate)
            .lte('period_start', endDate)
            .order('period_start');

        let md = `## Monthly Review: ${startDate} to ${endDate}\n\n`;

        if (weeklySummaries && weeklySummaries.length > 0) {
            md += `### Source: ${weeklySummaries.length} weekly summaries\n\n`;
            for (const ws of weeklySummaries) {
                md += `---\n## Weekly Summary: ${ws.period_start} to ${ws.period_end}\n\n`;
                md += ws.content + '\n\n';
            }
        } else {
            // Fallback to daily notes
            md += `### Source: Daily notes (no weekly summaries found)\n\n`;
            const dailyData = await gatherWeeklyData(startDate, endDate);
            md += dailyData;
        }

        // Also include decisions and reflections for the month
        const [decisionsRes, reflectionsRes] = await Promise.all([
            db.from('product_decisions')
                .select('note_date, decision, context, products(name)')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
            db.from('reflections_log')
                .select('note_date, observation, coach_perspective, category')
                .gte('note_date', startDate)
                .lte('note_date', endDate)
                .order('note_date'),
        ]);

        const decisions = decisionsRes.data || [];
        if (decisions.length) {
            md += `\n### All Decisions This Month\n`;
            for (const d of decisions) {
                md += `- **${d.products?.name || ''}** (${d.note_date}): ${d.decision}\n`;
            }
        }

        const reflections = reflectionsRes.data || [];
        if (reflections.length) {
            md += `\n### All Reflections This Month\n`;
            for (const r of reflections) {
                md += `- **${r.category}** (${r.note_date}): ${r.observation}\n`;
            }
        }

        return md;
    }

    // ─── Helpers ──────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        const el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
    }

    function renderBody(text) {
        if (!text) return '<em style="color:var(--text-muted)">No content.</em>';
        // If the text looks like markdown (has headings, bold, links, lists)
        // render it as markdown; otherwise treat as plain text with paragraphs
        const hasMarkdown = /^#{1,4}\s|^\*\*|\[.+\]\(.+\)|^- |^\d+\.\s/m.test(text);
        if (hasMarkdown && typeof marked !== 'undefined') {
            return marked.parse(text);
        }
        // Plain text: convert line breaks to paragraphs
        return text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
    }

    function formatDate(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        const day = d.getDate().toString().padStart(2, '0');
        const mon = (d.getMonth() + 1).toString().padStart(2, '0');
        const yr = d.getFullYear().toString().slice(-2);
        const hr = d.getHours().toString().padStart(2, '0');
        const mn = d.getMinutes().toString().padStart(2, '0');
        return `${day}/${mon}/${yr} ${hr}:${mn}`;
    }

    function truncUrl(url) {
        if (!url) return '';
        try {
            const u = new URL(url);
            const path = u.pathname.length > 40 ? u.pathname.substring(0, 40) + '...' : u.pathname;
            return u.hostname + path;
        } catch { return url.substring(0, 60); }
    }

    // ─── Search Picker (reusable) ──────────────────────────────
    // Usage: showSearchPicker({ placeholder, searchFn, renderResult, onSelect })
    // searchFn(query) → Promise<array>, renderResult(item) → { title, meta }, onSelect(item) → void
    function showSearchPicker({ placeholder, searchFn, renderResult, onSelect, onCreate, createLabel }) {
        // Remove any existing picker
        document.querySelector('.search-picker-overlay')?.remove();
        document.querySelector('.search-picker')?.remove();

        const overlay = document.createElement('div');
        overlay.className = 'search-picker-overlay';

        const picker = document.createElement('div');
        picker.className = 'search-picker';
        picker.innerHTML = `
            <input class="search-picker-input" placeholder="${esc(placeholder || 'Search...')}" autofocus>
            <div class="search-picker-results">
                <div class="search-picker-empty">Type to search...</div>
            </div>
        `;

        document.body.appendChild(overlay);
        document.body.appendChild(picker);

        const input = picker.querySelector('.search-picker-input');
        const results = picker.querySelector('.search-picker-results');
        let debounceTimer = null;

        function close() {
            overlay.remove();
            picker.remove();
        }

        function renderCreateOption(q) {
            if (!onCreate) return '';
            return `<div class="search-picker-item search-picker-create" data-action="create">
                <span class="search-picker-item-title" style="color:var(--accent);">+ ${createLabel || 'Create'} "${esc(q)}"</span>
            </div>`;
        }

        overlay.addEventListener('click', close);
        input.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });

        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            if (q.length < 2) {
                results.innerHTML = '<div class="search-picker-empty">Type to search...</div>';
                return;
            }
            debounceTimer = setTimeout(async () => {
                results.innerHTML = '<div class="search-picker-empty">Searching...</div>';
                try {
                    const items = await searchFn(q);
                    let html = items.map((item, i) => {
                        const r = renderResult(item);
                        return `<div class="search-picker-item" data-idx="${i}">
                            <span class="search-picker-item-title">${esc(r.title)}</span>
                            ${r.meta ? `<span class="search-picker-item-meta">${esc(r.meta)}</span>` : ''}
                        </div>`;
                    }).join('');
                    html += renderCreateOption(q);
                    if (!items.length && !onCreate) {
                        results.innerHTML = '<div class="search-picker-empty">No results found</div>';
                        return;
                    }
                    results.innerHTML = html;
                    results.querySelectorAll('.search-picker-item:not(.search-picker-create)').forEach(el => {
                        el.addEventListener('click', () => {
                            const idx = parseInt(el.dataset.idx);
                            onSelect(items[idx]);
                            close();
                        });
                    });
                    results.querySelector('.search-picker-create')?.addEventListener('click', async () => {
                        const el = results.querySelector('.search-picker-create');
                        el.innerHTML = '<span class="search-picker-item-title" style="color:var(--text-muted);">Creating...</span>';
                        await onCreate(q);
                        close();
                    });
                } catch (err) {
                    results.innerHTML = `<div class="search-picker-empty">Error: ${err.message}</div>`;
                }
            }, 300);
        });

        setTimeout(() => input.focus(), 50);
    }

    async function loadAssets() {

        let query = db.from('assets').select('*').order('uploaded_at', { ascending: false });
        if (assetFilter.tag) query = query.contains('tags', [assetFilter.tag]);
        if (assetFilter.type) {
            const typeMappings = {
                image: 'image/',
                pdf: 'application/pdf',
                office: 'application/vnd.',
            };
            if (typeMappings[assetFilter.type]) {
                query = query.like('mime_type', typeMappings[assetFilter.type] + '%');
            }
        }
        const { data, error } = await query;
        assetsData = data || [];

        // Collect asset-specific tags for filter dropdown
        const assetTagSet = new Set();
        (data || []).forEach(a => (a.tags || []).forEach(t => assetTagSet.add(t)));
        const assetTags = [...assetTagSet].sort();

        main.innerHTML = `

    function renderAssetGrid() {

        }

    }

    function renderAssetList() {
        if (assetsData.length === 0) {
            return '<div style="text-align: center; color: var(--text-muted); padding: 3rem;">No assets yet. Upload your first file above.</div>';
        }
        return `<div class="asset-list">

                <div></div><div>Name</div><div>Type</div><div style="text-align: right;">Size</div><div>Date</div><div></div>
            </div>
