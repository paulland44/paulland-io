<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Paul Land</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --void: #08080c;
            --void-light: #0e0e14;
            --void-lighter: #14141c;
            --star: #c8bfa8;
            --star-dim: rgba(200, 191, 168, 0.3);
            --accent: #3d8b6e;
            --accent-dim: rgba(61, 139, 110, 0.15);
            --accent-glow: rgba(61, 139, 110, 0.4);
            --text-muted: rgba(200, 191, 168, 0.4);
            --text-body: rgba(200, 191, 168, 0.7);
            --border: rgba(200, 191, 168, 0.06);
            --border-hover: rgba(200, 191, 168, 0.12);
            --mono: 'Inconsolata', monospace;
            --red: #c45050;
            --yellow: #c4a850;
            --blue: #5080c4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--void);
            color: var(--star);
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ─── Layout ─── */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: var(--void-light);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .sidebar-brand a {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .sidebar-brand a:hover { color: var(--accent); }

        .sidebar-brand h1 {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            margin-top: 0.3rem;
        }

        .sidebar-nav { flex: 1; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover { color: var(--star); background: rgba(200, 191, 168, 0.03); }
        .nav-item.active { color: var(--accent); background: var(--accent-dim); }

        .nav-item .count {
            margin-left: auto;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .main {
            flex: 1;
            margin-left: 220px;
            padding: 2rem;
            min-width: 0;
            overflow-x: hidden;
        }

        /* ─── Header ─── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.06em;
        }

        .page-stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ─── Filters ─── */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 0.35rem 0.8rem;
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: var(--border-hover); color: var(--star); }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        .search-input {
            padding: 0.35rem 0.8rem;
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--star);
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            outline: none;
            width: 240px;
            margin-left: auto;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); }

        /* ─── Table ─── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr { transition: background 0.15s; }
        tr:hover { background: rgba(200, 191, 168, 0.02); }
        tr.expandable { cursor: pointer; }

        .title-cell {
            max-width: 400px;
        }

        .title-text {
            color: var(--star);
            font-weight: 400;
        }

        .title-url {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            display: block;
            margin-top: 0.15rem;
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .title-url:hover { color: var(--accent); }

        .type-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.06em;
        }

        .type-article { background: rgba(80, 128, 196, 0.15); color: var(--blue); }
        .type-thought { background: rgba(200, 191, 168, 0.1); color: var(--star-dim); }
        .type-signal { background: rgba(196, 168, 80, 0.15); color: var(--yellow); }
        .type-reflection { background: rgba(61, 139, 110, 0.15); color: var(--accent); }
        .type-note { background: rgba(200, 191, 168, 0.08); color: var(--text-muted); }

        .tag {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 2px;
            font-size: 0.75rem;
            margin: 0.1rem;
        }

        .date-cell {
            white-space: nowrap;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .source-cell {
            color: var(--text-body);
            font-size: 0.85rem;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 0.3rem;
        }

        .status-new { background: var(--accent); }
        .status-read { background: var(--text-muted); }

        .captured-yes { color: var(--accent); }
        .captured-no { color: var(--text-muted); }

        /* ─── Content modal overlay ─── */
        .content-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        body.content-open .content-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        body.content-open {
            overflow: hidden;
        }

        .content-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(20px);
            z-index: 310;
            width: min(720px, 92vw);
            max-height: 85vh;
            max-height: 85dvh;
            background: var(--void-light);
            border: 1px solid var(--border-hover);
            border-radius: 2px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .content-modal-scroll {
            overflow-y: auto;
            padding: 2.5rem 3rem 2rem;
            flex: 1;
            min-height: 0;
        }

        body.content-open .content-modal {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) translateY(0);
        }

        .content-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            z-index: 2;
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-close:hover { opacity: 0.9; }

        .content-close::before,
        .content-close::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 1.5px;
            background: var(--star);
            border-radius: 1px;
        }

        .content-close::before { transform: rotate(45deg); }
        .content-close::after { transform: rotate(-45deg); }

        .content-modal-title {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            color: var(--star);
            margin-bottom: 0.5rem;
            padding-right: 2rem;
        }

        .content-modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .content-modal-meta a {
            color: var(--accent);
            text-decoration: none;
        }

        .content-modal-meta a:hover { text-decoration: underline; }

        /* ─── Tag editor ─── */
        .tag-editor {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: center;
            width: 100%;
        }

        .tag-editor .tag {
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.5;
            font-size: 0.9em;
            line-height: 1;
            transition: opacity 0.2s;
        }

        .tag-remove:hover { opacity: 1; }

        .tag-input {
            background: none;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--star);
            font-family: var(--mono);
            font-size: 0.75rem;
            padding: 0.1rem 0.4rem;
            width: 100px;
            outline: none;
            transition: border-color 0.2s;
        }

        .tag-input:focus { border-color: var(--accent); }

        .tag-input::placeholder { color: var(--text-muted); }

        .tag-status {
            font-size: 0.7rem;
            margin-left: 0.5rem;
            transition: opacity 0.3s;
        }

        .tag-status.saving { color: var(--text-muted); }
        .tag-status.error { color: var(--red); }
        .tag-status.saved { color: var(--accent); opacity: 0; }

        .tag-suggestions {
            position: absolute;
            bottom: calc(100% + 2px);
            left: 0;
            background: var(--void-lighter);
            border: 1px solid var(--border-hover);
            border-radius: 2px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            min-width: 140px;
            z-index: 5;
        }

        .tag-suggestions.visible { display: block; }

        .tag-suggestion {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            color: var(--text-body);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .tag-suggestion:hover,
        .tag-suggestion.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tag-input-wrap {
            position: relative;
        }

        .content-modal-body {
            color: var(--text-body);
            font-size: 1.05rem;
            line-height: 1.85;
        }

        /* ─── Markdown rendering ─── */
        .content-modal-body h1,
        .content-modal-body h2,
        .content-modal-body h3,
        .content-modal-body h4 {
            color: var(--star);
            font-weight: 400;
            letter-spacing: 0.04em;
            margin: 1.2em 0 0.5em;
        }

        .content-modal-body h1 { font-size: 1.3rem; }
        .content-modal-body h2 { font-size: 1.15rem; }
        .content-modal-body h3 { font-size: 1.05rem; color: var(--accent); }
        .content-modal-body h4 { font-size: 1rem; color: var(--text-body); }

        .content-modal-body p {
            margin: 0.6em 0;
        }

        .content-modal-body strong {
            color: var(--star);
            font-weight: 500;
        }

        .content-modal-body em {
            font-style: italic;
            color: var(--star);
            opacity: 0.85;
        }

        .content-modal-body a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-dim);
            transition: border-color 0.2s;
        }

        .content-modal-body a:hover {
            border-color: var(--accent);
        }

        .content-modal-body ul,
        .content-modal-body ol {
            padding-left: 1.5em;
            margin: 0.6em 0;
        }

        .content-modal-body li {
            margin: 0.3em 0;
        }

        .content-modal-body li::marker {
            color: var(--accent);
        }

        .content-modal-body blockquote {
            border-left: 2px solid var(--accent);
            padding-left: 1em;
            margin: 0.8em 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .content-modal-body code {
            background: var(--void-lighter);
            padding: 0.1em 0.35em;
            border-radius: 2px;
            font-size: 0.9em;
        }

        .content-modal-body pre {
            background: var(--void-lighter);
            padding: 0.8em 1em;
            border-radius: 2px;
            overflow-x: auto;
            margin: 0.8em 0;
        }

        .content-modal-body pre code {
            background: none;
            padding: 0;
        }

        .content-modal-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1em 0;
        }

        .content-modal-body table {
            border-collapse: collapse;
            margin: 0.8em 0;
            font-size: 0.9rem;
        }

        .content-modal-body table th,
        .content-modal-body table td {
            border: 1px solid var(--border);
            padding: 0.4em 0.6em;
        }

        .content-modal-body table th {
            background: var(--void-lighter);
        }

        .content-modal-body img {
            max-width: 100%;
            border-radius: 2px;
            margin: 0.5em 0;
        }

        /* ─── Overview ─── */
        .overview-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 1.2rem 1.5rem;
            transition: border-color 0.2s;
        }

        .stat-card:hover { border-color: var(--border-hover); }

        .stat-card-value {
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
        }

        .stat-card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            margin-top: 0.3rem;
        }

        .stat-card-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            opacity: 0.7;
        }

        .overview-columns {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .overview-section {
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 1.2rem 1.5rem;
            min-width: 0;
            overflow: hidden;
        }

        .overview-section-title {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .activity-item {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .activity-item:last-child { border-bottom: none; }
        .activity-item:hover { background: rgba(200, 191, 168, 0.02); }

        .activity-title {
            flex: 1;
            color: var(--star);
            font-weight: 400;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .activity-source {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .activity-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .date-group {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 0.8rem;
            margin-bottom: 0.3rem;
        }

        .date-group:first-child { margin-top: 0; }

        .attention-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .attention-item:last-child { border-bottom: none; }
        .attention-item:hover { background: rgba(200, 191, 168, 0.02); }

        .attention-icon {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .attention-title {
            flex: 1;
            color: var(--text-body);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .attention-reason {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .overview-bottom {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 1.5rem;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag-cloud .tag {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .tag-cloud .tag:hover { opacity: 0.8; }

        .tag-cloud .tag-count {
            opacity: 0.5;
            font-size: 0.65rem;
            margin-left: 0.2rem;
        }

        .source-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .source-item:last-child { border-bottom: none; }

        .source-name { color: var(--text-body); }
        .source-count { color: var(--text-muted); font-size: 0.85rem; }

        .empty-attention {
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 1rem 0;
            text-align: center;
        }

        /* ─── Tags view ─── */
        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag-card {
            padding: 0.5rem 1rem;
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            transition: border-color 0.2s;
        }

        .tag-card:hover { border-color: var(--accent); }

        .tag-card-name {
            color: var(--accent);
            font-weight: 400;
        }

        .tag-card-count {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 0.4rem;
        }

        /* ─── Loading / empty ─── */
        .loading, .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin-left: 0.5rem;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Config banner ─── */
        .config-banner {
            background: rgba(196, 80, 80, 0.1);
            border: 1px solid rgba(196, 80, 80, 0.3);
            color: var(--red);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 2px;
            font-size: 0.75rem;
        }

        .config-banner code {
            background: rgba(196, 80, 80, 0.15);
            padding: 0.1rem 0.3rem;
            border-radius: 2px;
        }

        /* ─── Daily Note ─── */
        .daily-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .daily-nav-btn {
            padding: 0.35rem 0.8rem;
            background: var(--void-lighter);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-muted);

<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <a href="/">paulland.io</a>
                <h1>Admin</h1>
            </div>
            <div class="sidebar-nav">
                <button class="nav-item active" data-view="overview">
                    Overview
                </button>
                <button class="nav-item" data-view="daily-note">
                    Daily Note
                </button>
                <button class="nav-item" data-view="articles">
                    Articles <span class="count" id="countArticles">-</span>
                </button>
                <button class="nav-item" data-view="thoughts">
                    Thoughts & Signals <span class="count" id="countThoughts">-</span>
                </button>
                <button class="nav-item" data-view="reflections">
                    Reflections <span class="count" id="countReflections">-</span>
                </button>
                <button class="nav-item" data-view="feed-items">

                </button>
                <button class="nav-item" data-view="feeds">

                </button>

                    Tags
                </button>

                Last refreshed: <span id="lastRefresh">-</span>
            </div>
        </nav>

        <main class="main" id="mainContent">
            <div class="loading">Loading</div>
        </main>
    </div>

    <!-- Content modal -->
    <div class="content-overlay" id="contentOverlay"></div>
    <div class="content-modal" id="contentModal">
        <button class="content-close" id="contentClose" aria-label="Close"></button>
        <div class="content-modal-scroll">
            <h2 class="content-modal-title" id="contentModalTitle"></h2>
            <div class="content-modal-meta" id="contentModalMeta"></div>
            <div class="content-modal-body" id="contentModalBody"></div>
        </div>
    </div>

    <script>
    // ─── Markdown config ────────────────────────────────────────
    if (typeof marked !== 'undefined') {
        const renderer = new marked.Renderer();
        const origLink = renderer.link.bind(renderer);
        renderer.link = function({ href, title, text }) {
            return `<a href="${href}" target="_blank" rel="noopener"${title ? ` title="${title}"` : ''}>${text}</a>`;
        };
        marked.setOptions({ renderer, breaks: true });
    }

    // ─── Supabase config ──────────────────────────────────────
    // These are safe to include: anon key is read-only via RLS,
    // and this page is protected by Cloudflare Access.
    const SUPABASE_URL = 'https://gdnwdndajexntfmybzmm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcwf-S6epQz3FgTWA2tffA_BfBc5SCx';

    // ─── Init ─────────────────────────────────────────────────
    let db;
    let currentView = 'overview';
    let allTags = [];
    let dailyNoteDate = null;
    let dailyNoteId = null;
    let dailySaveTimer = null;
    let dailyIsDirty = false;
    let dailyEditors = { tasks: null, notes: null };
    let meetingCards = []; // Array of { id, title, editor }

    function init() {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            document.getElementById('mainContent').innerHTML = `
                <div class="config-banner">
                    Supabase not configured. Edit <code>admin/index.html</code> and set
                    <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the script.
                </div>
            `;
            return;
        }

        db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Wire up nav
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                // Flush pending daily note save before navigating away
                if (currentView === 'daily-note' && dailyIsDirty) {
                    clearTimeout(dailySaveTimer);
                    saveDailyNote();
                }
                if (currentView === 'daily-note') destroyDailyEditors();
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                loadView(currentView);
            });
        });

        loadCounts();
        loadView('overview');
    }

    // ─── Counts ───────────────────────────────────────────────
    async function loadCounts() {
        const [articles, thoughts, signals, reflections, feedItems, feeds] = await Promise.all([
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'article'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'thought'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'signal'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'reflection'),
            db.from('feed_items').select('id', { count: 'exact', head: true }),
            db.from('feeds').select('id', { count: 'exact', head: true }),
        ]);

        document.getElementById('countArticles').textContent = articles.count || 0;
        document.getElementById('countThoughts').textContent = (thoughts.count || 0) + (signals.count || 0);
        document.getElementById('countReflections').textContent = reflections.count || 0;
        document.getElementById('countFeedItems').textContent = feedItems.count || 0;
        document.getElementById('countFeeds').textContent = feeds.count || 0;
        document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();

        // Load all unique tags for autocomplete
        const { data: tagRows } = await db.from('content').select('tags');
        const tagSet = new Set();
        (tagRows || []).forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        allTags = Array.from(tagSet).sort();
    }

    // ─── View router ──────────────────────────────────────────
    function loadView(view) {
        closeContentModal();
        switch (view) {
            case 'overview': return loadOverview();
            case 'daily-note': return loadDailyNote();
            case 'articles': return loadArticles();
            case 'thoughts': return loadThoughts();
            case 'reflections': return loadReflections();
            case 'feed-items': return loadFeedItems();
            case 'feeds': return loadFeeds();
            case 'tags': return loadTags();
        }
    }

    // ─── Overview ─────────────────────────────────────────────
    async function loadOverview() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading overview</div>';

        const now = new Date();
        const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000).toISOString();
        const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
        const yesterdayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1).toISOString();

        const [
            allContent,
            recentContent,
            feedItemCount,
            uncapturedCount,
        ] = await Promise.all([
            db.from('content').select('id, title, type, tags, source, body, status, captured_at, url, author, metadata'),
            db.from('content').select('id, title, type, tags, source, body, status, captured_at, url, author, metadata')
                .order('captured_at', { ascending: false }).limit(15),
            db.from('feed_items').select('id', { count: 'exact', head: true }),
            db.from('feed_items').select('id', { count: 'exact', head: true }).eq('captured', false),
        ]);

        const content = allContent.data || [];
        const recent = recentContent.data || [];

        // Counts
        const articles = content.filter(c => c.type === 'article');
        const articlesThisWeek = articles.filter(c => c.captured_at >= weekAgo);
        const thoughtsSignals = content.filter(c => c.type === 'thought' || c.type === 'signal');
        const reflections = content.filter(c => c.type === 'reflection');

        // Tags
        const tagCounts = {};
        content.forEach(c => (c.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
        const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 15);

        // Sources
        const sourceCounts = {};
        articles.forEach(a => { if (a.source) sourceCounts[a.source] = (sourceCounts[a.source] || 0) + 1; });
        const topSources = Object.entries(sourceCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

        // Needs attention
        const STUB = '*Article content could not be extracted';
        const needsAttention = [];
        articles.forEach(a => {
            if (!a.tags || a.tags.length === 0) needsAttention.push({ ...a, reason: 'No tags' });
            else if (a.body && a.body.startsWith(STUB)) needsAttention.push({ ...a, reason: 'No content' });
        });

        // Group recent by date
        function dateGroup(iso) {
            if (iso >= todayStart) return 'Today';
            if (iso >= yesterdayStart) return 'Yesterday';
            return 'Earlier this week';
        }

        let activityHtml = '';
        let lastGroup = '';
        for (const item of recent) {
            const group = dateGroup(item.captured_at);
            if (group !== lastGroup) {
                activityHtml += `<div class="date-group">${group}</div>`;
                lastGroup = group;
            }
            activityHtml += `
                <div class="activity-item" data-id="${item.id}">
                    <span class="type-badge type-${item.type}">${item.type}</span>
                    <span class="activity-title">${esc(item.title)}</span>
                    ${item.source ? `<span class="activity-source">${esc(item.source)}</span>` : ''}
                    <span class="activity-date">${formatDate(item.captured_at)}</span>
                </div>
            `;
        }

        const attentionHtml = needsAttention.length === 0
            ? '<div class="empty-attention">All clear — nothing needs attention</div>'
            : needsAttention.slice(0, 8).map(a => `
                <div class="attention-item" data-id="${a.id}">
                    <span class="attention-icon">${a.reason === 'No tags' ? '🏷' : '📄'}</span>
                    <span class="attention-title">${esc(a.title)}</span>
                    <span class="attention-reason">${a.reason}</span>
                </div>
            `).join('');

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Overview</h2>
            </div>

            <div class="overview-stats">
                <div class="stat-card">
                    <div class="stat-card-value">${articles.length}</div>
                    <div class="stat-card-label">Articles</div>
                    <div class="stat-card-sub">${articlesThisWeek.length} this week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value">${thoughtsSignals.length}</div>
                    <div class="stat-card-label">Thoughts & Signals</div>

    async function loadTiptap() {
        if (TiptapCore) return;
        try {
            const TurndownModule = await import('https://esm.sh/turndown@7?bundle');
            window._Turndown = TurndownModule.default || TurndownModule;

            // Import WITHOUT ?bundle so esm.sh deduplicates shared ProseMirror
            // dependencies. With ?bundle, each extension inlines its own copy
            // of ProseMirror, causing "keyed plugin" conflicts across editors.
            [TiptapCore, TiptapStarterKit, TiptapTaskList, TiptapTaskItem, TiptapPlaceholder] = await Promise.all([
                import('https://esm.sh/@tiptap/core@2'),
                import('https://esm.sh/@tiptap/starter-kit@2'),
                import('https://esm.sh/@tiptap/extension-task-list@2'),
                import('https://esm.sh/@tiptap/extension-task-item@2'),
                import('https://esm.sh/@tiptap/extension-placeholder@2'),
            ]);
            TiptapMarkdown = null;
        } catch (err) {
            console.error('Failed to load Tiptap:', err);
            throw err;
        }
    }

    function mdToHtml(md) {
        if (!md || !md.trim()) return '';
        // Convert task list markdown to HTML that Tiptap understands
        // - [ ] task → <li data-type="taskItem" data-checked="false">task</li>
        // - [x] task → <li data-type="taskItem" data-checked="true">task</li>
        let html = marked.parse(md);
        // marked renders - [ ] as list items with checkbox text — convert to tiptap format
        html = html.replace(/<li>\[[ ]\]\s*/g, '<li data-type="taskItem" data-checked="false"><p>');
        html = html.replace(/<li>\[x\]\s*/gi, '<li data-type="taskItem" data-checked="true"><p>');
        // Close <p> tags for task items
        html = html.replace(/(data-checked="(?:true|false)"><p>[^<]*?)(<\/li>)/g, '$1</p>$2');
        // Wrap task list items in a task list
        html = html.replace(/<ul>\s*(<li data-type="taskItem")/g, '<ul data-type="taskList">$1');
        return html;
    }

    function htmlToMd(html) {
        if (!html || !html.trim()) return '';
        if (!window._Turndown) return html;
        const td = new window._Turndown({
            headingStyle: 'atx',
            bulletListMarker: '-',
            codeBlockStyle: 'fenced',
        });
        // Handle tiptap task list items
        td.addRule('taskItem', {
            filter: function(node) {
                return node.nodeName === 'LI' && node.getAttribute('data-type') === 'taskItem';
            },
            replacement: function(content, node) {
                const checked = node.getAttribute('data-checked') === 'true';
                const text = content.replace(/^\n+/, '').replace(/\n+$/, '').trim();
                return (checked ? '- [x] ' : '- [ ] ') + text + '\n';
            }
        });
        td.addRule('taskList', {
            filter: function(node) {
                return node.nodeName === 'UL' && node.getAttribute('data-type') === 'taskList';
            },
            replacement: function(content) {
                return '\n' + content + '\n';
            }
        });
        return td.turndown(html);
    }

    function createEditor(element, placeholder, content) {
        const Editor = TiptapCore.Editor || TiptapCore.default?.Editor;
        const StarterKit = TiptapStarterKit.StarterKit || TiptapStarterKit.default;
        const TaskList = TiptapTaskList.TaskList || TiptapTaskList.default;
        const TaskItem = TiptapTaskItem.TaskItem || TiptapTaskItem.default;
        const Placeholder = TiptapPlaceholder.Placeholder || TiptapPlaceholder.default;

        // Convert markdown content to HTML for Tiptap
        const htmlContent = content ? mdToHtml(content) : '';

        const editor = new Editor({
            element,
            extensions: [
                StarterKit.configure({ heading: { levels: [1, 2, 3] } }),
                TaskList,
                TaskItem.configure({ nested: true }),
                Placeholder.configure({ placeholder }),
            ],
            content: htmlContent,
            onUpdate: () => {
                scheduleDailySave();
                updateSaveStatus('unsaved');
            },
        });

        return editor;
    }

    function destroyDailyEditors() {
        Object.keys(dailyEditors).forEach(key => {

    function getEditorMarkdown(editor) {
        if (!editor) return '';
        try {
            const html = editor.getHTML();
            if (!html || html === '<p></p>') return '';
            return htmlToMd(html);
        } catch {
            return editor.getText() || '';
        }
    }

    function updateSaveStatus(state, msg) {

        if (!status) return;
        switch (state) {
            case 'unsaved':
                status.textContent = '\u2022 unsaved changes';
                status.className = 'daily-save-status unsaved';
                break;
            case 'saving':

                status.className = 'daily-save-status saving';
                break;
            case 'saved':

                status.className = 'daily-save-status error';

                status.className = 'daily-save-status';

    async function loadMeetingsWithCalendar(data) {
        meetingCards = [];
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;
        container.innerHTML = '';

        // 1. Restore saved meeting cards
        const savedMeetings = [];
        if (data?.meetings) {
            let meetings = [];
            try {
                if (data.metadata?.meetings_structured) {
                    meetings = data.metadata.meetings_structured;
                }
            } catch {}

            if (meetings.length > 0) {
                meetings.forEach(m => {
                    savedMeetings.push({ title: m.title || '', notes: m.notes || '', time: m.time || '', fromCalendar: false });
                });
            } else {
                const md = data.meetings;
                const sections = md.split(/^## /gm).filter(s => s.trim());
                if (sections.length > 0 && md.includes('## ')) {
                    sections.forEach(section => {
                        const lines = section.split('\n');
                        const title = lines[0].trim();
                        const notes = lines.slice(1).join('\n').trim();
                        savedMeetings.push({ title, notes, fromCalendar: false });
                    });
                } else if (md.trim()) {
                    savedMeetings.push({ title: '', notes: md, fromCalendar: false });
                }
            }
        }

        // 2. Fetch calendar events from Supabase (synced by capture-bot on Railway)
        let calendarEvents = [];
        try {
            const { data: calData } = await db
                .from('calendar_events')
                .select('*')
                .eq('event_date', dailyNoteDate)
                .order('start_time', { ascending: true });

            if (calData && calData.length > 0) {
                calendarEvents = calData.map(e => ({
                    uid: e.uid,
                    title: e.title,
                    startTime: e.start_time,
                    endTime: e.end_time,
                    allDay: e.all_day,
                    location: e.location,
                    organizer: e.organizer,
                    attendees: e.attendees || [],
                }));
                console.log(`Calendar: ${calendarEvents.length} events for ${dailyNoteDate}`);
            }
        } catch (err) {
            console.warn('Calendar fetch failed:', err);
        }

        // 3. Create cards for saved meetings (collapsed by default)
        for (const m of savedMeetings) {
            await addMeetingCard(m.title, m.notes, { time: m.time || '' });
        }

        // 4. Add calendar events that don't already have a matching card
        const existingTitles = new Set(savedMeetings.map(m => m.title.toLowerCase().trim()));

        if (calendarEvents.length > 0) {
            console.log(`Calendar: found ${calendarEvents.length} events for ${dailyNoteDate}`);
        }

        for (const evt of calendarEvents) {
            const title = evt.title || '';
            // Skip if we already have a card with a similar title
            if (existingTitles.has(title.toLowerCase().trim())) continue;

            // Build time string for header
            let timeStr = '';
            if (evt.startTime && evt.endTime) {
                timeStr = `${evt.startTime}-${evt.endTime}`;
            } else if (evt.startTime) {
                timeStr = evt.startTime;
            } else if (evt.allDay) {
                timeStr = 'All day';
            }

            // Build pre-populated note with meeting details
            let prefill = '';
            if (evt.location) {
                prefill += `*${evt.location}*\n\n`;
            }
            if (evt.attendees && evt.attendees.length > 0) {
                prefill += `Attendees: ${evt.attendees.slice(0, 8).join(', ')}\n\n`;
            }

            await addMeetingCard(title, prefill, { time: timeStr });
            existingTitles.add(title.toLowerCase().trim());
        }

        // Init drag and drop (event delegation handles future cards too)
        initMeetingDragDrop();
    }

    function addMeetingCard(title, content, options = {}) {

        if (!container) return Promise.resolve();

        const id = ++meetingIdCounter;
        const startExpanded = options.expanded || false;
        const timeStr = options.time || '';
        const hasContent = !!(content && content.trim());

        const cardEl = document.createElement('div');
        cardEl.className = 'meeting-card' + (startExpanded ? ' expanded' : '');
        cardEl.id = `meeting-card-${id}`;

        const safeTitle = (title || '').replace(/"/g, '&quot;');

        cardEl.draggable = true;

        cardEl.innerHTML = `
            <div class="meeting-card-header" data-meeting-id="${id}">
                <span class="meeting-card-drag-handle" title="Drag to reorder">\u2261</span>

                ${timeStr ? `<span class="meeting-card-time">${timeStr}</span>` : ''}
                <span class="meeting-card-title-display">${title || 'Untitled Meeting'}</span>
                <span class="meeting-card-indicator ${hasContent ? 'has-notes' : ''}" id="meetingIndicator-${id}">\u25CF</span>
                <button class="meeting-card-remove" data-meeting-id="${id}" title="Remove meeting">\u00d7</button>
            </div>
            <div class="meeting-card-expanded-content">

                <div class="daily-toolbar" id="meetingToolbar-${id}"></div>
                <div class="daily-editor-wrap" id="meetingEditor-${id}"></div>
            </div>
        `;

        // Manually added cards go to top, loaded/calendar cards go to bottom
        if (startExpanded) {
            container.prepend(cardEl);
        } else {
            container.appendChild(cardEl);
        }

        // Wire header click to toggle
        cardEl.querySelector('.meeting-card-header').addEventListener('click', (e) => {
            // Don't toggle if clicking the remove button
            if (e.target.closest('.meeting-card-remove')) return;
            toggleMeetingCard(id);
        });

        // Wire remove button
        cardEl.querySelector('.meeting-card-remove').onclick = (e) => {
            e.stopPropagation();
            removeMeetingCard(id);
        };

        // Wire title input to update display title and trigger save
        cardEl.querySelector('.meeting-card-title-input').addEventListener('input', (e) => {
            const displayEl = cardEl.querySelector('.meeting-card-title-display');
            if (displayEl) displayEl.textContent = e.target.value || 'Untitled Meeting';
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Store card reference (editor created lazily on first expand)
        if (startExpanded) {
            meetingCards.unshift({ id, editor: null, content: content || '', time: timeStr });
        } else {
            meetingCards.push({ id, editor: null, content: content || '', time: timeStr });
        }

        // If starting expanded, init editor immediately
        if (startExpanded) {
            return initMeetingEditor(id);
        }
        return Promise.resolve();
    }

    function toggleMeetingCard(id) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (!cardEl) return;

        const isExpanded = cardEl.classList.toggle('expanded');

        if (isExpanded) {
            // Lazy init editor on first expand
            const mc = meetingCards.find(m => m.id === id);
            if (mc && !mc.editor) {
                initMeetingEditor(id);
            }
        } else {
            // Update has-notes indicator when collapsing
            updateMeetingIndicator(id);
        }
    }

    function initMeetingEditor(id) {
        return new Promise(resolve => {
            requestAnimationFrame(() => {
                const editorEl = document.getElementById(`meetingEditor-${id}`);
                if (!editorEl) { resolve(); return; }

                const mc = meetingCards.find(m => m.id === id);
                if (!mc || mc.editor) { resolve(); return; }

                const editor = createEditor(editorEl, 'Meeting notes...', mc.content || '');
                mc.editor = editor;

                requestAnimationFrame(() => {
                    buildToolbar(`meetingToolbar-${id}`, editor);
                    resolve();
                });
            });
        });
    }

    function updateMeetingIndicator(id) {
        const mc = meetingCards.find(m => m.id === id);
        const indicator = document.getElementById(`meetingIndicator-${id}`);
        if (!mc || !indicator) return;

        const hasNotes = mc.editor ? !!(getEditorMarkdown(mc.editor).trim()) : !!(mc.content && mc.content.trim());
        indicator.classList.toggle('has-notes', hasNotes);
    }

    function initMeetingDragDrop() {
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;

        let draggedCard = null;

        container.addEventListener('dragstart', (e) => {
            const card = e.target.closest('.meeting-card');
            if (!card) return;
            draggedCard = card;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', card.id);
        });

        container.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const card = e.target.closest('.meeting-card');
            if (!card || card === draggedCard) return;

            // Clear all drag indicators
            container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(
                el => el.classList.remove('drag-over-top', 'drag-over-bottom')
            );

            // Drop above or below midpoint
            const rect = card.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            if (e.clientY < midY) {
                card.classList.add('drag-over-top');
            } else {
                card.classList.add('drag-over-bottom');
            }
        });

        container.addEventListener('dragleave', (e) => {
            const card = e.target.closest('.meeting-card');
            if (card) card.classList.remove('drag-over-top', 'drag-over-bottom');
        });

        container.addEventListener('drop', (e) => {
            e.preventDefault();
            container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(
                el => el.classList.remove('drag-over-top', 'drag-over-bottom')
            );

            const targetCard = e.target.closest('.meeting-card');
            if (!targetCard || !draggedCard || targetCard === draggedCard) return;

            const rect = targetCard.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            if (e.clientY < midY) {
                container.insertBefore(draggedCard, targetCard);
            } else {
                container.insertBefore(draggedCard, targetCard.nextSibling);
            }

            syncMeetingCardsOrder();
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        container.addEventListener('dragend', () => {
            if (draggedCard) {
                draggedCard.classList.remove('dragging');
                draggedCard = null;
            }
            container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(
                el => el.classList.remove('drag-over-top', 'drag-over-bottom')
            );
        });
    }

    function syncMeetingCardsOrder() {
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;

        const newOrder = [];
        container.querySelectorAll('.meeting-card').forEach(el => {
            const idMatch = el.id.match(/meeting-card-(\d+)/);
            if (idMatch) {
                const mcId = parseInt(idMatch[1]);
                const mc = meetingCards.find(m => m.id === mcId);
                if (mc) newOrder.push(mc);
            }
        });
        meetingCards = newOrder;
    }

    function removeMeetingCard(id) {
        const idx = meetingCards.findIndex(mc => mc.id === id);
        if (idx !== -1) {
            meetingCards[idx].editor?.destroy();
            meetingCards.splice(idx, 1);
        }
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (cardEl) cardEl.remove();
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function getMeetingsData() {
        // Collect structured meeting data
        const structured = meetingCards.map(mc => {
            const titleEl = document.querySelector(`.meeting-card-title-input[data-meeting-id="${mc.id}"]`);
            const notes = mc.editor ? getEditorMarkdown(mc.editor) : (mc.content || '');
            return {
                title: titleEl?.value?.trim() || '',
                notes: notes,
                time: mc.time || '',
            };
        }).filter(m => m.title || m.notes);

        // Also build a combined markdown string for the meetings column (backward compatible)
        const markdown = structured.map(m => {
            const heading = m.title ? `## ${m.title}\n\n` : '';
            return heading + m.notes;
        }).join('\n\n---\n\n');

        return { markdown, structured };
    }

    function buildToolbar(containerId, editor) {
        const container = document.getElementById(containerId);
        if (!container || !editor) return;

        const buttons = [
            { label: 'B', cmd: () => editor.chain().focus().toggleBold().run(), active: () => editor.isActive('bold'), title: 'Bold (Cmd+B)' },
            { label: 'I', cmd: () => editor.chain().focus().toggleItalic().run(), active: () => editor.isActive('italic'), title: 'Italic (Cmd+I)' },
            { type: 'sep' },
            { label: 'H1', cmd: () => editor.chain().focus().toggleHeading({ level: 1 }).run(), active: () => editor.isActive('heading', { level: 1 }), title: 'Heading 1' },
            { label: 'H2', cmd: () => editor.chain().focus().toggleHeading({ level: 2 }).run(), active: () => editor.isActive('heading', { level: 2 }), title: 'Heading 2' },
            { label: 'H3', cmd: () => editor.chain().focus().toggleHeading({ level: 3 }).run(), active: () => editor.isActive('heading', { level: 3 }), title: 'Heading 3' },
            { type: 'sep' },
            { label: '\u2022', cmd: () => editor.chain().focus().toggleBulletList().run(), active: () => editor.isActive('bulletList'), title: 'Bullet list' },
            { label: '1.', cmd: () => editor.chain().focus().toggleOrderedList().run(), active: () => editor.isActive('orderedList'), title: 'Numbered list' },
            { label: '\u2610', cmd: () => editor.chain().focus().toggleTaskList().run(), active: () => editor.isActive('taskList'), title: 'Task list' },
            { label: '\u275D', cmd: () => editor.chain().focus().toggleBlockquote().run(), active: () => editor.isActive('blockquote'), title: 'Quote' },
        ];

        container.innerHTML = buttons.map((b, i) =>
            b.type === 'sep'
                ? '<span class="daily-toolbar-sep"></span>'
                : `<button title="${b.title}" data-idx="${i}">${b.label}</button>`
        ).join('');

        container.querySelectorAll('button[data-idx]').forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.cmd) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    b.cmd();
                });
            }
        });

        editor.on('selectionUpdate', () => updateToolbarActive(container, buttons));
        editor.on('update', () => updateToolbarActive(container, buttons));
    }

    function updateToolbarActive(container, buttons) {
        const btns = container.querySelectorAll('button[data-idx]');
        btns.forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.active) btn.classList.toggle('is-active', b.active());
        });
    }

    function scheduleDailySave() {
        dailyIsDirty = true;
        if (dailySaveTimer) clearTimeout(dailySaveTimer);
        dailySaveTimer = setTimeout(saveDailyNote, 1000);
    }

    async function saveDailyNote() {
        if (!dailyNoteDate) return;

        updateSaveStatus('saving');

        const meetingsData = getMeetingsData();

        const payload = {
            note_date: dailyNoteDate,
            tasks: getEditorMarkdown(dailyEditors.tasks),
            notes: getEditorMarkdown(dailyEditors.notes),
            meetings: meetingsData.markdown,
            metadata: { meetings_structured: meetingsData.structured },
        };

        try {
            const res = await fetch('/api/daily-notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error(await res.text());

            const result = await res.json();
            dailyNoteId = result.daily_note?.id || dailyNoteId;
            dailyIsDirty = false;
            updateSaveStatus('saved');
        } catch (err) {
            updateSaveStatus('error', 'save failed — retry in 5s');
            console.error('Daily note save failed:', err);
            // Auto-retry once after 5 seconds
            setTimeout(() => { if (dailyIsDirty) saveDailyNote(); }, 5000);
        }
    }

    function navigateDailyNote(offset) {
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
        destroyDailyEditors();

        const d = new Date(dailyNoteDate + 'T12:00:00');
        d.setDate(d.getDate() + offset);
        const newDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        loadDailyNote(newDate);
    }

    function openDailyDatePicker() {
        const input = document.createElement('input');
        input.type = 'date';
        input.value = dailyNoteDate;
        input.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
        document.body.appendChild(input);

        input.addEventListener('change', () => {
            if (input.value) {
                if (dailyIsDirty) {
                    clearTimeout(dailySaveTimer);
                    saveDailyNote();
                }
                destroyDailyEditors();
                loadDailyNote(input.value);
            }
            input.remove();
        });
        input.addEventListener('blur', () => setTimeout(() => input.remove(), 200));

        try { input.showPicker(); } catch { input.click(); }
    }

    // ─── Helpers ──────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        const el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
    }

    function renderBody(text) {
        if (!text) return '<em style="color:var(--text-muted)">No content.</em>';
        // If the text looks like markdown (has headings, bold, links, lists)
        // render it as markdown; otherwise treat as plain text with paragraphs
        const hasMarkdown = /^#{1,4}\s|^\*\*|\[.+\]\(.+\)|^- |^\d+\.\s/m.test(text);
        if (hasMarkdown && typeof marked !== 'undefined') {
            return marked.parse(text);
        }
        // Plain text: convert line breaks to paragraphs
        return text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
    }

    function formatDate(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        const day = d.getDate().toString().padStart(2, '0');
        const mon = (d.getMonth() + 1).toString().padStart(2, '0');
        const yr = d.getFullYear().toString().slice(-2);
        const hr = d.getHours().toString().padStart(2, '0');
        const mn = d.getMinutes().toString().padStart(2, '0');
        return `${day}/${mon}/${yr} ${hr}:${mn}`;
    }

    function truncUrl(url) {
        if (!url) return '';
        try {
            const u = new URL(url);
            const path = u.pathname.length > 40 ? u.pathname.substring(0, 40) + '...' : u.pathname;
            return u.hostname + path;
        } catch { return url.substring(0, 60); }
    }

    // ─── Tag editor ─────────────────────────────────────────────
    function buildTagEditor(tags) {
        const pills = tags.map(t =>
            `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}">×</span></span>`
        ).join('');
        return `<div class="tag-editor">
            ${pills}
            <span class="tag-input-wrap">
                <input type="text" class="tag-input" id="tagInput" placeholder="add tag..." autocomplete="off">
                <div class="tag-suggestions" id="tagSuggestions"></div>
            </span>
            <span class="tag-status" id="tagStatus"></span>
        </div>`;
    }

    function wireTagEditor() {
        const input = document.getElementById('tagInput');
        const sugBox = document.getElementById('tagSuggestions');
        if (!input || !sugBox) return;
        let activeIdx = -1;

        function showSuggestions() {
            const val = input.value.trim().toLowerCase();
            const currentTags = currentModalItem?.tags || [];
            const matches = allTags
                .filter(t => !currentTags.includes(t) && t.includes(val))
                .slice(0, 8);

            if (!val || matches.length === 0) {
                sugBox.classList.remove('visible');
                sugBox.innerHTML = '';
                activeIdx = -1;
                return;
            }

            activeIdx = -1;
            sugBox.innerHTML = matches.map(t =>
                `<div class="tag-suggestion" data-tag="${esc(t)}">${esc(t)}</div>`
            ).join('');
            sugBox.classList.add('visible');

            sugBox.querySelectorAll('.tag-suggestion').forEach(el => {
                el.addEventListener('mousedown', async e => {
                    e.preventDefault();
                    await addTag(el.dataset.tag);
                });
            });
        }

        input.addEventListener('input', showSuggestions);
        input.addEventListener('focus', showSuggestions);
        input.addEventListener('blur', () => {
            setTimeout(() => sugBox.classList.remove('visible'), 150);
        });

        input.addEventListener('keydown', async e => {
            const items = sugBox.querySelectorAll('.tag-suggestion');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, -1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'Escape') {
                sugBox.classList.remove('visible');
                activeIdx = -1;
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                // Use selected suggestion or typed value
                let tag;
                if (activeIdx >= 0 && items[activeIdx]) {
                    tag = items[activeIdx].dataset.tag;
                } else {
                    tag = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-').replace(/-+/g, '-');
                }
                if (tag) await addTag(tag);
            }
        });

        async function addTag(tag) {
            if (!tag || !currentModalItem) return;
            if (currentModalItem.tags?.includes(tag)) { input.value = ''; sugBox.classList.remove('visible'); return; }
            const newTags = [...(currentModalItem.tags || []), tag];
            // Add to global list if new
            if (!allTags.includes(tag)) { allTags.push(tag); allTags.sort(); }
            await updateTags(currentModalItem.id, newTags);
        }

        document.querySelectorAll('.tag-remove').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                const tag = btn.dataset.tag;
                if (!currentModalItem) return;
                const newTags = (currentModalItem.tags || []).filter(t => t !== tag);
                await updateTags(currentModalItem.id, newTags);
            });
        });
    }

    async function updateTags(id, tags) {
        const status = document.getElementById('tagStatus');
        status.textContent = 'saving...';
        status.className = 'tag-status saving';

        try {
            const res = await fetch('/api/content/tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, tags }),
            });
            if (!res.ok) throw new Error(await res.text());

            // Update in-memory data
            if (currentModalItem) {
                currentModalItem.tags = tags;
                // Re-render the tag editor
                const metaEl = document.getElementById('contentModalMeta');
                const editorEl = metaEl.querySelector('.tag-editor');
                if (editorEl) {
                    editorEl.outerHTML = buildTagEditor(tags);
                    wireTagEditor();
                }
            }
            status.textContent = '✓';
            status.className = 'tag-status saved';
            setTimeout(() => { if (status) status.textContent = ''; }, 1500);
        } catch (err) {
            status.textContent = 'failed';
            status.className = 'tag-status error';
            console.error('Tag update failed:', err);
        }
    }

    document.getElementById('contentOverlay').addEventListener('click', closeContentModal);
    document.getElementById('contentClose').addEventListener('click', closeContentModal);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeContentModal();
    });

    // ─── Keyboard shortcuts ──────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's' && currentView === 'daily-note') {
            e.preventDefault();
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
    });

    // Save before unload
    window.addEventListener('beforeunload', (e) => {
        if (dailyIsDirty && currentView === 'daily-note') {
            saveDailyNote();
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ─── Boot ─────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
