    function renderAssetCard(asset) {
        const isImage = (asset.mime_type || '').startsWith('image/');
        const isPdf = asset.mime_type === 'application/pdf';
        const icon = getFileIcon(asset.mime_type);
        const size = formatFileSize(asset.file_size);
        const date = formatDate(asset.uploaded_at);
        const fileUrl = `/api/assets/file/${asset.r2_key}`;

        return `
            <div class="asset-card" data-asset-id="${asset.id}">
                <div class="asset-card-preview">
                    ${isImage
                        ? `<img src="${esc(fileUrl)}" alt="${esc(asset.filename)}" loading="lazy">`
                        : isPdf
                            ? `<canvas class="pdf-thumb" data-pdf-url="${esc(fileUrl)}" width="200" height="140"></canvas>`
                            : `<span class="asset-icon">${icon}</span>`
                    }
                </div>
                <div class="asset-card-info">
                    <div style="display: flex; align-items: center; gap: 0.3rem;">
                        <div class="asset-card-name" title="${esc(asset.filename)}" style="flex: 1;">${esc(asset.filename)}</div>
                        <button class="asset-copy-btn" data-copy-url="${location.origin}${fileUrl}" title="Copy link" onclick="event.stopPropagation()"><i class="icon icon-sm" data-lucide="link"></i></button>
                    </div>
                    <div class="asset-card-meta">${size} · ${date}</div>
                    ${(asset.tags || []).length ? `
                        <div class="asset-card-tags">
                            ${asset.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }

    function renderAssetListRow(asset) {
        const isImage = (asset.mime_type || '').startsWith('image/');
        const isPdf = asset.mime_type === 'application/pdf';
        const icon = getFileIcon(asset.mime_type);
        const size = formatFileSize(asset.file_size);
        const date = formatDate(asset.uploaded_at);
        const fileUrl = `/api/assets/file/${asset.r2_key}`;
        const ext = (asset.filename.split('.').pop() || '').toUpperCase();

        return `
            <div class="asset-list-row" data-asset-id="${asset.id}">
                <div class="asset-list-thumb">
                    ${isImage
                        ? `<img src="${esc(fileUrl)}" alt="" loading="lazy">`
                        : `<span>${icon}</span>`
                    }
                </div>
                <div class="asset-list-name" title="${esc(asset.filename)}">${esc(asset.filename)}</div>
                <div class="asset-list-type">${ext}</div>
                <div class="asset-list-size">${size}</div>
                <div class="asset-list-date">${date}</div>
                <button class="asset-copy-btn" data-copy-url="${location.origin}${fileUrl}" title="Copy link" onclick="event.stopPropagation()"><i class="icon icon-sm" data-lucide="link"></i></button>
            </div>
        `;
    }

    function renderPdfThumbnails() {
        if (typeof pdfjsLib === 'undefined') return;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.querySelectorAll('.pdf-thumb').forEach(async canvas => {
            const url = canvas.dataset.pdfUrl;
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.5 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            } catch {
                // If PDF rendering fails, show icon instead
                canvas.parentElement.innerHTML = `<span class="asset-icon">${icon('file-text', 'icon-xl')}</span>`;
                refreshIcons();
            }
        });
    }

    // Lucide icon helper — returns inline SVG HTML
    function icon(name, cls = '') {
        const sizeClass = cls ? ` ${cls}` : '';
        return `<i class="icon${sizeClass}" data-lucide="${name}"></i>`;
    }

    function getFileIcon(mimeType) {
        if (!mimeType) return icon('file');
        if (mimeType.startsWith('image/')) return icon('image');
        if (mimeType === 'application/pdf') return icon('file-text');
        if (mimeType.includes('spreadsheet') || mimeType.includes('excel') || mimeType.includes('.sheet')) return icon('sheet');
        if (mimeType.includes('presentation') || mimeType.includes('powerpoint') || mimeType.includes('.presentation')) return icon('presentation');
        if (mimeType.includes('document') || mimeType.includes('word') || mimeType.includes('.document')) return icon('file-text');
        if (mimeType.startsWith('text/')) return icon('file-type');
        if (mimeType.includes('zip') || mimeType.includes('compressed')) return icon('archive');
        return icon('file');
    }

    function formatFileSize(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0;
        let size = bytes;
        while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
        return `${size.toFixed(i > 0 ? 1 : 0)} ${units[i]}`;
    }

    function wireAssetEvents() {
        // Upload zone click
        const dropZone = document.getElementById('assetDropZone');
        const fileInput = document.getElementById('assetFileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) uploadAssetFiles(e.target.files);
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadAssetFiles(e.dataTransfer.files);
        });

        // Type filters
        document.querySelectorAll('[data-asset-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                assetFilter.type = btn.dataset.assetType || null;
                loadAssets();
            });
        });

        // Tag filter
        const tagSel = document.getElementById('assetTagFilter');
        if (tagSel) {
            tagSel.addEventListener('change', () => {
                assetFilter.tag = tagSel.value || null;
                loadAssets();
            });
        }

        // View mode toggle
        document.querySelectorAll('[data-view-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                assetViewMode = btn.dataset.viewMode;
                localStorage.setItem('assetViewMode', assetViewMode);
                loadAssets();
            });
        });

        // Copy link buttons
        document.querySelectorAll('.asset-copy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const url = btn.dataset.copyUrl;
                try {
                    await navigator.clipboard.writeText(url);
                    btn.textContent = '✓';
                    setTimeout(() => { btn.innerHTML = '<i class="icon icon-sm" data-lucide="link"></i>'; refreshIcons(); }, 1500);
                } catch {
                    // Fallback
                    const tmp = document.createElement('input');
                    tmp.value = url;
                    document.body.appendChild(tmp);
                    tmp.select();
                    document.execCommand('copy');
                    document.body.removeChild(tmp);
                    btn.textContent = '✓';
                    setTimeout(() => { btn.innerHTML = '<i class="icon icon-sm" data-lucide="link"></i>'; refreshIcons(); }, 1500);
                }
            });
        });

        // Card/row clicks → detail view
        document.querySelectorAll('.asset-card, .asset-list-row[data-asset-id]').forEach(card => {
            card.addEventListener('click', () => {
                const asset = assetsData.find(a => a.id === card.dataset.assetId);
                if (asset) openAssetDetail(asset);
            });
        });
    }

    async function uploadAssetFiles(files) {
        const progress = document.getElementById('assetUploadProgress');
        const total = files.length;
        let done = 0;

        for (const file of files) {
            progress.innerHTML = `<span style="color: var(--accent);">Uploading ${done + 1}/${total}: ${esc(file.name)}...</span>`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/assets/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    progress.innerHTML = `<span style="color: var(--red);">Failed: ${esc(file.name)} — ${err.error || 'Unknown error'}</span>`;
                    continue;
                }

                done++;
            } catch (err) {
                progress.innerHTML = `<span style="color: var(--red);">Error: ${err.message}</span>`;
            }
        }

        progress.innerHTML = `<span style="color: var(--accent);">✓ ${done}/${total} files uploaded</span>`;
        setTimeout(() => { progress.innerHTML = ''; }, 3000);

        // Refresh view and counts
        loadAssets();
        loadCounts();
    }

        const tbody = document.getElementById('promptsBody');

            <tr class="expandable" data-id="${p.id}">

                <td style="font-size: 0.8rem; color: var(--text-muted);">v${p.version || 1}</td>
            </tr>
        `).join('');

        tbody.querySelectorAll('tr.expandable').forEach(row => {
            row.addEventListener('click', async () => {
                const prompt = promptsData.find(p => String(p.id) === row.dataset.id);
                if (!prompt) return;

    async function loadAsk() {
        const main = document.getElementById('mainContent');
        const sourceTableLabels = {

            daily_notes: `${icon('calendar-days')} Daily Note`,
            summaries: `${icon('scroll-text')} Summary`,
            people: `${icon('user')} Person`,

            products: `${icon('box')} Product`,

            people_log: `${icon('users')} People Note`,
            product_evidence: `${icon('microscope')} Product Evidence`,
            product_decisions: `${icon('scale')} Decision`,
            reflections_log: `${icon('brain')} Reflection`,
        };

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Ask AI</h2>
            </div>
            <div class="ask-container">
                <textarea id="askInput" class="ask-input" placeholder="Ask a question about your knowledge base..." rows="2"></textarea>
                <div class="ask-buttons">
                    <button id="askBtn" class="btn btn-primary">Ask</button>
                    <button id="searchBtn" class="btn">Search Only</button>
                </div>
                <div class="ask-filter-toggle" id="askFilterToggle">▸ Filters</div>
                <div class="ask-filters" id="askFilters">
                    <div style="margin-bottom:0.75rem">
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em">Source types</div>
                        ${Object.entries(sourceTableLabels).map(([key, label]) => `
                            <label><input type="checkbox" value="${key}" checked> ${label}</label>
                        `).join('')}
                    </div>
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;border-top:1px solid var(--border);padding-top:0.75rem">
                        <div>
                            <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.05em">Date range</div>
                            <div style="display:flex;gap:0.4rem;align-items:center">
                                <input type="date" id="askDateFrom" class="input" style="font-size:0.8rem;padding:0.3rem 0.5rem">
                                <span style="color:var(--text-muted);font-size:0.8rem">to</span>
                                <input type="date" id="askDateTo" class="input" style="font-size:0.8rem;padding:0.3rem 0.5rem">
                            </div>
                        </div>
                        <div>
                            <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.05em">Tags</div>
                            <input type="text" id="askTagFilter" class="input" placeholder="filter by tag..." style="font-size:0.8rem;padding:0.3rem 0.5rem;width:180px">
                        </div>
                    </div>
                </div>
                <div id="askResult"></div>
            </div>
        `;

        const input = document.getElementById('askInput');
        const resultDiv = document.getElementById('askResult');

        // Filter toggle
        document.getElementById('askFilterToggle').addEventListener('click', () => {
            const filters = document.getElementById('askFilters');
            filters.classList.toggle('open');
            document.getElementById('askFilterToggle').textContent =
                filters.classList.contains('open') ? '▾ Filter by source type' : '▸ Filter by source type';
        });

        function getSelectedTables() {
            const checkboxes = document.querySelectorAll('#askFilters input:checked');
            const all = document.querySelectorAll('#askFilters input');
            if (checkboxes.length === all.length) return null; // all selected = no filter
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function renderSources(sources) {
            if (!sources || !sources.length) return '';
            return `
                <div class="ask-sources">
                    <h4>Sources (${sources.length})</h4>
                    ${sources.map(s => {
                        const icon = sourceTableLabels[s.source_table] || '📄 ' + s.source_table;
                        return `
                            <div class="ask-source-item" data-table="${esc(s.source_table)}" data-id="${esc(s.source_id)}">
                                <span class="ask-source-title">${esc(icon.split(' ').slice(1).join(' '))} — ${esc(s.title)}</span>
                                <span class="ask-source-date">${esc(s.date || '')}</span>
                                <span class="ask-source-score">${s.similarity}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // Ask button
        document.getElementById('askBtn').addEventListener('click', async () => {
            const question = input.value.trim();
            if (!question) return;

            resultDiv.innerHTML = '<div class="ask-loading"><span class="spinner"></span> Searching knowledge base and generating answer...</div>';

            try {
                const body = { question };
                const tables = getSelectedTables();
                if (tables) body.tables = tables;
                const dateFrom = document.getElementById('askDateFrom')?.value;
                const dateTo = document.getElementById('askDateTo')?.value;
                const tagFilter = document.getElementById('askTagFilter')?.value?.trim();
                if (dateFrom) body.date_from = dateFrom;
                if (dateTo) body.date_to = dateTo;
                if (tagFilter) body.tags = tagFilter.split(',').map(t => t.trim()).filter(Boolean);

                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!data.ok) throw new Error(data.error || 'Ask failed');

                resultDiv.innerHTML = `
                    <div class="ask-answer">${marked.parse(data.answer)}</div>
                    ${renderSources(data.sources)}
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="ask-answer" style="color: #c45050;">Error: ${esc(err.message)}</div>`;
            }
        });

        // Search only button
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = input.value.trim();
            if (!query) return;

            resultDiv.innerHTML = '<div class="ask-loading"><span class="spinner"></span> Searching...</div>';

            try {
                const body = { query, limit: 15 };
                const tables = getSelectedTables();
                if (tables) body.tables = tables;
                const dateFrom = document.getElementById('askDateFrom')?.value;
                const dateTo = document.getElementById('askDateTo')?.value;
                const tagFilter = document.getElementById('askTagFilter')?.value?.trim();
                if (dateFrom) body.date_from = dateFrom;
                if (dateTo) body.date_to = dateTo;
                if (tagFilter) body.tags = tagFilter.split(',').map(t => t.trim()).filter(Boolean);

                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!data.ok) throw new Error(data.error || 'Search failed');

                if (!data.results.length) {
                    resultDiv.innerHTML = '<div class="ask-answer" style="color: var(--text-muted);">No matching results found.</div>';
                    return;
                }

                resultDiv.innerHTML = `
                    <div class="ask-sources" style="margin-top: 1.5rem;">
                        <h4>Results (${data.results.length})</h4>
                        ${data.results.map(r => {
                            const meta = r.metadata || {};
                            const icon = sourceTableLabels[r.source_table] || r.source_table;
                            return `
                                <div class="ask-source-item" data-table="${esc(r.source_table)}" data-id="${esc(r.source_id)}" style="flex-direction: column; align-items: stretch;">
                                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                                        <span class="ask-source-title">${esc(icon.split(' ').slice(1).join(' '))} — ${esc(meta.title || r.source_table)}</span>
                                        <span class="ask-source-date">${esc(meta.date || '')}</span>
                                        <span class="ask-source-score">${Math.round(r.similarity * 100) / 100}</span>
                                    </div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.35rem; white-space: pre-wrap;">${esc(r.content_text.substring(0, 300))}${r.content_text.length > 300 ? '...' : ''}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="ask-answer" style="color: #c45050;">Error: ${esc(err.message)}</div>`;
            }
        });

        // Enter key to ask
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('askBtn').click();
            }
        });
    }

    // Global functions for connection management (called from onclick)
    window.toggleConnType = function() {
        const isAE = document.getElementById('connType').value === 'ae';
        document.getElementById('connWcpFields').style.display = isAE ? 'none' : '';
        document.getElementById('connAeFields').style.display = isAE ? '' : 'none';

    window.activateMisConn = async function(id) {
        await fetch(`/api/mis/connections/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_active: true }),
        });
        await fetchMisProfiles();
        loadSettingsConnections();
    };

    window.editMisConn = function(id) {
        const p = (_misProfilesCache || []).find(pp => pp.id === id);
        if (!p) return;
        document.getElementById('connFormWrap').style.display = 'block';
        document.getElementById('connFormTitle').textContent = 'Edit Connection';
        document.getElementById('connEditId').value = id;
        document.getElementById('connName').value = p.name || '';
        document.getElementById('connType').value = p.type || 'wcp';
        toggleConnType();
        if (p.type === 'wcp') {
            const clusterMatch = CLUSTER_OPTIONS.find(c => c.value === p.cluster);
            document.getElementById('connCluster').value = clusterMatch ? p.cluster : 'custom';
            if (!clusterMatch) {
                document.getElementById('connCustomClusterWrap').style.display = '';
                document.getElementById('connCustomCluster').value = p.cluster || '';
            }
            document.getElementById('connEcan').value = p.ecan || '';
            document.getElementById('connRepoId').value = p.repoId || '';
        } else {
            document.getElementById('connServerUrl').value = p.serverUrl || '';
        }
        document.getElementById('connToken').value = '';
        document.getElementById('connTokenHint').style.display = '';
    };

    window.deleteMisConn = async function(id) {
        if (!confirm('Delete this connection?')) return;
        await fetch(`/api/mis/connections/${id}`, { method: 'DELETE' });
        await fetchMisProfiles();
        loadSettingsConnections();
    };

    window.saveMisConn = async function() {
        const status = document.getElementById('connSaveStatus');
        status.textContent = 'saving...';
        status.className = 'modal-save-status saving';
        try {
            const editId = document.getElementById('connEditId').value;
            const type = document.getElementById('connType').value;
            const cluster = type === 'wcp'
                ? (document.getElementById('connCluster').value === 'custom'
                    ? document.getElementById('connCustomCluster').value.trim()
                    : document.getElementById('connCluster').value)
                : null;
            const body = {
                name: document.getElementById('connName').value.trim(),
                type,
                cluster,
                ecan: type === 'wcp' ? document.getElementById('connEcan').value.trim() : null,
                repo_id: type === 'wcp' ? document.getElementById('connRepoId').value.trim() : null,
                server_url: type === 'ae' ? document.getElementById('connServerUrl').value.trim() : null,
            };
            const token = document.getElementById('connToken').value;
            if (token) body.token = token;

            if (!body.name) throw new Error('Connection name is required');

            if (editId) {
                await fetch(`/api/mis/connections/${editId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            } else {
                if (!token) throw new Error('Token is required for new connections');
                await fetch('/api/mis/connections', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            }

            await fetchMisProfiles();
            document.getElementById('connFormWrap').style.display = 'none';
            loadSettingsConnections();
            status.textContent = 'saved';
            status.className = 'modal-save-status saved';
        } catch (err) {
            status.textContent = err.message || 'failed';
            status.className = 'modal-save-status error';
        }
    };

        document.getElementById('embedAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('embedAllBtn');
            const progress = document.getElementById('embedProgress');
            btn.disabled = true;
            btn.textContent = 'Embedding...';
            progress.style.display = 'block';

            let totalEmbedded = {};
            let hasMore = true;
            let rounds = 0;

            while (hasMore && rounds < 100) {
                rounds++;
                if (rounds > 1) await new Promise(r => setTimeout(r, 500)); // brief pause between rounds
                try {
                    const res = await fetch('/api/embed-batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({}),
                    });
                    const data = await res.json();
                    if (!data.ok) {
                        progress.innerHTML = `<span style="color: #c45050;">Error: ${data.error || 'Unknown error'}</span>`;
                        break;
                    }

                    // Accumulate counts
                    for (const [table, count] of Object.entries(data.embedded)) {
                        totalEmbedded[table] = (totalEmbedded[table] || 0) + count;
                    }

                    const total = Object.values(totalEmbedded).reduce((a, b) => a + b, 0);
                    const breakdown = Object.entries(totalEmbedded)
                        .filter(([, c]) => c > 0)
                        .map(([t, c]) => `${t}: <span class="count">${c}</span>`)
                        .join(', ');

                    progress.innerHTML = `Embedded <span class="count">${total}</span> items${data.remaining ? ' (continuing...)' : ' (done!)'}<br>${breakdown || 'No new items to embed.'}`;
                    hasMore = data.remaining;
                } catch (err) {
                    progress.innerHTML = `<span style="color: #c45050;">Error: ${err.message}</span>`;
                    hasMore = false;
                }
            }

            btn.disabled = false;
            btn.textContent = 'Embed All Content';
        });
    }

    // ─── Content modal ─────────────────────────────────────────
    let currentModalItem = null;

    async function openContentModal(item) {
        currentModalItem = item;
        document.getElementById('contentModalTitle').textContent = item.title || 'Untitled';

        const meta = [];
        if (item.source) meta.push(`<span>Source: ${esc(item.source)}</span>`);
        if (item.author) meta.push(`<span>Author: ${esc(item.author)}</span>`);
        if (item.captured_at) meta.push(`<span>Captured: ${formatDate(item.captured_at)}</span>`);
        if (item.metadata?.published_date) meta.push(`<span>Published: ${esc(item.metadata.published_date)}</span>`);
        if (item.url) meta.push(`<span><a href="${esc(item.url)}" target="_blank" rel="noopener">Open original ↗</a></span>`);
        meta.push(buildTagEditor(item.tags || []));
        document.getElementById('contentModalMeta').innerHTML = meta.join('');
        wireTagEditor();

        // Fetch linked products and companies for this content item
        const [{ data: productLinks }, { data: companyLinks }] = await Promise.all([
            db.from('product_content')
                .select('id, product_id, products(id, name, companies(name, type))')
                .eq('content_id', item.id),
            db.from('company_content')
                .select('id, company_id, companies(id, name, type)')
                .eq('content_id', item.id),
        ]);
        const linkedProducts = (productLinks || []).filter(pl => pl.products);
        const linkedCompanies = (companyLinks || []).filter(cl => cl.companies);

        // Build linked items bar (products + competitors)
        const linkedBar = `
            <div class="linked-products-bar" id="contentLinkedItems">
                ${linkedCompanies.map(cl => `
                    <span class="linked-pill competitor">
                        <i class="icon" data-lucide="building-2" style="width:12px;height:12px"></i>
                        ${esc(cl.companies.name)}
                        <span class="unlink-x" data-junction-id="${cl.id}" data-junction-table="company_content" title="Unlink">×</span>
                    </span>
                `).join('')}
                ${linkedProducts.map(pl => `
                    <span class="linked-pill">
                        ${esc(pl.products.name)}${pl.products.companies ? ` <span style="opacity:0.6">(${esc(pl.products.companies.name)})</span>` : ''}
                        <span class="unlink-x" data-junction-id="${pl.id}" data-junction-table="product_content" title="Unlink">×</span>
                    </span>
                `).join('')}
                <button class="link-add-btn" id="linkContentToCompetitor">+ Competitor</button>
                <button class="link-add-btn" id="linkContentToProduct">+ Product</button>
            </div>
        `;

        // Status action buttons (only for articles/content, not for company/product modals)
        const statusBar = item.status ? `
            <div class="article-status-actions" id="articleStatusActions">
                <span style="font-size:0.75rem; color:var(--text-muted); margin-right:0.25rem;">Status:</span>
                <button class="btn-sm ${item.status === 'new' ? 'active-status' : ''}" data-set-status="new">New</button>
                <button class="btn-sm ${item.status === 'read' ? 'active-status' : ''}" data-set-status="read">Read</button>
                <button class="btn-sm ${item.status === 'archived' ? 'active-status' : ''}" data-set-status="archived">Archived</button>
                ${item.type === 'article' ? '<button class="btn-sm" id="extractSignalsBtn" style="background:rgba(196,168,80,0.15);color:var(--yellow);margin-left:0.5rem"><i class="icon" data-lucide="radar" style="width:12px;height:12px"></i> Extract Signals</button>' : ''}
                <span style="flex:1"></span>
                <button class="btn-sm btn-danger" id="deleteArticleBtn" title="Delete article">Delete</button>
            </div>
        ` : '';

        // Source backlinks for signals
        const sourceIds = item.metadata?.source_ids || [];
        let sourceBar = '';
        if (sourceIds.length) {
            const contentSourceIds = sourceIds.filter(s => s.type === 'content').map(s => s.id);
            if (contentSourceIds.length) {
                const { data: sourceItems } = await db.from('content').select('id, title, type').in('id', contentSourceIds);
                if (sourceItems?.length) {
                    sourceBar = `<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.75rem;padding:0.5rem 0.75rem;background:rgba(196,168,80,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--yellow)">
                        <i class="icon" data-lucide="link" style="width:12px;height:12px"></i> Sources: ${sourceItems.map(s =>
                            `<a href="#" class="source-backlink" data-id="${s.id}" style="color:var(--yellow)">${esc(s.title)}</a>`
                        ).join(', ')}
                    </div>`;
                }
            }
        }

        const heroImg = item.metadata?.image_url
            ? `<img src="${item.metadata.image_url}" class="article-hero-image" loading="lazy">`
            : '';
        document.getElementById('contentModalBody').innerHTML = linkedBar + statusBar + sourceBar + heroImg + renderBody(item.body);
        // Signal extraction results container
        if (item.type === 'article') {
            document.getElementById('contentModalBody').insertAdjacentHTML('beforeend', '<div id="extractedSignalsContainer"></div>');
        }
        document.querySelector('.content-modal-scroll').scrollTop = 0;
        document.body.classList.add('content-open');

        // Wire status buttons
        document.querySelectorAll('#articleStatusActions [data-set-status]').forEach(btn => {
            btn.addEventListener('click', async () => {
                const newStatus = btn.dataset.setStatus;
                const res = await fetch('/api/entity-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'content', id: item.id, updates: { status: newStatus } }),
                });
                if (res.ok) {
                    item.status = newStatus;
                    document.querySelectorAll('#articleStatusActions [data-set-status]').forEach(b => b.classList.remove('active-status'));
                    btn.classList.add('active-status');
                }
            });
        });

        // Wire delete button
        document.getElementById('deleteArticleBtn')?.addEventListener('click', async () => {
            if (!confirm('Delete this article permanently?')) return;
            const res = await fetch('/api/entity-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table: 'content', id: item.id, updates: { status: 'deleted' } }),
            });
            if (res.ok) {
                document.body.classList.remove('content-open');
                loadArticles();
            }
        });

        // Wire Extract Signals button
        document.getElementById('extractSignalsBtn')?.addEventListener('click', async () => {
            const container = document.getElementById('extractedSignalsContainer');
            if (!container) return;
            container.innerHTML = '<div class="ask-loading"><span class="spinner"></span> Analysing article for signals...</div>';
            try {
                const res = await fetch('/api/extract-signals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content_id: item.id }),
                });
                const data = await res.json();
                if (!data.ok) throw new Error(data.detail || data.error || 'Extraction failed');
                const signals = data.signals || [];
                if (!signals.length) {
                    container.innerHTML = '<div style="padding:1rem;color:var(--text-muted);font-size:0.85rem">No signals identified in this article.</div>';
                    return;
                }
                container.innerHTML = `
                    <div style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1rem">
                        <h4 style="color:var(--yellow);margin-bottom:0.75rem"><i class="icon" data-lucide="radar" style="width:14px;height:14px"></i> Suggested Signals (${signals.length})</h4>
                        ${signals.map((s, i) => `
                            <div class="extracted-signal" data-idx="${i}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;margin-bottom:0.75rem">
                                <input type="text" class="input es-title" value="${esc(s.title)}" style="width:100%;font-weight:600;margin-bottom:0.4rem">
                                <textarea class="input es-body" rows="3" style="width:100%;resize:vertical">${esc(s.observation)}</textarea>
                                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.35rem">Tags: ${(s.suggested_tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ')}</div>
                                <div style="display:flex;gap:0.5rem;margin-top:0.5rem;justify-content:flex-end">
                                    <button class="btn-sm" onclick="this.closest('.extracted-signal').remove()">Dismiss</button>
                                    <button class="btn-sm es-save" data-idx="${i}" style="background:rgba(196,168,80,0.15);color:var(--yellow)">Save Signal</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                // Wire save buttons
                container.querySelectorAll('.es-save').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const card = btn.closest('.extracted-signal');
                        const idx = parseInt(btn.dataset.idx);
                        const title = card.querySelector('.es-title').value.trim();
                        const body = card.querySelector('.es-body').value.trim();
                        const tags = signals[idx]?.suggested_tags || [];
                        if (!title) return;
                        btn.textContent = 'Saving...'; btn.disabled = true;
                        const saveRes = await fetch('/api/entity-log', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                table: 'content',
                                data: {
                                    type: 'signal', title, body, tags, status: 'new',
                                    metadata: { source_ids: [{ type: 'content', id: item.id }] },
                                },
                            }),
                        });
                        if (saveRes.ok) {
                            card.style.opacity = '0.4';
                            card.style.pointerEvents = 'none';
                            btn.textContent = 'Saved ✓';
                        } else {
                            btn.textContent = 'Save Signal'; btn.disabled = false;
                        }
                    });
                });
                refreshIcons();
            } catch (err) {
                container.innerHTML = `<div style="padding:1rem;color:var(--red);font-size:0.85rem">Error: ${esc(err.message)}</div>`;
            }
        });

        // Wire source backlinks
        document.querySelectorAll('.source-backlink').forEach(link => {
            link.addEventListener('click', async (e) => {
                e.preventDefault();
                const { data } = await db.from('content').select('*').eq('id', link.dataset.id).single();
                if (data) openContentModal(data);
            });
        });

        // Wire unlink pills (both products and competitors)
        document.querySelectorAll('#contentLinkedItems .unlink-x').forEach(x => {
            x.addEventListener('click', async (e) => {
                e.stopPropagation();
                const jId = x.dataset.junctionId;
                const jTable = x.dataset.junctionTable;
                x.textContent = '...';
                const res = await fetch(`/api/entity-link?table=${jTable}&id=${jId}`, { method: 'DELETE' });
                if (res.ok) x.closest('.linked-pill').remove();
                else x.textContent = '×';
            });
        });

        // Wire "Link to Competitor" button
        document.getElementById('linkContentToCompetitor')?.addEventListener('click', () => {
            showSearchPicker({
                placeholder: 'Search competitors by name...',
                searchFn: async (q) => {
                    const { data } = await db.from('companies').select('id, name, type').neq('type', 'internal').ilike('name', `%${q}%`).order('name').limit(15);
                    return data || [];
                },
                renderResult: (c) => ({ title: c.name, meta: c.type || 'competitor' }),
                onSelect: async (c) => {
                    await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'company_content', data: { company_id: c.id, content_id: item.id } }),
                    });
                    await openContentModal(item);
                },
                createLabel: 'Create competitor',
                onCreate: async (name) => {
                    // Create competitor via API (service key)
                    const createRes = await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'companies', data: { name, type: 'competitor' }, returnRow: true }),
                    });
                    const createResult = await createRes.json();
                    if (!createRes.ok || !createResult.row) { console.error('Failed to create competitor:', createResult); return null; }
                    // Link it to this article
                    await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'company_content', data: { company_id: createResult.row.id, content_id: item.id } }),
                    });
                    // Refresh modal to show the new link
                    await openContentModal(item);
                    return createResult.row;
                },
            });
        });

        // Wire "Link to Product" button
        document.getElementById('linkContentToProduct')?.addEventListener('click', () => {
            showSearchPicker({
                placeholder: 'Search products by name...',
                searchFn: async (q) => {
                    const { data } = await db.from('products').select('id, name, company_id, companies(name, type)').ilike('name', `%${q}%`).order('name').limit(15);
                    return data || [];
                },
                renderResult: (p) => ({ title: p.name, meta: p.companies?.name || '' }),
                onSelect: async (p) => {
                    await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'product_content', data: { product_id: p.id, content_id: item.id } }),
                    });
                    await openContentModal(item);
                },
            });
        });

        refreshIcons();
    }

    function closeContentModal() {
        currentModalItem = null;
        document.body.classList.remove('content-open');
    }

    // ─── Entity tag editor (for contacts, products, projects) ──
    let entityTagsMap = {}; // keyed by prefix, e.g. { contact: ['tag1', 'tag2'] }

    function buildEntityTagEditor(tags, prefix) {
        entityTagsMap[prefix] = [...tags];
        const pills = tags.map(t =>
            `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}" data-prefix="${prefix}">×</span></span>`
        ).join('');
        return `<div class="tag-editor" id="${prefix}TagEditor">
            ${pills}
            <span class="tag-input-wrap">
                <input type="text" class="tag-input" id="${prefix}TagInput" placeholder="add tag..." autocomplete="off">
                <div class="tag-suggestions" id="${prefix}TagSuggestions"></div>
            </span>
        </div>`;
    }

    function getEntityTags(prefix) {
        return entityTagsMap[prefix] || [];
    }

    function wireEntityTagEditor(prefix) {
        const input = document.getElementById(`${prefix}TagInput`);
        const sugBox = document.getElementById(`${prefix}TagSuggestions`);
        if (!input || !sugBox) return;
        let activeIdx = -1;

        function currentTags() { return entityTagsMap[prefix] || []; }

        function rerender() {
            const editor = document.getElementById(`${prefix}TagEditor`);
            if (!editor) return;
            const tags = currentTags();
            const pills = tags.map(t =>
                `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}" data-prefix="${prefix}">×</span></span>`
            ).join('');
            editor.innerHTML = `${pills}<span class="tag-input-wrap"><input type="text" class="tag-input" id="${prefix}TagInput" placeholder="add tag..." autocomplete="off"><div class="tag-suggestions" id="${prefix}TagSuggestions"></div></span>`;
            wireEntityTagEditor(prefix);
        }

        function showSuggestions() {
            const val = input.value.trim().toLowerCase();
            const tags = currentTags();
            const matches = allTags
                .filter(t => !tags.includes(t) && t.includes(val))
                .slice(0, 8);

            if (!val || matches.length === 0) {
                sugBox.classList.remove('visible');
                sugBox.innerHTML = '';
                activeIdx = -1;
                return;
            }

            activeIdx = -1;
            sugBox.innerHTML = matches.map(t =>
                `<div class="tag-suggestion" data-tag="${esc(t)}">${esc(t)}</div>`
            ).join('');
            sugBox.classList.add('visible');

            sugBox.querySelectorAll('.tag-suggestion').forEach(el => {
                el.addEventListener('mousedown', e => {
                    e.preventDefault();
                    addEntityTag(prefix, el.dataset.tag);
                });
            });
        }

        input.addEventListener('input', showSuggestions);
        input.addEventListener('focus', showSuggestions);
        input.addEventListener('blur', () => {
            setTimeout(() => sugBox.classList.remove('visible'), 150);
        });

        input.addEventListener('keydown', e => {
            const items = sugBox.querySelectorAll('.tag-suggestion');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, -1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'Escape') {
                sugBox.classList.remove('visible');
                activeIdx = -1;
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                let tag;
                if (activeIdx >= 0 && items[activeIdx]) {
                    tag = items[activeIdx].dataset.tag;
                } else {
                    tag = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-').replace(/-+/g, '-');
                }
                if (tag) addEntityTag(prefix, tag);
            }
        });

        function addEntityTag(pfx, tag) {
            if (!tag) return;
            const tags = entityTagsMap[pfx] || [];
            if (tags.includes(tag)) return;
            entityTagsMap[pfx] = [...tags, tag];
            if (!allTags.includes(tag)) { allTags.push(tag); allTags.sort(); }
            rerender();
        }

        // Wire remove buttons
        document.querySelectorAll(`.tag-remove[data-prefix="${prefix}"]`).forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const tag = btn.dataset.tag;
                entityTagsMap[prefix] = (entityTagsMap[prefix] || []).filter(t => t !== tag);
                rerender();
            });
        });
    }

    // ─── Tag editor (for content items) ─────────────────────────
    function buildTagEditor(tags, prefix = '') {
        const pfx = prefix ? prefix + '-' : '';
        const pills = tags.map(t =>
            `<span class="tag">${esc(t)}<span class="tag-remove ${pfx}tag-remove" data-tag="${esc(t)}">×</span></span>`
        ).join('');
        return `<div class="tag-editor">
            ${pills}
            <span class="tag-input-wrap">
                <input type="text" class="tag-input" id="${pfx}tagInput" placeholder="add tag..." autocomplete="off">
                <div class="tag-suggestions" id="${pfx}tagSuggestions"></div>
            </span>
            <span class="tag-status" id="${pfx}tagStatus"></span>
        </div>`;
    }

    function wireTagEditor(prefix = '', onSave = null) {
        const pfx = prefix ? prefix + '-' : '';
        const input = document.getElementById(pfx + 'tagInput');
        const sugBox = document.getElementById(pfx + 'tagSuggestions');
        if (!input || !sugBox) return;
        let activeIdx = -1;

        // For asset tag editors, we track tags locally
        let localTags = null;

        function getCurrentTags() {
            if (onSave && localTags !== null) return localTags;
            return currentModalItem?.tags || [];
        }

        function showSuggestions() {
            const val = input.value.trim().toLowerCase();
            const currentTags = getCurrentTags();
            const matches = allTags
                .filter(t => !currentTags.includes(t) && t.includes(val))
                .slice(0, 8);

            if (!val || matches.length === 0) {
                sugBox.classList.remove('visible');
                sugBox.innerHTML = '';
                activeIdx = -1;
                return;
            }

            activeIdx = -1;
            sugBox.innerHTML = matches.map(t =>
                `<div class="tag-suggestion" data-tag="${esc(t)}">${esc(t)}</div>`
            ).join('');
            sugBox.classList.add('visible');

            sugBox.querySelectorAll('.tag-suggestion').forEach(el => {
                el.addEventListener('mousedown', async e => {
                    e.preventDefault();
                    await addTag(el.dataset.tag);
                });
            });
        }

        input.addEventListener('input', showSuggestions);
        input.addEventListener('focus', showSuggestions);
        input.addEventListener('blur', () => {
            setTimeout(() => sugBox.classList.remove('visible'), 150);
        });

        input.addEventListener('keydown', async e => {
            const items = sugBox.querySelectorAll('.tag-suggestion');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, -1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'Escape') {
                sugBox.classList.remove('visible');
                activeIdx = -1;
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                // Use selected suggestion or typed value
                let tag;
                if (activeIdx >= 0 && items[activeIdx]) {
                    tag = items[activeIdx].dataset.tag;
                } else {
                    tag = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-').replace(/-+/g, '-');
                }
                if (tag) await addTag(tag);
            }
        });

        async function addTag(tag) {
            const currentTags = getCurrentTags();
            if (!tag) return;
            if (currentTags.includes(tag)) { input.value = ''; sugBox.classList.remove('visible'); return; }
            const newTags = [...currentTags, tag];
            if (!allTags.includes(tag)) { allTags.push(tag); allTags.sort(); }

            if (onSave) {
                localTags = newTags;
                await onSave(newTags);
                // Re-render tag pills
                const editor = input.closest('.tag-editor');
                if (editor) {
                    editor.outerHTML = buildTagEditor(newTags, prefix);
                    wireTagEditor(prefix, onSave);
                }
            } else if (currentModalItem) {
                await updateTags(currentModalItem.id, newTags);
            }
        }

        document.querySelectorAll(`.${pfx}tag-remove, ${pfx ? '' : '.tag-remove'}`).forEach(btn => {
            if (!btn.classList.contains(pfx + 'tag-remove') && pfx) return;
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                const tag = btn.dataset.tag;
                const currentTags = getCurrentTags();
                const newTags = currentTags.filter(t => t !== tag);

                if (onSave) {
                    localTags = newTags;
                    await onSave(newTags);
                    const editor = input.closest('.tag-editor');
                    if (editor) {
                        editor.outerHTML = buildTagEditor(newTags, prefix);
                        wireTagEditor(prefix, onSave);
                    }
                } else if (currentModalItem) {
                    await updateTags(currentModalItem.id, newTags);
                }
            });
        });
    }

    async function updateTags(id, tags) {
        const status = document.getElementById('tagStatus');
        status.textContent = 'saving...';
        status.className = 'tag-status saving';

        try {
            const res = await fetch('/api/content/tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, tags }),
            });
            if (!res.ok) throw new Error(await res.text());

            // Update in-memory data
            if (currentModalItem) {
                currentModalItem.tags = tags;
                // Re-render the tag editor
                const metaEl = document.getElementById('contentModalMeta');
                const editorEl = metaEl.querySelector('.tag-editor');
                if (editorEl) {
                    editorEl.outerHTML = buildTagEditor(tags);
                    wireTagEditor();
                }
            }
            status.textContent = '✓';
            status.className = 'tag-status saved';
            setTimeout(() => { if (status) status.textContent = ''; }, 1500);
        } catch (err) {
            status.textContent = 'failed';
            status.className = 'tag-status error';
            console.error('Tag update failed:', err);
        }
    }

    document.getElementById('contentOverlay').addEventListener('click', closeContentModal);
    document.getElementById('contentClose').addEventListener('click', closeContentModal);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeContentModal();
    });

    // ─── Keyboard shortcuts ──────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's' && currentView === 'daily-note') {
            e.preventDefault();
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
    });

    // Save before unload
    window.addEventListener('beforeunload', (e) => {
        if (dailyIsDirty && currentView === 'daily-note') {
            saveDailyNote();
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ─── Boot ─────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
