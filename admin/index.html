    }

    async function loadMeetingsWithCalendar(data) {
        meetingCards = [];
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;
        container.innerHTML = '';

        // 1. Restore saved meeting cards
        const savedMeetings = [];
        if (data?.meetings) {
            let meetings = [];
            try {
                if (data.metadata?.meetings_structured) {
                    meetings = data.metadata.meetings_structured;
                }
            } catch {}

            if (meetings.length > 0) {
                meetings.forEach(m => {
                    savedMeetings.push({ title: m.title || '', notes: m.notes || '', time: m.time || '', fromCalendar: false });
                });
            } else {
                const md = data.meetings;
                const sections = md.split(/^## /gm).filter(s => s.trim());
                if (sections.length > 0 && md.includes('## ')) {
                    sections.forEach(section => {
                        const lines = section.split('\n');
                        const title = lines[0].trim();
                        const notes = lines.slice(1).join('\n').trim();
                        savedMeetings.push({ title, notes, fromCalendar: false });
                    });
                } else if (md.trim()) {
                    savedMeetings.push({ title: '', notes: md, fromCalendar: false });
                }
            }
        }

        // 2. Fetch calendar events from Supabase (synced by capture-bot on Railway)
        let calendarEvents = [];
        try {
            const { data: calData } = await db
                .from('calendar_events')
                .select('*')
                .eq('event_date', dailyNoteDate)
                .order('start_time', { ascending: true });

            if (calData && calData.length > 0) {
                calendarEvents = calData.map(e => ({
                    uid: e.uid,
                    title: e.title,
                    startTime: e.start_time,
                    endTime: e.end_time,
                    allDay: e.all_day,
                    location: e.location,
                    organizer: e.organizer,
                    attendees: e.attendees || [],
                }));
                console.log(`Calendar: ${calendarEvents.length} events for ${dailyNoteDate}`);
            }
        } catch (err) {
            console.warn('Calendar fetch failed:', err);
        }

        // 3. Create cards for saved meetings (collapsed by default)
        for (const m of savedMeetings) {
            await addMeetingCard(m.title, m.notes, { time: m.time || '' });
        }

        // 4. Add calendar events that don't already have a matching card
        const existingTitles = new Set(savedMeetings.map(m => m.title.toLowerCase().trim()));

        if (calendarEvents.length > 0) {
            console.log(`Calendar: found ${calendarEvents.length} events for ${dailyNoteDate}`);
        }

        for (const evt of calendarEvents) {
            const title = evt.title || '';
            // Skip if we already have a card with a similar title
            if (existingTitles.has(title.toLowerCase().trim())) continue;

            // Build time string for header
            let timeStr = '';
            if (evt.startTime && evt.endTime) {
                timeStr = `${evt.startTime}-${evt.endTime}`;
            } else if (evt.startTime) {
                timeStr = evt.startTime;
            } else if (evt.allDay) {
                timeStr = 'All day';
            }

            // Build pre-populated note with meeting details
            let prefill = '';
            if (evt.location) {
                prefill += `*${evt.location}*\n\n`;
            }
            if (evt.attendees && evt.attendees.length > 0) {
                prefill += `Attendees: ${evt.attendees.slice(0, 8).join(', ')}\n\n`;
            }

            await addMeetingCard(title, prefill, { time: timeStr });
            existingTitles.add(title.toLowerCase().trim());
        }

    }

    function addMeetingCard(title, content, options = {}) {
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return Promise.resolve();

        const id = ++meetingIdCounter;
        const startExpanded = options.expanded || false;
        const timeStr = options.time || '';
        const hasContent = !!(content && content.trim());

        const cardEl = document.createElement('div');
        cardEl.className = 'meeting-card' + (startExpanded ? ' expanded' : '');
        cardEl.id = `meeting-card-${id}`;

        const safeTitle = (title || '').replace(/"/g, '&quot;');

        const safeTime = (timeStr || '').replace(/"/g, '&quot;');

        cardEl.innerHTML = `
            <div class="meeting-card-header" data-meeting-id="${id}">
                <span class="meeting-card-chevron">&#x25B8;</span>
                ${timeStr ? `<span class="meeting-card-time">${timeStr}</span>` : ''}
                <span class="meeting-card-title-display">${title || 'Untitled Meeting'}</span>
                <span class="meeting-card-indicator ${hasContent ? 'has-notes' : ''}" id="meetingIndicator-${id}">\u25CF</span>
                <div class="meeting-card-move-btns">
                    <button class="meeting-move-btn" data-dir="up" data-meeting-id="${id}" title="Move up">\u25B2</button>
                    <button class="meeting-move-btn" data-dir="down" data-meeting-id="${id}" title="Move down">\u25BC</button>
                </div>
                <button class="meeting-card-remove" data-meeting-id="${id}" title="Remove meeting">\u00d7</button>
            </div>
            <div class="meeting-card-expanded-content">
                <div class="meeting-card-meta-row">
                    <input type="text" class="meeting-card-title-input" placeholder="Meeting title..." value="${safeTitle}" data-meeting-id="${id}">
                    <input type="text" class="meeting-card-time-input" placeholder="e.g. 09:00-10:00" value="${safeTime}" data-meeting-id="${id}">
                </div>
                <div class="daily-toolbar" id="meetingToolbar-${id}"></div>
                <div class="daily-editor-wrap" id="meetingEditor-${id}"></div>
            </div>
        `;

        // Manually added cards go to top, loaded/calendar cards go to bottom
        if (startExpanded) {
            container.prepend(cardEl);
        } else {
            container.appendChild(cardEl);
        }

        // Wire header click to toggle (ignore clicks on buttons)
        cardEl.querySelector('.meeting-card-header').addEventListener('click', (e) => {
            if (e.target.closest('.meeting-card-remove') || e.target.closest('.meeting-move-btn')) return;
            toggleMeetingCard(id);
        });

        // Wire remove button
        cardEl.querySelector('.meeting-card-remove').onclick = (e) => {
            e.stopPropagation();
            removeMeetingCard(id);
        };

        // Wire move buttons
        cardEl.querySelectorAll('.meeting-move-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                moveMeetingCard(id, btn.dataset.dir);
            });
        });

        // Wire title input to update display title and trigger save
        cardEl.querySelector('.meeting-card-title-input').addEventListener('input', (e) => {
            const displayEl = cardEl.querySelector('.meeting-card-title-display');
            if (displayEl) displayEl.textContent = e.target.value || 'Untitled Meeting';
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Wire time input to update header time and trigger save
        cardEl.querySelector('.meeting-card-time-input').addEventListener('input', (e) => {
            const headerTimeEl = cardEl.querySelector('.meeting-card-time');
            const mc = meetingCards.find(m => m.id === id);
            if (mc) mc.time = e.target.value.trim();
            if (headerTimeEl) {
                headerTimeEl.textContent = e.target.value.trim();
            } else if (e.target.value.trim()) {
                // Add time span to header if it didn't have one
                const chevron = cardEl.querySelector('.meeting-card-chevron');
                if (chevron) {
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'meeting-card-time';
                    timeSpan.textContent = e.target.value.trim();
                    chevron.after(timeSpan);
                }
            }
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Store card reference (editor created lazily on first expand)
        if (startExpanded) {
            meetingCards.unshift({ id, editor: null, content: content || '', time: timeStr });
        } else {
            meetingCards.push({ id, editor: null, content: content || '', time: timeStr });
        }

        // If starting expanded, init editor immediately
        if (startExpanded) {
            return initMeetingEditor(id);
        }
        return Promise.resolve();
    }

    function toggleMeetingCard(id) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (!cardEl) return;

        const isExpanded = cardEl.classList.toggle('expanded');

        if (isExpanded) {
            // Lazy init editor on first expand
            const mc = meetingCards.find(m => m.id === id);
            if (mc && !mc.editor) {
                initMeetingEditor(id);
            }
        } else {
            // Update has-notes indicator when collapsing
            updateMeetingIndicator(id);
        }
    }

    function initMeetingEditor(id) {
        return new Promise(resolve => {
            requestAnimationFrame(() => {
                const editorEl = document.getElementById(`meetingEditor-${id}`);
                if (!editorEl) { resolve(); return; }

                const mc = meetingCards.find(m => m.id === id);
                if (!mc || mc.editor) { resolve(); return; }

                const editor = createEditor(editorEl, 'Meeting notes...', mc.content || '');
                mc.editor = editor;

                requestAnimationFrame(() => {
                    buildToolbar(`meetingToolbar-${id}`, editor);
                    resolve();
                });
            });
        });
    }

    function updateMeetingIndicator(id) {
        const mc = meetingCards.find(m => m.id === id);
        const indicator = document.getElementById(`meetingIndicator-${id}`);
        if (!mc || !indicator) return;

        const hasNotes = mc.editor ? !!(getEditorMarkdown(mc.editor).trim()) : !!(mc.content && mc.content.trim());
        indicator.classList.toggle('has-notes', hasNotes);
    }

    function moveMeetingCard(id, direction) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        const container = document.getElementById('meetingCardsContainer');
        if (!cardEl || !container) return;

        if (direction === 'up' && cardEl.previousElementSibling) {
            container.insertBefore(cardEl, cardEl.previousElementSibling);
        } else if (direction === 'down' && cardEl.nextElementSibling) {
            container.insertBefore(cardEl, cardEl.nextElementSibling.nextSibling);
        } else {
            return; // Can't move further
        }

        // Sync the meetingCards array to match new DOM order
        const newOrder = [];
        container.querySelectorAll('.meeting-card').forEach(el => {
            const idMatch = el.id.match(/meeting-card-(\d+)/);
            if (idMatch) {
                const mcId = parseInt(idMatch[1]);
                const mc = meetingCards.find(m => m.id === mcId);
                if (mc) newOrder.push(mc);
            }
        });
        meetingCards = newOrder;
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function removeMeetingCard(id) {
        const idx = meetingCards.findIndex(mc => mc.id === id);
        if (idx !== -1) {
            meetingCards[idx].editor?.destroy();
            meetingCards.splice(idx, 1);
        }
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (cardEl) cardEl.remove();
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function getMeetingsData() {
        // Collect structured meeting data
        const structured = meetingCards.map(mc => {
            const titleEl = document.querySelector(`.meeting-card-title-input[data-meeting-id="${mc.id}"]`);
            const notes = mc.editor ? getEditorMarkdown(mc.editor) : (mc.content || '');
            return {
                title: titleEl?.value?.trim() || '',
                notes: notes,
                time: mc.time || '',
            };
        }).filter(m => m.title || m.notes);

        // Also build a combined markdown string for the meetings column (backward compatible)
        const markdown = structured.map(m => {
            const heading = m.title ? `## ${m.title}\n\n` : '';
            return heading + m.notes;
        }).join('\n\n---\n\n');

        return { markdown, structured };
    }

    function buildToolbar(containerId, editor) {
        const container = document.getElementById(containerId);
        if (!container || !editor) return;

        const buttons = [
            { label: 'B', cmd: () => editor.chain().focus().toggleBold().run(), active: () => editor.isActive('bold'), title: 'Bold (Cmd+B)' },
            { label: 'I', cmd: () => editor.chain().focus().toggleItalic().run(), active: () => editor.isActive('italic'), title: 'Italic (Cmd+I)' },
            { type: 'sep' },
            { label: 'H1', cmd: () => editor.chain().focus().toggleHeading({ level: 1 }).run(), active: () => editor.isActive('heading', { level: 1 }), title: 'Heading 1' },
            { label: 'H2', cmd: () => editor.chain().focus().toggleHeading({ level: 2 }).run(), active: () => editor.isActive('heading', { level: 2 }), title: 'Heading 2' },
            { label: 'H3', cmd: () => editor.chain().focus().toggleHeading({ level: 3 }).run(), active: () => editor.isActive('heading', { level: 3 }), title: 'Heading 3' },
            { type: 'sep' },
            { label: '\u2022', cmd: () => editor.chain().focus().toggleBulletList().run(), active: () => editor.isActive('bulletList'), title: 'Bullet list' },
            { label: '1.', cmd: () => editor.chain().focus().toggleOrderedList().run(), active: () => editor.isActive('orderedList'), title: 'Numbered list' },
            { label: '\u2610', cmd: () => editor.chain().focus().toggleTaskList().run(), active: () => editor.isActive('taskList'), title: 'Task list' },
            { label: '\u275D', cmd: () => editor.chain().focus().toggleBlockquote().run(), active: () => editor.isActive('blockquote'), title: 'Quote' },
        ];

        container.innerHTML = buttons.map((b, i) =>
            b.type === 'sep'
                ? '<span class="daily-toolbar-sep"></span>'
                : `<button title="${b.title}" data-idx="${i}">${b.label}</button>`
        ).join('');

        container.querySelectorAll('button[data-idx]').forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.cmd) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    b.cmd();
                });
            }
        });

        editor.on('selectionUpdate', () => updateToolbarActive(container, buttons));
        editor.on('update', () => updateToolbarActive(container, buttons));
    }

    function updateToolbarActive(container, buttons) {
        const btns = container.querySelectorAll('button[data-idx]');
        btns.forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.active) btn.classList.toggle('is-active', b.active());
        });
    }

    function scheduleDailySave() {
        dailyIsDirty = true;
        if (dailySaveTimer) clearTimeout(dailySaveTimer);
        dailySaveTimer = setTimeout(saveDailyNote, 1000);
    }

    async function saveDailyNote() {
        if (!dailyNoteDate) return;

        updateSaveStatus('saving');

        const meetingsData = getMeetingsData();

        const payload = {
            note_date: dailyNoteDate,
            tasks: getEditorMarkdown(dailyEditors.tasks),
            notes: getEditorMarkdown(dailyEditors.notes),
            meetings: meetingsData.markdown,
            metadata: {
                meetings_structured: meetingsData.structured,
                stoic_challenge: {
                    frustration: document.getElementById('stoicFrustration')?.value || '',
                    reframe: document.getElementById('stoicReframe')?.value || '',
                    opportunity: document.getElementById('stoicOpportunity')?.value || '',
                },
            },
        };

        try {
            const res = await fetch('/api/daily-notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error(await res.text());

            const result = await res.json();
            dailyNoteId = result.daily_note?.id || dailyNoteId;
            dailyIsDirty = false;
            updateSaveStatus('saved');
        } catch (err) {
            updateSaveStatus('error', 'save failed — retry in 5s');
            console.error('Daily note save failed:', err);
            // Auto-retry once after 5 seconds
            setTimeout(() => { if (dailyIsDirty) saveDailyNote(); }, 5000);
        }
    }

    async function runDailyReview() {
        if (!dailyNoteDate) return;

        const btn = document.getElementById('dailyReviewBtn');
        if (!btn || btn.classList.contains('reviewing')) return;

        // Save current note first
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            await saveDailyNote();
        }

        btn.textContent = 'Reviewing...';
        btn.classList.add('reviewing');

        try {
            const res = await fetch('/api/daily-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ note_date: dailyNoteDate }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: 'Unknown error' }));
                throw new Error(err.detail || err.error || 'Review failed');
            }

            const result = await res.json();
            btn.textContent = 'Reviewed ✓';
            btn.classList.remove('reviewing');
            btn.classList.add('reviewed');

            // Display results
            displayReviewResults(result);

        } catch (err) {
            btn.textContent = 'Review Day';
            btn.classList.remove('reviewing');
            console.error('Daily review failed:', err);
            alert('Review failed: ' + err.message);
        }
    }

    function navigateToEntity(view, name) {
        // Navigate to the entity view and highlight/scroll to the named entity
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`[data-view="${view}"]`);
        if (navBtn) navBtn.classList.add('active');
        currentView = view;
        loadView(view);
        // After load, try to find and highlight the entity
        setTimeout(() => {
            const rows = document.querySelectorAll('.expandable');
            for (const row of rows) {
                if (row.textContent.toLowerCase().includes(name.toLowerCase())) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.style.background = 'var(--accent-dim)';
                    setTimeout(() => row.style.background = '', 2000);
                    break;
                }
            }
        }, 500);
    }

        html += `<div class="review-stats">`;

        // Product evidence
        if (review.product_evidence?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Product Evidence (${review.product_evidence.length})</div>`;
            for (const e of review.product_evidence) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('products', '${e.product_name}')">${e.product_name}:</a> ${e.evidence}</div>`;

        // Decisions
        if (review.product_decisions?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Decisions (${review.product_decisions.length})</div>`;
            for (const e of review.product_decisions) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('products', '${e.product_name || 'General'}')">${e.product_name || 'General'}:</a> ${e.decision}</div>`;
            }
            html += `</div>`;
        }

        // Project updates
        if (review.project_updates?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Project Updates (${review.project_updates.length})</div>`;
            for (const e of review.project_updates) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('projects', '${e.project_name}')">${e.project_name}:</a> ${e.update}</div>`;
            }
            html += `</div>`;

        if (review.reflections?.length) {

    function navigateDailyNote(offset) {
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
        destroyDailyEditors();

        const d = new Date(dailyNoteDate + 'T12:00:00');
        d.setDate(d.getDate() + offset);
        const newDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        loadDailyNote(newDate);

    function openDailyDatePicker() {
        const input = document.createElement('input');
        input.type = 'date';
        input.value = dailyNoteDate;
        input.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
        document.body.appendChild(input);

        input.addEventListener('change', () => {
            if (input.value) {
                if (dailyIsDirty) {
                    clearTimeout(dailySaveTimer);
                    saveDailyNote();
                }
                destroyDailyEditors();
                loadDailyNote(input.value);
            }
            input.remove();
        });
        input.addEventListener('blur', () => setTimeout(() => input.remove(), 200));

        try { input.showPicker(); } catch { input.click(); }
    }

    // ─── Articles ─────────────────────────────────────────────
    async function fetchArticles() {
        const f = articleFilters;
        const from = (f.page - 1) * ARTICLES_PER_PAGE;
        const to = from + ARTICLES_PER_PAGE - 1;

        let query = db.from('content')
            .select('id, title, url, source, author, tags, status, captured_at, body, metadata', { count: 'exact' })
            .eq('type', 'article')
            .order('captured_at', { ascending: false })
            .range(from, to);

        if (f.status) query = query.eq('status', f.status);
        if (f.source) query = query.eq('source', f.source);
        if (f.tag) query = query.contains('tags', [f.tag]);
        if (f.dateRange) {
            const d = new Date();
            d.setDate(d.getDate() - f.dateRange);
            query = query.gte('captured_at', d.toISOString());
        }

        const { data, count, error } = await query;
        return { data, count, error };
    }

    async function loadArticleFilterOptions() {
        if (articleSources.length && articleTopTags.length) return;

        // Fetch unique sources
        const { data: srcData } = await db.from('content')
            .select('source')
            .eq('type', 'article')
            .not('source', 'is', null)
            .order('source');
        const srcSet = new Set();
        (srcData || []).forEach(r => { if (r.source) srcSet.add(r.source); });
        articleSources = [...srcSet].sort();

        // Fetch top tags via all articles' tags arrays
        const { data: tagData } = await db.from('content')
            .select('tags')
            .eq('type', 'article')
            .not('tags', 'is', null);
        const tagCounts = {};
        (tagData || []).forEach(r => (r.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
        articleTopTags = Object.entries(tagCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 30)
            .map(([tag, count]) => ({ tag, count }));
    }

    function populateArticleDropdowns() {
        const srcSel = document.getElementById('articleSourceFilter');
        const tagSel = document.getElementById('articleTagFilter');
        if (!srcSel || !tagSel) return;

        srcSel.innerHTML = '<option value="">All sources</option>' +
            articleSources.map(s => `<option value="${esc(s)}"${articleFilters.source === s ? ' selected' : ''}>${esc(s)}</option>`).join('');
        tagSel.innerHTML = '<option value="">All tags</option>' +
            articleTopTags.map(t => `<option value="${esc(t.tag)}"${articleFilters.tag === t.tag ? ' selected' : ''}>${esc(t.tag)} (${t.count})</option>`).join('');
    }

    function updateArticlesCount() {
        const el = document.getElementById('articlesCount');
        if (!el) return;
        if (articlesTotalCount === 0) { el.textContent = 'No articles'; return; }
        const from = (articleFilters.page - 1) * ARTICLES_PER_PAGE + 1;
        const to = Math.min(articleFilters.page * ARTICLES_PER_PAGE, articlesTotalCount);
        el.textContent = `Showing ${from}\u2013${to} of ${articlesTotalCount}`;
    }

    function updatePagination(totalPages) {
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        const info = document.getElementById('articlePageInfo');
        if (!prev || !next || !info) return;
        prev.disabled = articleFilters.page <= 1;
        next.disabled = articleFilters.page >= totalPages;
        info.textContent = totalPages > 0 ? `Page ${articleFilters.page} of ${totalPages}` : '';
    }

    async function reloadArticles() {
        const tbody = document.getElementById('articlesBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading...</td></tr>';

        const { data, count, error } = await fetchArticles();
        if (error) {
            if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--red)">Error: ${esc(error.message)}</td></tr>`;
            return;
        }

        articlesData = data || [];
        articlesTotalCount = count || 0;
        const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);

        renderArticleRows(articlesData);
        updateArticlesCount();
        updatePagination(totalPages);
    }

    function wireArticleFilterEvents() {
        // Status buttons
        document.querySelectorAll('.article-status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-status-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.status = btn.dataset.status || null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Date range buttons
        document.querySelectorAll('.article-date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.dateRange = btn.dataset.days ? parseInt(btn.dataset.days) : null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Source dropdown
        const srcSel = document.getElementById('articleSourceFilter');
        if (srcSel) srcSel.addEventListener('change', () => {
            articleFilters.source = srcSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Tag dropdown
        const tagSel = document.getElementById('articleTagFilter');
        if (tagSel) tagSel.addEventListener('change', () => {
            articleFilters.tag = tagSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Pagination
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        if (prev) prev.addEventListener('click', () => { if (articleFilters.page > 1) { articleFilters.page--; reloadArticles(); } });
        if (next) next.addEventListener('click', () => {
            const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);
            if (articleFilters.page < totalPages) { articleFilters.page++; reloadArticles(); }
        });

        // Client-side search on current page
        const search = document.getElementById('searchArticles');
        if (search) search.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            if (!q) { renderArticleRows(articlesData); return; }
            const filtered = articlesData.filter(a =>
                a.title.toLowerCase().includes(q) ||
                (a.source || '').toLowerCase().includes(q) ||
                (a.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderArticleRows(filtered);
        });
    }

        articlesTotalCount = result.count || 0;

                        </tr>
                    </thead>

                </table>

    function renderArticleRows(data) {
        const tbody = document.getElementById('articlesBody');
        tbody.innerHTML = data.map(a => `
            <tr class="expandable" data-id="${a.id}">
                <td class="title-cell"${appSettings.showThumbnails ? ' style="display: flex; align-items: center; gap: 0.5rem;"' : ''}>
                    ${appSettings.showThumbnails
                        ? (a.metadata?.image_url
                            ? `<img src="${a.metadata.image_url}" class="article-thumb" loading="lazy" onerror="this.style.display='none'">`
                            : '<span class="article-thumb-placeholder">📄</span>')
                        : ''}
                    <div>
                        <div class="title-text">${esc(a.title)}</div>
                        ${a.url ? `<a class="title-url" href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(truncUrl(a.url))}</a>` : ''}
                    </div>
                </td>
                <td class="source-cell">${esc(a.source || '-')}</td>
                <td>${(a.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
                <td class="date-cell">${formatDate(a.captured_at)}</td>
                <td><span class="status-dot status-${a.status}"></span>${a.status}</td>
            </tr>
        `).join('');

        // Click to open modal
        tbody.querySelectorAll('tr.expandable').forEach(row => {
            row.addEventListener('click', () => {
                const item = data.find(a => a.id === row.dataset.id);
                if (item) openContentModal(item);
            });

    let contactsData = [];

    async function loadContacts() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading contacts</div>';

        const { data, error } = await db
            .from('people')
            .select('id, name, role, organization, tags')
            .order('name', { ascending: true });

        if (error) { main.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }
        if (!data.length) { main.innerHTML = '<div class="empty">No contacts yet.</div>'; return; }

        contactsData = data;
        contactsFilter = 'all';

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Contacts</h2>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="person">People</button>
                <button class="filter-btn" data-filter="customer">Customers</button>
                <button class="filter-btn" data-filter="competitor">Competitors</button>
                <input class="search-input" placeholder="Search contacts..." id="contactSearch">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Organisation</th>
                            <th>Tags</th>
                        </tr>
                    </thead>
                    <tbody id="contactsBody"></tbody>
                </table>
            </div>
        `;

        applyContactsFilters();

        // Wire filter buttons
        main.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                main.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                contactsFilter = btn.dataset.filter;
                applyContactsFilters();
            });
        });

        document.getElementById('contactSearch').addEventListener('input', () => applyContactsFilters());
    }

    function applyContactsFilters() {
        const q = (document.getElementById('contactSearch')?.value || '').toLowerCase();
        let filtered = contactsData;

        // Tag filter
        if (contactsFilter !== 'all') {
            filtered = filtered.filter(p => (p.tags || []).includes(contactsFilter));
        }

        // Search filter
        if (q) {
            filtered = filtered.filter(p =>
                (p.name || '').toLowerCase().includes(q) ||
                (p.role || '').toLowerCase().includes(q) ||
                (p.organization || '').toLowerCase().includes(q)
            );
        }

        renderContactRows(filtered);
    }

    function renderContactRows(data) {
        const tbody = document.getElementById('contactsBody');
        tbody.innerHTML = data.map(p => `
            <tr class="expandable" data-id="${p.id}">
                <td class="title-cell"><span class="title-text">${esc(p.name)}</span></td>
                <td class="source-cell">${esc(p.role || '-')}</td>
                <td class="source-cell">${esc(p.organization || '-')}</td>
                <td>${(p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
            </tr>
        `).join('');

        tbody.querySelectorAll('tr.expandable').forEach(row => {
            row.addEventListener('click', async () => {
                const person = data.find(p => String(p.id) === row.dataset.id);
                if (!person) return;
                await openContactModal(person);
            });
        });
    }

    async function openContactModal(person) {
        document.getElementById('contentModalTitle').textContent = 'Edit Contact';
        document.getElementById('contentModalMeta').innerHTML = '';

        document.getElementById('contentModalBody').innerHTML = '<div class="loading">Loading contact...</div>';
        document.querySelector('.content-modal-scroll').scrollTop = 0;
        document.body.classList.add('content-open');

        // Fetch log entries
        const { data: logs, error } = await db
            .from('people_log')
            .select('note_date, entry, source')
            .eq('person_id', person.id)
            .order('note_date', { ascending: false });

        // Build editable form
        let html = `
            <div class="modal-edit-field">
                <div class="modal-edit-label">Name</div>
                <input class="modal-edit-input" id="editContactName" value="${esc(person.name || '')}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Role</div>
                <input class="modal-edit-input" id="editContactRole" value="${esc(person.role || '')}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Organisation</div>
                <input class="modal-edit-input" id="editContactOrg" value="${esc(person.organization || '')}">
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Tags</div>
                ${buildEntityTagEditor(person.tags || [], 'contact')}
            </div>
            <div class="modal-actions">
                <button class="modal-save-btn" id="saveContactBtn">Save</button>
                <span class="modal-save-status" id="contactSaveStatus"></span>
            </div>
        `;

        // Log entries section
        html += '<div class="section-heading">Log Entries</div>';
        html += '<div id="contactLogAddArea"><button class="modal-add-btn" id="addContactLogBtn">+ Add Log Entry</button></div>';
        html += '<div id="contactLogForm" style="display:none"></div>';

        if (error) {
            html += `<div class="empty">Error loading log: ${error.message}</div>`;
        } else if (!logs || !logs.length) {
            html += '<em style="color:var(--text-muted)">No log entries.</em>';
        } else {
            html += logs.map(l => `
                <div class="log-entry">
                    <div class="log-date">${esc(l.note_date || '-')}${l.source ? `<span class="log-source">${esc(l.source)}</span>` : ''}</div>
                    <div class="log-body">${l.entry ? marked.parse(l.entry) : ''}</div>
                </div>
            `).join('');
        }

        document.getElementById('contentModalBody').innerHTML = html;

        // Wire save button
        document.getElementById('saveContactBtn').addEventListener('click', async () => {
            const status = document.getElementById('contactSaveStatus');
            status.textContent = 'saving...';
            status.className = 'modal-save-status saving';
            try {
                const updates = {
                    name: document.getElementById('editContactName').value.trim(),
                    role: document.getElementById('editContactRole').value.trim(),
                    organization: document.getElementById('editContactOrg').value.trim(),
                    tags: getEntityTags('contact'),
                };
                const res = await fetch('/api/entity-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table: 'people', id: person.id, updates }),
                });
                if (!res.ok) throw new Error(await res.text());
                // Update in-memory data
                Object.assign(person, updates);
                applyContactsFilters();
                status.textContent = 'saved';
                status.className = 'modal-save-status saved';
                setTimeout(() => { status.textContent = ''; }, 1500);
            } catch (err) {
                status.textContent = 'failed';
                status.className = 'modal-save-status error';
                console.error('Contact save failed:', err);
            }
        });

        // Wire add log entry button
        document.getElementById('addContactLogBtn').addEventListener('click', () => {
            const formArea = document.getElementById('contactLogForm');
            formArea.style.display = 'block';
            formArea.innerHTML = `
                <div class="add-entry-form">
                    <div class="modal-edit-field">
                        <div class="modal-edit-label">Date</div>
                        <input type="date" class="modal-edit-input" id="newLogDate" value="${new Date().toISOString().slice(0, 10)}">
                    </div>
                    <div class="modal-edit-field">
                        <div class="modal-edit-label">Entry</div>
                        <textarea class="modal-edit-textarea" id="newLogEntry" placeholder="Log entry..."></textarea>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-save-btn" id="saveNewLogBtn">Add Entry</button>
                        <button class="modal-add-btn" id="cancelNewLogBtn">Cancel</button>
                        <span class="modal-save-status" id="newLogStatus"></span>
                    </div>
                </div>
            `;
            document.getElementById('cancelNewLogBtn').addEventListener('click', () => { formArea.style.display = 'none'; });
            document.getElementById('saveNewLogBtn').addEventListener('click', async () => {
                const status = document.getElementById('newLogStatus');
                const entry = document.getElementById('newLogEntry').value.trim();
                const noteDate = document.getElementById('newLogDate').value;
                if (!entry) return;
                status.textContent = 'saving...';
                status.className = 'modal-save-status saving';
                try {
                    const res = await fetch('/api/entity-log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: 'people_log', data: { person_id: person.id, note_date: noteDate, entry, source: 'manual' } }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    status.textContent = 'added';
                    status.className = 'modal-save-status saved';
                    // Refresh modal to show new entry
                    setTimeout(() => openContactModal(person), 800);
                } catch (err) {
                    status.textContent = 'failed';
                    status.className = 'modal-save-status error';
                    console.error('Log entry save failed:', err);
                }
            });
        });

        // Wire entity tag editor
        wireEntityTagEditor('contact');
    }

    async function openProductModal(product) {
        document.getElementById('contentModalTitle').textContent = 'Edit Product';

        document.getElementById('contentModalBody').innerHTML = '<div class="loading">Loading product details...</div>';
        document.querySelector('.content-modal-scroll').scrollTop = 0;

        // Fetch product overview, evidence, and decisions in parallel
        const [productRes, evidenceRes, decisionsRes] = await Promise.all([
            db.from('products').select('overview').eq('id', product.id).single(),
            db.from('product_evidence').select('note_date, evidence, evidence_type').eq('product_id', product.id).order('note_date', { ascending: false }),
            db.from('product_decisions').select('note_date, decision, context').eq('product_id', product.id).order('note_date', { ascending: false }),
        ]);

        const overview = productRes.data?.overview || '';
        const evidenceData = evidenceRes.data || [];
        const decisionsData = decisionsRes.data || [];

        // Build header: editable name, status, tags
        let html = `
            <div class="modal-edit-field">
                <div class="modal-edit-label">Name</div>
                <input class="modal-edit-input" id="editProductName" value="${esc(product.name || '')}">
            </div>
            <div class="modal-edit-field">

                    <option value="sunset"${product.status === 'sunset' ? ' selected' : ''}>sunset</option>
                    <option value="planned"${product.status === 'planned' ? ' selected' : ''}>planned</option>
                </select>
            </div>
            <div class="modal-edit-field">
                <div class="modal-edit-label">Tags</div>
                ${buildEntityTagEditor(product.tags || [], 'product')}
            </div>
            <div class="modal-actions">
                <button class="modal-save-btn" id="saveProductBtn">Save</button>
                <span class="modal-save-status" id="productSaveStatus"></span>
            </div>
        `;

        // Tabs
        html += `
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="overview">Overview</button>
                <button class="modal-tab" data-tab="evidence">Evidence (${evidenceData.length})</button>
                <button class="modal-tab" data-tab="decisions">Decisions (${decisionsData.length})</button>
            </div>
        `;

        // Overview tab
        html += `<div class="modal-tab-content active" data-tab-content="overview">`;
        if (overview.trim()) {
            html += `<div class="product-overview-content">${marked.parse(overview)}</div>`;
        } else {
            html += `<em style="color:var(--text-muted)">No overview content available.</em>`;
        }
        html += `</div>`;

        // Evidence tab
        html += `<div class="modal-tab-content" data-tab-content="evidence">`;
        if (evidenceRes.error) {
            html += `<div class="empty">Error: ${evidenceRes.error.message}</div>`;
        } else if (!evidenceData.length) {
            html += '<em style="color:var(--text-muted)">No evidence entries.</em>';
        } else {

    // ─── Helpers ──────────────────────────────────────────────
    function esc(str) {
        if (!str) return '';
        const el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
    }

    function renderBody(text) {
        if (!text) return '<em style="color:var(--text-muted)">No content.</em>';
        // If the text looks like markdown (has headings, bold, links, lists)
        // render it as markdown; otherwise treat as plain text with paragraphs
        const hasMarkdown = /^#{1,4}\s|^\*\*|\[.+\]\(.+\)|^- |^\d+\.\s/m.test(text);
        if (hasMarkdown && typeof marked !== 'undefined') {
            return marked.parse(text);
        }
        // Plain text: convert line breaks to paragraphs
        return text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
    }

    function formatDate(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        const day = d.getDate().toString().padStart(2, '0');
        const mon = (d.getMonth() + 1).toString().padStart(2, '0');
        const yr = d.getFullYear().toString().slice(-2);
        const hr = d.getHours().toString().padStart(2, '0');
        const mn = d.getMinutes().toString().padStart(2, '0');
        return `${day}/${mon}/${yr} ${hr}:${mn}`;
    }

    function truncUrl(url) {
        if (!url) return '';
        try {
            const u = new URL(url);
            const path = u.pathname.length > 40 ? u.pathname.substring(0, 40) + '...' : u.pathname;
            return u.hostname + path;
        } catch { return url.substring(0, 60); }
    }

    // ─── Entity tag editor (for contacts, products, projects) ──
    let entityTagsMap = {}; // keyed by prefix, e.g. { contact: ['tag1', 'tag2'] }

    function buildEntityTagEditor(tags, prefix) {
        entityTagsMap[prefix] = [...tags];
        const pills = tags.map(t =>
            `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}" data-prefix="${prefix}">×</span></span>`
        ).join('');
        return `<div class="tag-editor" id="${prefix}TagEditor">
            ${pills}
            <span class="tag-input-wrap">
                <input type="text" class="tag-input" id="${prefix}TagInput" placeholder="add tag..." autocomplete="off">
                <div class="tag-suggestions" id="${prefix}TagSuggestions"></div>
            </span>
        </div>`;
    }

    function getEntityTags(prefix) {
        return entityTagsMap[prefix] || [];
    }

    function wireEntityTagEditor(prefix) {
        const input = document.getElementById(`${prefix}TagInput`);
        const sugBox = document.getElementById(`${prefix}TagSuggestions`);
        if (!input || !sugBox) return;
        let activeIdx = -1;

        function currentTags() { return entityTagsMap[prefix] || []; }

        function rerender() {
            const editor = document.getElementById(`${prefix}TagEditor`);
            if (!editor) return;
            const tags = currentTags();
            const pills = tags.map(t =>
                `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}" data-prefix="${prefix}">×</span></span>`
            ).join('');
            editor.innerHTML = `${pills}<span class="tag-input-wrap"><input type="text" class="tag-input" id="${prefix}TagInput" placeholder="add tag..." autocomplete="off"><div class="tag-suggestions" id="${prefix}TagSuggestions"></div></span>`;
            wireEntityTagEditor(prefix);
        }

        function showSuggestions() {
            const val = input.value.trim().toLowerCase();
            const tags = currentTags();
            const matches = allTags
                .filter(t => !tags.includes(t) && t.includes(val))
                .slice(0, 8);

            if (!val || matches.length === 0) {
                sugBox.classList.remove('visible');
                sugBox.innerHTML = '';
                activeIdx = -1;
                return;
            }

            activeIdx = -1;
            sugBox.innerHTML = matches.map(t =>
                `<div class="tag-suggestion" data-tag="${esc(t)}">${esc(t)}</div>`
            ).join('');
            sugBox.classList.add('visible');

            sugBox.querySelectorAll('.tag-suggestion').forEach(el => {
                el.addEventListener('mousedown', e => {
                    e.preventDefault();
                    addEntityTag(prefix, el.dataset.tag);
                });
            });
        }

        input.addEventListener('input', showSuggestions);
        input.addEventListener('focus', showSuggestions);
        input.addEventListener('blur', () => {
            setTimeout(() => sugBox.classList.remove('visible'), 150);
        });

        input.addEventListener('keydown', e => {
            const items = sugBox.querySelectorAll('.tag-suggestion');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, -1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'Escape') {
                sugBox.classList.remove('visible');
                activeIdx = -1;
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                let tag;
                if (activeIdx >= 0 && items[activeIdx]) {
                    tag = items[activeIdx].dataset.tag;
                } else {
                    tag = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-').replace(/-+/g, '-');
                }
                if (tag) addEntityTag(prefix, tag);
            }
        });

        function addEntityTag(pfx, tag) {
            if (!tag) return;
            const tags = entityTagsMap[pfx] || [];
            if (tags.includes(tag)) return;
            entityTagsMap[pfx] = [...tags, tag];
            if (!allTags.includes(tag)) { allTags.push(tag); allTags.sort(); }
            rerender();
        }

        // Wire remove buttons
        document.querySelectorAll(`.tag-remove[data-prefix="${prefix}"]`).forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const tag = btn.dataset.tag;
                entityTagsMap[prefix] = (entityTagsMap[prefix] || []).filter(t => t !== tag);
                rerender();
            });
        });
    }

    // ─── Tag editor (for content items) ─────────────────────────
    function buildTagEditor(tags) {
        const pills = tags.map(t =>
            `<span class="tag">${esc(t)}<span class="tag-remove" data-tag="${esc(t)}">×</span></span>`
        ).join('');
        return `<div class="tag-editor">
            ${pills}
            <span class="tag-input-wrap">
                <input type="text" class="tag-input" id="tagInput" placeholder="add tag..." autocomplete="off">
                <div class="tag-suggestions" id="tagSuggestions"></div>
            </span>
            <span class="tag-status" id="tagStatus"></span>
        </div>`;
    }

    function wireTagEditor() {
        const input = document.getElementById('tagInput');
        const sugBox = document.getElementById('tagSuggestions');
        if (!input || !sugBox) return;
        let activeIdx = -1;

        function showSuggestions() {
            const val = input.value.trim().toLowerCase();
            const currentTags = currentModalItem?.tags || [];
            const matches = allTags
                .filter(t => !currentTags.includes(t) && t.includes(val))
                .slice(0, 8);

            if (!val || matches.length === 0) {
                sugBox.classList.remove('visible');
                sugBox.innerHTML = '';
                activeIdx = -1;
                return;
            }

            activeIdx = -1;
            sugBox.innerHTML = matches.map(t =>
                `<div class="tag-suggestion" data-tag="${esc(t)}">${esc(t)}</div>`
            ).join('');
            sugBox.classList.add('visible');

            sugBox.querySelectorAll('.tag-suggestion').forEach(el => {
                el.addEventListener('mousedown', async e => {
                    e.preventDefault();
                    await addTag(el.dataset.tag);
                });
            });
        }

        input.addEventListener('input', showSuggestions);
        input.addEventListener('focus', showSuggestions);
        input.addEventListener('blur', () => {
            setTimeout(() => sugBox.classList.remove('visible'), 150);
        });

        input.addEventListener('keydown', async e => {
            const items = sugBox.querySelectorAll('.tag-suggestion');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIdx = Math.min(activeIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIdx = Math.max(activeIdx - 1, -1);
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
                return;
            }
            if (e.key === 'Escape') {
                sugBox.classList.remove('visible');
                activeIdx = -1;
                return;
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                // Use selected suggestion or typed value
                let tag;
                if (activeIdx >= 0 && items[activeIdx]) {
                    tag = items[activeIdx].dataset.tag;
                } else {
                    tag = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-').replace(/-+/g, '-');
                }
                if (tag) await addTag(tag);
            }
        });

        async function addTag(tag) {
            if (!tag || !currentModalItem) return;
            if (currentModalItem.tags?.includes(tag)) { input.value = ''; sugBox.classList.remove('visible'); return; }
            const newTags = [...(currentModalItem.tags || []), tag];
            // Add to global list if new
            if (!allTags.includes(tag)) { allTags.push(tag); allTags.sort(); }
            await updateTags(currentModalItem.id, newTags);
        }

        document.querySelectorAll('.tag-remove').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                const tag = btn.dataset.tag;
                if (!currentModalItem) return;
                const newTags = (currentModalItem.tags || []).filter(t => t !== tag);
                await updateTags(currentModalItem.id, newTags);
            });
        });
    }

    async function updateTags(id, tags) {
        const status = document.getElementById('tagStatus');
        status.textContent = 'saving...';
        status.className = 'tag-status saving';

        try {
            const res = await fetch('/api/content/tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, tags }),
            });
            if (!res.ok) throw new Error(await res.text());

            // Update in-memory data
            if (currentModalItem) {
                currentModalItem.tags = tags;
                // Re-render the tag editor
                const metaEl = document.getElementById('contentModalMeta');
                const editorEl = metaEl.querySelector('.tag-editor');
                if (editorEl) {
                    editorEl.outerHTML = buildTagEditor(tags);
                    wireTagEditor();
                }
            }
            status.textContent = '✓';
            status.className = 'tag-status saved';
            setTimeout(() => { if (status) status.textContent = ''; }, 1500);
        } catch (err) {
            status.textContent = 'failed';
            status.className = 'tag-status error';
            console.error('Tag update failed:', err);
        }
    }

    document.getElementById('contentOverlay').addEventListener('click', closeContentModal);
    document.getElementById('contentClose').addEventListener('click', closeContentModal);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeContentModal();
    });

    // ─── Keyboard shortcuts ──────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's' && currentView === 'daily-note') {
            e.preventDefault();
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
    });

    // Save before unload
    window.addEventListener('beforeunload', (e) => {
        if (dailyIsDirty && currentView === 'daily-note') {
            saveDailyNote();
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ─── Boot ─────────────────────────────────────────────────
    init();
    </script>
</body>
</html>
