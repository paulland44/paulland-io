        .meeting-card-header:hover .meeting-card-move-btns {
            opacity: 0.6;
        }

        .meeting-move-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.6rem;
            cursor: pointer;
            padding: 0 0.3rem;
            line-height: 1;
            transition: color 0.15s;
        }

        .meeting-move-btn:hover {
            color: var(--accent);
        }

        /* ─── Editable time in expanded view ─── */
        .meeting-card-time-input {
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 400;
            outline: none;
            padding: 0.3rem 0.75rem;
            width: auto;
            max-width: 180px;
        }

        .meeting-card-time-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .meeting-card-time-input:focus {
            border-bottom-color: var(--accent);
        }

        .meeting-card-meta-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .meeting-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--hover-subtle);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .meeting-add-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ─── Responsive ─── */
        @media (max-width: 1400px) {
            .overview-stats { grid-template-columns: repeat(2, 1fr); }
            .overview-system-stats { grid-template-columns: repeat(3, 1fr); }
            .overview-columns-3 { grid-template-columns: 1.5fr 1fr; }
        }

        @media (max-width: 1100px) {
            .overview-columns { grid-template-columns: 1fr; }
            .overview-columns-3 { grid-template-columns: 1fr; }
            .overview-bottom { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: static;
                width: 100%;
                min-height: auto;
                border-right: none;
                box-shadow: none;
                border-bottom: 1px solid var(--border);
                padding: 0.75rem 0;
            }
            .sidebar-brand { padding: 0 1rem 0.75rem; margin-bottom: 0.5rem; }
            .sidebar-brand h1 { display: none; }
            .sidebar-nav { display: flex; gap: 0.25rem; padding: 0 0.5rem; overflow-x: auto; }
            .sidebar-footer { display: none; }
            .nav-item { width: auto; font-size: 0.8rem; padding: 0.4rem 0.6rem; white-space: nowrap; }

            .top-bar { position: static; left: 0; height: auto; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
            .sub-tabs { position: static; left: 0; overflow-x: auto; padding: 0 1rem; }

            .main { margin-left: 0; margin-top: 0; padding: 1rem; }
            .layout { flex-direction: column; }

            .page-header { flex-direction: column; gap: 0.75rem; align-items: flex-start !important; }
            .search-input { margin-left: 0; width: 100%; }

            .overview-stats { grid-template-columns: repeat(2, 1fr); }
            .overview-system-stats { grid-template-columns: repeat(2, 1fr); }
            .overview-greeting { flex-direction: column; align-items: flex-start; }

            .content-modal {
                width: 100vw;
                max-height: 100vh;
                max-height: 100dvh;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                top: 0;
                left: 0;
                transform: translate(0, 100%);
            }

            body.content-open .content-modal {
                transform: translate(0, 0);
            }

            .content-modal-scroll {
                padding: 2rem 1.5rem 1.5rem;
            }

            .content-modal-title { font-size: 1.15rem; }
            .content-modal-body { font-size: 1rem; }

            .daily-nav { flex-wrap: wrap; gap: 0.3rem; }
            .daily-editor-wrap .ProseMirror { font-size: 16px; min-height: 80px; }
        }
        .article-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
        }

        .article-thumb-placeholder {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void-lighter);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .article-hero-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
        }

        .section-chevron {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
            width: 0.8rem;
            flex-shrink: 0;
        }

        .daily-section:not(.expanded) .section-chevron {
            transform: rotate(-90deg);
        }

        .daily-section:not(.expanded) .daily-section-content {
            display: none;
        }

        .review-entity-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .review-entity-link:hover {
            color: var(--star);
        }

        /* ─── Summaries ─── */
        .summary-type-weekly { background: rgba(80, 128, 196, 0.15); color: var(--blue); }
        .summary-type-monthly { background: var(--accent-dim); color: var(--accent); }
        .summary-type-support { background: rgba(196, 168, 80, 0.15); color: var(--yellow); }

        .btn-action {
            padding: 0.5rem 1.2rem;
            background: var(--accent);
            color: var(--void);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: var(--void-lighter);
            color: var(--text-body);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
        }
        .btn-secondary:hover { background: var(--tint-subtle); }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0.3rem 0;
        }
        .btn-back:hover { color: var(--accent); }

        .generate-form {
            background: var(--void-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .generate-form-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .generate-form label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-body);
        }
        .generate-form select,
        .generate-form input[type="date"] {
            background: var(--void);
            color: var(--star);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.6rem;
            font-family: var(--mono);
            font-size: 0.85rem;
        }

        .summary-content {
            background: var(--void-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem 2rem;
            line-height: 1.7;
            color: var(--text-body);
        }
        .summary-content h1, .summary-content h2, .summary-content h3 {
            color: var(--star);
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
        }
        .summary-content h2 { font-size: 1.2rem; }
        .summary-content h3 { font-size: 1.05rem; }
        .summary-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
        .summary-content th, .summary-content td {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            text-align: left;
            font-size: 0.9rem;
        }
        .summary-content th { background: var(--void-lighter); color: var(--star); }
        .summary-content ul, .summary-content ol { padding-left: 1.5rem; }
        .summary-content li { margin-bottom: 0.3rem; }
        .summary-content strong { color: var(--star); font-weight: 500; }
        .summary-content em { color: var(--text-muted); }
        .summary-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        .summary-edit-container {
            display: flex;
            flex-direction: column;
        }

        .summary-textarea {
            width: 100%;
            min-height: 500px;
            background: var(--void);
            color: var(--star);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 1rem;
            font-family: var(--mono);
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
        }

        /* ─── Assets ─── */
        .asset-upload-zone {
            border: 2px dashed var(--border-hover);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }
        .asset-upload-zone:hover,
        .asset-upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }
        .asset-upload-zone input[type="file"] { display: none; }

        .asset-upload-progress {
            margin-top: 0.75rem;
            font-size: 0.85rem;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .asset-card {
            background: var(--void-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .asset-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); transform: translateY(-2px); }

        .asset-card-preview {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void-lighter);
            overflow: hidden;
        }
        .asset-card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .asset-card-preview .asset-icon {
            font-size: 2.5rem;
            opacity: 0.4;
        }

        .asset-card-info {
            padding: 0.6rem 0.75rem;
        }
        .asset-card-name {
            font-size: 0.85rem;
            color: var(--star);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-card-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
        .asset-card-tags {
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
            margin-top: 0.4rem;
        }

        .asset-detail {
            display: flex;
            gap: 2rem;
        }
        .asset-detail-preview {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void-lighter);
            border-radius: var(--radius-md);
            min-height: calc(100vh - 180px);
            overflow: hidden;
        }
        .asset-detail-preview img {
            max-width: 100%;
            max-height: calc(100vh - 200px);
            object-fit: contain;
        }
        .asset-detail-preview iframe {
            width: 100%;
            height: calc(100vh - 180px);
            border: none;
        }
        .asset-detail-sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        .asset-detail-field {
            margin-bottom: 1rem;
        }
        .asset-detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .asset-detail-value {
            font-size: 0.9rem;
            color: var(--text-body);
            word-break: break-all;
        }

        /* Asset list view */
        .asset-list { display: flex; flex-direction: column; gap: 0; }
        .asset-list-row {
            display: grid;
            grid-template-columns: 48px 1fr 120px 100px 80px 36px;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        .asset-list-row:hover { background: var(--hover-subtle); }
        .asset-list-thumb {
            width: 48px; height: 36px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: var(--void-lighter);
            font-size: 1.2rem;
        }
        .asset-list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .asset-list-thumb canvas { width: 100%; height: 100%; object-fit: cover; }
        .asset-list-name {
            font-size: 0.9rem; color: var(--star); font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .asset-list-type { font-size: 0.8rem; color: var(--text-muted); }
        .asset-list-size { font-size: 0.8rem; color: var(--text-muted); font-family: var(--mono); text-align: right; }
        .asset-list-date { font-size: 0.8rem; color: var(--text-muted); font-family: var(--mono); }

        .asset-copy-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 0.9rem;
            padding: 0.2rem; border-radius: var(--radius-sm);
            transition: color 0.2s;
        }
        .asset-copy-btn:hover { color: var(--accent); }

        .asset-view-toggle {
            display: flex; gap: 0; margin-left: auto;
        }
        .asset-view-toggle button {
            padding: 0.3rem 0.6rem;
            background: var(--void-lighter);
            border: 1px solid var(--border-hover);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .asset-view-toggle button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        .asset-view-toggle button:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: none; }
        .asset-view-toggle button.active {
            background: var(--accent-dim); color: var(--accent); border-color: var(--accent);
        }

        /* PDF thumbnail canvas in grid */
        .asset-card-preview canvas {
            width: 100%; height: 100%; object-fit: cover;
        }

        @media (max-width: 768px) {
            .asset-detail { flex-direction: column; }
            .asset-detail-sidebar { width: 100%; }
            .asset-list-row { grid-template-columns: 48px 1fr 80px 36px; }
            .asset-list-type, .asset-list-date { display: none; }
        }

        /* ─── Settings buttons ─── */
        .theme-mode-btn.active,
        .accent-btn.active,
        .font-size-btn.active {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 1px var(--accent);
        }

        .theme-mode-btn:hover,
        .accent-btn:hover,
        .font-size-btn:hover {
            border-color: var(--border-hover) !important;
            opacity: 0.9;
        }

        /* ─── Light theme overrides for elements with hardcoded colours ─── */
        [data-theme="light"] .sidebar {
            box-shadow: var(--shadow-sm);
        }

        [data-theme="light"] .tiptap-editor {
            background: var(--void) !important;
        }

        [data-theme="light"] .content-modal {
            box-shadow: var(--shadow-lg);
        }

        [data-theme="light"] .filter-btn:hover {
            color: var(--star);
        }

        [data-theme="light"] input,
        [data-theme="light"] select,
        [data-theme="light"] textarea {
            color-scheme: light;
        }

        [data-theme="dark"] input,
        [data-theme="dark"] select,
        [data-theme="dark"] textarea {
            color-scheme: dark;
        }

    <script>
    // ─── Markdown config ────────────────────────────────────────

    }

        db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Wire section-based nav

                // Settings now has sub-tabs like other sections

        document.getElementById('todayBtn').addEventListener('click', () => {
            flushDailyIfNeeded();
            // Clear sidebar active state (Today is independent)
            document.querySelectorAll('.nav-item[data-section]').forEach(b => b.classList.remove('active'));
            document.getElementById('subTabs').innerHTML = '';

    // ─── Section definitions ─────────────────────────────────

    const SECTIONS = {
        dashboard: { tabs: [
            { view: 'overview', label: 'Overview' },
        ]},
        content: { tabs: [
            { view: 'articles', label: 'Articles', countKey: 'articles' },

            { view: 'people', label: 'People', countKey: 'people' },
            { view: 'companies', label: 'Companies', countKey: 'companies' },

            { view: 'settings-system', label: 'System' },
        ]},
    };

    let currentSection = 'dashboard';
    let countData = {};

    function flushDailyIfNeeded() {
        if (currentView === 'daily-note' && dailyIsDirty) {
            clearTimeout(dailySaveTimer);

        if (currentView === 'daily-note') destroyDailyEditors();

    function setActiveSection(btn) {
        document.querySelectorAll('.nav-item[data-section]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function navigateToSection(sectionId) {
        const section = SECTIONS[sectionId];
        if (!section) return;

        currentSection = sectionId;

        // Update sidebar active state
        const btn = document.querySelector(`.nav-item[data-section="${sectionId}"]`);
        if (btn) setActiveSection(btn);

        // Render sub-tabs
        const subTabs = document.getElementById('subTabs');
        if (section.tabs.length <= 1) {
            subTabs.innerHTML = '';
        } else {
            subTabs.innerHTML = section.tabs.map((tab, i) => {
                if (tab.href) {
                    return `<a class="sub-tab" href="${tab.href}" style="text-decoration: none;">${tab.label}</a>`;
                }
                const count = tab.countKey && countData[tab.countKey] != null ? ` <span class="count">${countData[tab.countKey]}</span>` : '';
                return `<button class="sub-tab${i === 0 ? ' active' : ''}" data-view="${tab.view}">${tab.label}${count}</button>`;
            }).join('');

            // Wire sub-tab clicks
            subTabs.querySelectorAll('.sub-tab[data-view]').forEach(tab => {
                tab.addEventListener('click', () => {
                    flushDailyIfNeeded();
                    subTabs.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentView = tab.dataset.view;
                    loadView(currentView);
                });
            });
        }

        refreshIcons();

        // Load first tab's view
        const firstTab = section.tabs.find(t => !t.href);
        if (firstTab) {
            currentView = firstTab.view;
            loadView(currentView);
        }
    }

    // ─── Counts ───────────────────────────────────────────────
    async function loadCounts() {
        const [articles, thoughts, signals, reflections, summaries, feedItems, feeds, assets, people, companies, products, projects] = await Promise.all([
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'article'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'thought'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'signal'),
            db.from('content').select('id', { count: 'exact', head: true }).eq('type', 'reflection'),
            db.from('summaries').select('id', { count: 'exact', head: true }),
            db.from('feed_items').select('id', { count: 'exact', head: true }),
            db.from('feeds').select('id', { count: 'exact', head: true }),
            db.from('assets').select('id', { count: 'exact', head: true }),
            db.from('people').select('id', { count: 'exact', head: true }),
            db.from('companies').select('id', { count: 'exact', head: true }),
            db.from('products').select('id', { count: 'exact', head: true }),
            db.from('projects').select('id', { count: 'exact', head: true }),
        ]);

        // Store counts in data object (sub-tabs read from this)
        countData = {
            articles: articles.count || 0,
            thoughts: thoughts.count || 0,
            signals: signals.count || 0,
            reflections: reflections.count || 0,
            summaries: summaries.count || 0,
            feedItems: feedItems.count || 0,
            feeds: feeds.count || 0,
            assets: assets.count || 0,
            people: people.count || 0,
            companies: companies.count || 0,
            products: products.count || 0,
            projects: projects.count || 0,
        };

        document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();

        // Re-render current sub-tabs to update counts
        if (SECTIONS[currentSection] && SECTIONS[currentSection].tabs.length > 1) {
            const subTabs = document.getElementById('subTabs');
            subTabs.querySelectorAll('.sub-tab[data-view]').forEach(tab => {
                const tabDef = SECTIONS[currentSection].tabs.find(t => t.view === tab.dataset.view);
                if (tabDef?.countKey && countData[tabDef.countKey] != null) {
                    let countEl = tab.querySelector('.count');
                    if (!countEl) {
                        countEl = document.createElement('span');
                        countEl.className = 'count';
                        tab.appendChild(countEl);
                    }
                    countEl.textContent = countData[tabDef.countKey];
                }
            });
        }

        // Load all unique tags for autocomplete (across content + assets)
        const [{ data: tagRows }, { data: assetTagRows }] = await Promise.all([
            db.from('content').select('tags'),
            db.from('assets').select('tags'),
        ]);
        const tagSet = new Set();
        (tagRows || []).forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        (assetTagRows || []).forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        allTags = Array.from(tagSet).sort();
    }

    // ─── View router ──────────────────────────────────────────

        if (window.lucide) lucide.createIcons();

        closeContentModal();

    // ─── Overview ─────────────────────────────────────────────
    function navigateToView(view) {

    async function loadOverview() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="loading">Loading overview</div>';

        const now = new Date();
        const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000).toISOString();
        const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
        const yesterdayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1).toISOString();
        const todayDateStr = now.toISOString().split('T')[0];

        const [
            allContent,
            recentContent,
            feedItemCount,
            uncapturedCount,
            peopleCount,
            companiesCount,
            productsCount,
            projectsCount,
            assetsCount,
            dailyNoteToday,
            summariesCount,
        ] = await Promise.all([
            db.from('content').select('id, title, type, tags, source, body, status, captured_at, url, author, metadata'),
            db.from('content').select('id, title, type, tags, source, body, status, captured_at, url, author, metadata')
                .order('captured_at', { ascending: false }).limit(15),
            db.from('feed_items').select('id', { count: 'exact', head: true }),
            db.from('feed_items').select('id', { count: 'exact', head: true }).eq('captured', false),
            db.from('people').select('id', { count: 'exact', head: true }),
            db.from('companies').select('id', { count: 'exact', head: true }),
            db.from('products').select('id', { count: 'exact', head: true }),
            db.from('projects').select('id', { count: 'exact', head: true }),
            db.from('assets').select('id', { count: 'exact', head: true }),
            db.from('daily_notes').select('id').eq('note_date', todayDateStr).maybeSingle(),
            db.from('summaries').select('id', { count: 'exact', head: true }),
        ]);

        const content = allContent.data || [];
        const recent = recentContent.data || [];
        const hasDailyNote = !!dailyNoteToday.data;

        // Counts
        const articles = content.filter(c => c.type === 'article');
        const articlesThisWeek = articles.filter(c => c.captured_at >= weekAgo);
        const thoughtsSignals = content.filter(c => c.type === 'thought' || c.type === 'signal');
        const reflections = content.filter(c => c.type === 'reflection');

        // Tags
        const tagCounts = {};
        content.forEach(c => (c.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
        const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 15);

        // Sources
        const sourceCounts = {};
        articles.forEach(a => { if (a.source) sourceCounts[a.source] = (sourceCounts[a.source] || 0) + 1; });
        const topSources = Object.entries(sourceCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

        // Needs attention
        const STUB = '*Article content could not be extracted';
        const needsAttention = [];
        articles.forEach(a => {
            if (!a.tags || a.tags.length === 0) needsAttention.push({ ...a, reason: 'No tags' });
            else if (a.body && a.body.startsWith(STUB)) needsAttention.push({ ...a, reason: 'No content' });
        });

        // Greeting
        const hour = now.getHours();
        const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        const formattedDate = now.toLocaleDateString('en-GB', dateOptions);

        // Group recent by date
        function dateGroup(iso) {
            if (iso >= todayStart) return 'Today';
            if (iso >= yesterdayStart) return 'Yesterday';
            return 'Earlier this week';
        }

        let activityHtml = '';
        let lastGroup = '';
        for (const item of recent) {
            const group = dateGroup(item.captured_at);
            if (group !== lastGroup) {
                activityHtml += `<div class="date-group">${group}</div>`;
                lastGroup = group;
            }
            activityHtml += `
                <div class="activity-item" data-id="${item.id}">
                    ${item.type === 'article' && item.metadata?.image_url
                        ? (appSettings.showThumbnails
                            ? `<img src="${item.metadata.image_url}" class="article-thumb" loading="lazy" onerror="this.style.display='none'">`
                            : `<span class="type-badge type-${item.type}">${item.type}</span>`)
                        : `<span class="type-badge type-${item.type}">${item.type}</span>`}
                    <span class="activity-title">${esc(item.title)}</span>
                    ${item.source ? `<span class="activity-source">${esc(item.source)}</span>` : ''}
                    <span class="activity-date">${formatDate(item.captured_at)}</span>
                </div>

    async function loadTiptap() {
        if (TiptapCore) return;
        try {
            const TurndownModule = await import('https://esm.sh/turndown@7?bundle');
            window._Turndown = TurndownModule.default || TurndownModule;

            // Import WITHOUT ?bundle so esm.sh deduplicates shared ProseMirror
            // dependencies. With ?bundle, each extension inlines its own copy
            // of ProseMirror, causing "keyed plugin" conflicts across editors.
            [TiptapCore, TiptapStarterKit, TiptapTaskList, TiptapTaskItem, TiptapPlaceholder, TiptapLink] = await Promise.all([
                import('https://esm.sh/@tiptap/core@2'),
                import('https://esm.sh/@tiptap/starter-kit@2'),
                import('https://esm.sh/@tiptap/extension-task-list@2'),
                import('https://esm.sh/@tiptap/extension-task-item@2'),
                import('https://esm.sh/@tiptap/extension-placeholder@2'),
                import('https://esm.sh/@tiptap/extension-link@2'),
            ]);
            TiptapMarkdown = null;
        } catch (err) {
            console.error('Failed to load Tiptap:', err);
            throw err;
        }
    }

    function mdToHtml(md) {
        if (!md || !md.trim()) return '';

        // Split into blocks: task-list lines vs everything else.
        // Task lines are converted directly to Tiptap HTML (bypassing marked entirely).
        // Non-task content goes through marked.parse() as normal.
        const lines = md.split('\n');
        const blocks = [];
        let currentTask = [];
        let currentOther = [];

        for (const line of lines) {
            if (/^\s*- \[[ x>\-]\] /i.test(line)) {
                if (currentOther.length) {
                    blocks.push({ type: 'md', text: currentOther.join('\n') });
                    currentOther = [];
                }
                currentTask.push(line);
            } else {
                if (currentTask.length) {
                    blocks.push({ type: 'tasks', lines: currentTask });
                    currentTask = [];
                }
                currentOther.push(line);
            }
        }
        if (currentTask.length) blocks.push({ type: 'tasks', lines: currentTask });
        if (currentOther.length) blocks.push({ type: 'md', text: currentOther.join('\n') });

        let html = '';
        for (const block of blocks) {
            if (block.type === 'md') {
                html += marked.parse(block.text);
            } else {
                // Build Tiptap task list HTML directly — no marked involved
                html += '<ul data-type="taskList">';
                for (const line of block.lines) {
                    const match = line.match(/^\s*- \[([ x>\-])\] (.*)$/i);
                    if (!match) continue;
                    const marker = match[1];
                    const text = match[2];
                    let checked = 'false';
                    let stateAttr = '';
                    if (marker === 'x' || marker === 'X') checked = 'true';
                    else if (marker === '>') { checked = 'true'; stateAttr = ' data-state="migrated"'; }
                    else if (marker === '-') { checked = 'true'; stateAttr = ' data-state="cancelled"'; }
                    const inlineHtml = marked.parseInline(text);
                    html += '<li data-type="taskItem" data-checked="' + checked + '"' + stateAttr + '><p>' + inlineHtml + '</p></li>';
                }
                html += '</ul>';
            }
        }
        return html;
    }

    function htmlToMd(html) {
        if (!html || !html.trim()) return '';
        if (!window._Turndown) return html;
        const td = new window._Turndown({
            headingStyle: 'atx',
            bulletListMarker: '-',
            codeBlockStyle: 'fenced',
        });
        // Handle tiptap task list items with extended states
        td.addRule('taskItem', {
            filter: function(node) {
                return node.nodeName === 'LI' && node.getAttribute('data-type') === 'taskItem';
            },
            replacement: function(content, node) {
                const checked = node.getAttribute('data-checked') === 'true';
                const state = node.getAttribute('data-state');
                const text = content.replace(/^\n+/, '').replace(/\n+$/, '').trim();
                let marker = '- [ ] ';
                if (state === 'migrated') marker = '- [>] ';
                else if (state === 'cancelled') marker = '- [-] ';
                else if (checked) marker = '- [x] ';
                return marker + text + '\n';
            }
        });
        td.addRule('taskList', {
            filter: function(node) {
                return node.nodeName === 'UL' && node.getAttribute('data-type') === 'taskList';
            },
            replacement: function(content) {
                return '\n' + content + '\n';
            }
        });
        return td.turndown(html);
    }

    function createEditor(element, placeholder, content) {
        const Editor = TiptapCore.Editor || TiptapCore.default?.Editor;
        const StarterKit = TiptapStarterKit.StarterKit || TiptapStarterKit.default;
        const TaskList = TiptapTaskList.TaskList || TiptapTaskList.default;
        const TaskItem = TiptapTaskItem.TaskItem || TiptapTaskItem.default;
        const Placeholder = TiptapPlaceholder.Placeholder || TiptapPlaceholder.default;
        const Link = TiptapLink.Link || TiptapLink.default;

        // Convert markdown content to HTML for Tiptap
        const htmlContent = content ? mdToHtml(content) : '';

        const editor = new Editor({
            element,
            extensions: [
                StarterKit.configure({ heading: { levels: [1, 2, 3] } }),
                TaskList,
                TaskItem.configure({ nested: true }),
                Placeholder.configure({ placeholder }),
                Link.configure({
                    openOnClick: true,
                    autolink: true,
                    linkOnPaste: true,
                    HTMLAttributes: { target: '_blank', rel: 'noopener' },
                }),
            ],
            content: htmlContent,
            onUpdate: () => {
                scheduleDailySave();
                updateSaveStatus('unsaved');
            },
        });

        // Add right-click handler to cycle task states: open → done → migrated → cancelled → open
        element.addEventListener('contextmenu', (e) => {
            const checkbox = e.target.closest('input[type="checkbox"]');
            if (!checkbox) return;
            e.preventDefault();
            const li = checkbox.closest('li[data-type="taskItem"]');
            if (!li) return;

            const currentState = li.getAttribute('data-state');
            const isChecked = li.getAttribute('data-checked') === 'true';

            // Cycle: open → done → migrated → cancelled → open
            if (!isChecked && !currentState) {
                // open → done
                li.setAttribute('data-checked', 'true');
                checkbox.checked = true;
            } else if (isChecked && !currentState) {
                // done → migrated
                li.setAttribute('data-state', 'migrated');
            } else if (currentState === 'migrated') {
                // migrated → cancelled
                li.setAttribute('data-state', 'cancelled');
            } else if (currentState === 'cancelled') {
                // cancelled → open
                li.setAttribute('data-checked', 'false');
                li.removeAttribute('data-state');
                checkbox.checked = false;
            }

            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        return editor;
    }

    function getEditorMarkdown(editor) {
        if (!editor) return '';
        try {
            const html = editor.getHTML();
            if (!html || html === '<p></p>') return '';
            return htmlToMd(html);
        } catch {
            return editor.getText() || '';
        }
    }

    function todayStr() {

    }

    function updateSaveStatus(state, msg) {
        const status = document.getElementById('dailySaveStatus');
        if (!status) return;
        switch (state) {
            case 'unsaved':
                status.textContent = '\u2022 unsaved changes';
                status.className = 'daily-save-status unsaved';
                break;
            case 'saving':
                status.textContent = 'saving...';
                status.className = 'daily-save-status saving';
                break;
            case 'saved':
                status.textContent = 'saved \u2713';
                status.className = 'daily-save-status saved';
                break;
            case 'error':
                status.textContent = msg || 'save failed';
                status.className = 'daily-save-status error';
                break;
            default:
                status.textContent = '';
                status.className = 'daily-save-status';
        }
    }

        if (data?.metadata?.last_reviewed) {
            const btn = document.getElementById('dailyReviewBtn');
            if (btn) {
                btn.textContent = 'Reviewed ✓';
                btn.classList.add('reviewed');
            }

            // Full review_data available (new format)
            if (data.metadata.review_data) {
                displayReviewResults({
                    review: data.metadata.review_data,
                    writes: data.metadata.review_writes || {},
                });
            } else {
                // Old format — reconstruct from available metadata
                const partialReview = {
                    review_summary: data.metadata.review_summary || '',
                    migrated_tasks: data.metadata.migrated_tasks || [],
                    context_notes: data.metadata.context_notes || [],
                };
                displayReviewResults({
                    review: partialReview,
                    writes: data.metadata.review_writes || {},
                });
            }
        }
    }

    async function loadMeetingsWithCalendar(data) {
        meetingCards = [];
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return;
        container.innerHTML = '';

        // 1. Restore saved meeting cards
        const savedMeetings = [];
        if (data?.meetings) {
            let meetings = [];
            try {
                if (data.metadata?.meetings_structured) {
                    meetings = data.metadata.meetings_structured;
                }
            } catch {}

            if (meetings.length > 0) {
                meetings.forEach(m => {
                    savedMeetings.push({ title: m.title || '', notes: m.notes || '', time: m.time || '', fromCalendar: false });
                });
            } else {
                const md = data.meetings;
                const sections = md.split(/^## /gm).filter(s => s.trim());
                if (sections.length > 0 && md.includes('## ')) {
                    sections.forEach(section => {
                        const lines = section.split('\n');
                        const title = lines[0].trim();
                        const notes = lines.slice(1).join('\n').trim();
                        savedMeetings.push({ title, notes, fromCalendar: false });
                    });
                } else if (md.trim()) {
                    savedMeetings.push({ title: '', notes: md, fromCalendar: false });
                }
            }
        }

        // 2. Fetch calendar events from Supabase (synced by capture-bot on Railway)
        let calendarEvents = [];
        try {
            const { data: calData } = await db
                .from('calendar_events')
                .select('*')
                .eq('event_date', dailyNoteDate)
                .order('start_time', { ascending: true });

            if (calData && calData.length > 0) {
                calendarEvents = calData.map(e => ({
                    uid: e.uid,
                    title: e.title,
                    startTime: e.start_time,
                    endTime: e.end_time,
                    allDay: e.all_day,
                    location: e.location,
                    organizer: e.organizer,
                    attendees: e.attendees || [],
                }));
                // Calendar events loaded for date
            }
        } catch (err) {
            console.warn('Calendar fetch failed:', err);
        }

        // 3. Create cards for saved meetings (collapsed by default)
        for (const m of savedMeetings) {
            await addMeetingCard(m.title, m.notes, { time: m.time || '' });
        }

        // 4. Add calendar events that don't already have a matching card
        const existingTitles = new Set(savedMeetings.map(m => m.title.toLowerCase().trim()));

        // Merge calendar events with saved meetings

        for (const evt of calendarEvents) {
            const title = evt.title || '';
            // Skip if we already have a card with a similar title
            if (existingTitles.has(title.toLowerCase().trim())) continue;

            // Build time string for header
            let timeStr = '';
            if (evt.startTime && evt.endTime) {
                timeStr = `${evt.startTime}-${evt.endTime}`;
            } else if (evt.startTime) {
                timeStr = evt.startTime;
            } else if (evt.allDay) {
                timeStr = 'All day';
            }

            // Build pre-populated note with meeting details
            let prefill = '';
            if (evt.location) {
                prefill += `*${evt.location}*\n\n`;
            }
            if (evt.attendees && evt.attendees.length > 0) {
                prefill += `Attendees: ${evt.attendees.slice(0, 8).join(', ')}\n\n`;
            }

            await addMeetingCard(title, prefill, { time: timeStr });
            existingTitles.add(title.toLowerCase().trim());
        }

    }

    function addMeetingCard(title, content, options = {}) {
        const container = document.getElementById('meetingCardsContainer');
        if (!container) return Promise.resolve();

        const id = ++meetingIdCounter;
        const startExpanded = options.expanded || false;
        const timeStr = options.time || '';
        const hasContent = !!(content && content.trim());

        const cardEl = document.createElement('div');
        cardEl.className = 'meeting-card' + (startExpanded ? ' expanded' : '');
        cardEl.id = `meeting-card-${id}`;

        const safeTitle = (title || '').replace(/"/g, '&quot;');

        const safeTime = (timeStr || '').replace(/"/g, '&quot;');

        cardEl.innerHTML = `
            <div class="meeting-card-header" data-meeting-id="${id}">
                <span class="meeting-card-chevron">&#x25B8;</span>
                ${timeStr ? `<span class="meeting-card-time">${timeStr}</span>` : ''}
                <span class="meeting-card-title-display">${title || 'Untitled Meeting'}</span>
                <span class="meeting-card-indicator ${hasContent ? 'has-notes' : ''}" id="meetingIndicator-${id}">\u25CF</span>
                <div class="meeting-card-move-btns">
                    <button class="meeting-move-btn" data-dir="up" data-meeting-id="${id}" title="Move up">\u25B2</button>
                    <button class="meeting-move-btn" data-dir="down" data-meeting-id="${id}" title="Move down">\u25BC</button>
                </div>
                <button class="meeting-card-remove" data-meeting-id="${id}" title="Remove meeting">\u00d7</button>
            </div>
            <div class="meeting-card-expanded-content">
                <div class="meeting-card-meta-row">
                    <input type="text" class="meeting-card-title-input" placeholder="Meeting title..." value="${safeTitle}" data-meeting-id="${id}">
                    <input type="text" class="meeting-card-time-input" placeholder="e.g. 09:00-10:00" value="${safeTime}" data-meeting-id="${id}">
                </div>
                <div class="daily-toolbar" id="meetingToolbar-${id}"></div>
                <div class="daily-editor-wrap" id="meetingEditor-${id}"></div>
            </div>
        `;

        // Manually added cards go to top, loaded/calendar cards go to bottom
        if (startExpanded) {
            container.prepend(cardEl);
        } else {
            container.appendChild(cardEl);
        }

        // Wire header click to toggle (ignore clicks on buttons)
        cardEl.querySelector('.meeting-card-header').addEventListener('click', (e) => {
            if (e.target.closest('.meeting-card-remove') || e.target.closest('.meeting-move-btn')) return;
            toggleMeetingCard(id);
        });

        // Wire remove button
        cardEl.querySelector('.meeting-card-remove').onclick = (e) => {
            e.stopPropagation();
            removeMeetingCard(id);
        };

        // Wire move buttons
        cardEl.querySelectorAll('.meeting-move-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                moveMeetingCard(id, btn.dataset.dir);
            });
        });

        // Wire title input to update display title and trigger save
        cardEl.querySelector('.meeting-card-title-input').addEventListener('input', (e) => {
            const displayEl = cardEl.querySelector('.meeting-card-title-display');
            if (displayEl) displayEl.textContent = e.target.value || 'Untitled Meeting';
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Wire time input to update header time and trigger save
        cardEl.querySelector('.meeting-card-time-input').addEventListener('input', (e) => {
            const headerTimeEl = cardEl.querySelector('.meeting-card-time');
            const mc = meetingCards.find(m => m.id === id);
            if (mc) mc.time = e.target.value.trim();
            if (headerTimeEl) {
                headerTimeEl.textContent = e.target.value.trim();
            } else if (e.target.value.trim()) {
                // Add time span to header if it didn't have one
                const chevron = cardEl.querySelector('.meeting-card-chevron');
                if (chevron) {
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'meeting-card-time';
                    timeSpan.textContent = e.target.value.trim();
                    chevron.after(timeSpan);
                }
            }
            scheduleDailySave();
            updateSaveStatus('unsaved');
        });

        // Store card reference (editor created lazily on first expand)
        if (startExpanded) {
            meetingCards.unshift({ id, editor: null, content: content || '', time: timeStr });
        } else {
            meetingCards.push({ id, editor: null, content: content || '', time: timeStr });
        }

        // If starting expanded, init editor immediately
        if (startExpanded) {
            return initMeetingEditor(id);
        }
        return Promise.resolve();
    }

    function toggleMeetingCard(id) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (!cardEl) return;

        const isExpanded = cardEl.classList.toggle('expanded');

        if (isExpanded) {
            // Lazy init editor on first expand
            const mc = meetingCards.find(m => m.id === id);
            if (mc && !mc.editor) {
                initMeetingEditor(id);
            }
        } else {
            // Update has-notes indicator when collapsing
            updateMeetingIndicator(id);
        }
    }

    function initMeetingEditor(id) {
        return new Promise(resolve => {
            requestAnimationFrame(() => {
                const editorEl = document.getElementById(`meetingEditor-${id}`);
                if (!editorEl) { resolve(); return; }

                const mc = meetingCards.find(m => m.id === id);
                if (!mc || mc.editor) { resolve(); return; }

                const editor = createEditor(editorEl, 'Meeting notes...', mc.content || '');
                mc.editor = editor;

                requestAnimationFrame(() => {
                    buildToolbar(`meetingToolbar-${id}`, editor);
                    resolve();
                });
            });
        });
    }

    function updateMeetingIndicator(id) {
        const mc = meetingCards.find(m => m.id === id);
        const indicator = document.getElementById(`meetingIndicator-${id}`);
        if (!mc || !indicator) return;

        const hasNotes = mc.editor ? !!(getEditorMarkdown(mc.editor).trim()) : !!(mc.content && mc.content.trim());
        indicator.classList.toggle('has-notes', hasNotes);
    }

    function moveMeetingCard(id, direction) {
        const cardEl = document.getElementById(`meeting-card-${id}`);
        const container = document.getElementById('meetingCardsContainer');
        if (!cardEl || !container) return;

        if (direction === 'up' && cardEl.previousElementSibling) {
            container.insertBefore(cardEl, cardEl.previousElementSibling);
        } else if (direction === 'down' && cardEl.nextElementSibling) {
            container.insertBefore(cardEl, cardEl.nextElementSibling.nextSibling);
        } else {
            return; // Can't move further
        }

        // Sync the meetingCards array to match new DOM order
        const newOrder = [];
        container.querySelectorAll('.meeting-card').forEach(el => {
            const idMatch = el.id.match(/meeting-card-(\d+)/);
            if (idMatch) {
                const mcId = parseInt(idMatch[1]);
                const mc = meetingCards.find(m => m.id === mcId);
                if (mc) newOrder.push(mc);
            }
        });
        meetingCards = newOrder;
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function removeMeetingCard(id) {
        const idx = meetingCards.findIndex(mc => mc.id === id);
        if (idx !== -1) {
            meetingCards[idx].editor?.destroy();
            meetingCards.splice(idx, 1);
        }
        const cardEl = document.getElementById(`meeting-card-${id}`);
        if (cardEl) cardEl.remove();
        scheduleDailySave();
        updateSaveStatus('unsaved');
    }

    function getMeetingsData() {
        // Collect structured meeting data
        const structured = meetingCards.map(mc => {
            const titleEl = document.querySelector(`.meeting-card-title-input[data-meeting-id="${mc.id}"]`);
            const notes = mc.editor ? getEditorMarkdown(mc.editor) : (mc.content || '');
            return {
                title: titleEl?.value?.trim() || '',
                notes: notes,
                time: mc.time || '',
            };
        }).filter(m => m.title || m.notes);

        // Also build a combined markdown string for the meetings column (backward compatible)
        const markdown = structured.map(m => {
            const heading = m.title ? `## ${m.title}\n\n` : '';
            return heading + m.notes;
        }).join('\n\n---\n\n');

        return { markdown, structured };
    }

    function buildToolbar(containerId, editor, mode = 'full') {
        const container = document.getElementById(containerId);
        if (!container || !editor) return;

        const allButtons = {
            bold: { label: 'B', cmd: () => editor.chain().focus().toggleBold().run(), active: () => editor.isActive('bold'), title: 'Bold (Cmd+B)' },
            italic: { label: 'I', cmd: () => editor.chain().focus().toggleItalic().run(), active: () => editor.isActive('italic'), title: 'Italic (Cmd+I)' },
            h1: { label: 'H1', cmd: () => editor.chain().focus().toggleHeading({ level: 1 }).run(), active: () => editor.isActive('heading', { level: 1 }), title: 'Heading 1' },
            h2: { label: 'H2', cmd: () => editor.chain().focus().toggleHeading({ level: 2 }).run(), active: () => editor.isActive('heading', { level: 2 }), title: 'Heading 2' },
            h3: { label: 'H3', cmd: () => editor.chain().focus().toggleHeading({ level: 3 }).run(), active: () => editor.isActive('heading', { level: 3 }), title: 'Heading 3' },
            bullet: { label: '\u2022', cmd: () => editor.chain().focus().toggleBulletList().run(), active: () => editor.isActive('bulletList'), title: 'Bullet list' },
            ordered: { label: '1.', cmd: () => editor.chain().focus().toggleOrderedList().run(), active: () => editor.isActive('orderedList'), title: 'Numbered list' },
            task: { label: '\u2610', cmd: () => editor.chain().focus().toggleTaskList().run(), active: () => editor.isActive('taskList'), title: 'Task list' },
            quote: { label: '\u275D', cmd: () => editor.chain().focus().toggleBlockquote().run(), active: () => editor.isActive('blockquote'), title: 'Quote' },
            sep: { type: 'sep' },
        };

        const layouts = {
            tasks: [allButtons.task, allButtons.sep, allButtons.bold, allButtons.italic],
            full: [allButtons.bold, allButtons.italic, allButtons.sep, allButtons.h1, allButtons.h2, allButtons.h3, allButtons.sep, allButtons.bullet, allButtons.ordered, allButtons.task, allButtons.quote],
        };

        const buttons = layouts[mode] || layouts.full;

        container.innerHTML = buttons.map((b, i) =>
            b.type === 'sep'
                ? '<span class="daily-toolbar-sep"></span>'
                : `<button title="${b.title}" data-idx="${i}">${b.label}</button>`
        ).join('');

        container.querySelectorAll('button[data-idx]').forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.cmd) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    b.cmd();
                });
            }
        });

        editor.on('selectionUpdate', () => updateToolbarActive(container, buttons));
        editor.on('update', () => updateToolbarActive(container, buttons));
    }

    function updateToolbarActive(container, buttons) {
        const btns = container.querySelectorAll('button[data-idx]');
        btns.forEach(btn => {
            const b = buttons[parseInt(btn.dataset.idx)];
            if (b && b.active) btn.classList.toggle('is-active', b.active());
        });
    }

    function scheduleDailySave() {
        dailyIsDirty = true;
        if (dailySaveTimer) clearTimeout(dailySaveTimer);
        dailySaveTimer = setTimeout(saveDailyNote, 1000);
    }

    async function saveDailyNote() {
        if (!dailyNoteDate) return;

        updateSaveStatus('saving');

        const meetingsData = getMeetingsData();

        const payload = {
            note_date: dailyNoteDate,
            tasks: getEditorMarkdown(dailyEditors.tasks),
            notes: getEditorMarkdown(dailyEditors.notes),
            meetings: meetingsData.markdown,
            metadata: {
                meetings_structured: meetingsData.structured,
                stoic_challenge: {
                    frustration: document.getElementById('stoicFrustration')?.value || '',
                    reframe: document.getElementById('stoicReframe')?.value || '',
                    opportunity: document.getElementById('stoicOpportunity')?.value || '',
                },
            },
        };

        try {
            const res = await fetch('/api/daily-notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error(await res.text());

            const result = await res.json();
            dailyNoteId = result.daily_note?.id || dailyNoteId;
            dailyIsDirty = false;
            updateSaveStatus('saved');
        } catch (err) {
            updateSaveStatus('error', 'save failed — retry in 5s');
            console.error('Daily note save failed:', err);
            // Auto-retry once after 5 seconds
            setTimeout(() => { if (dailyIsDirty) saveDailyNote(); }, 5000);
        }
    }

    async function runDailyReview() {
        if (!dailyNoteDate) return;

        const btn = document.getElementById('dailyReviewBtn');
        if (!btn || btn.classList.contains('reviewing')) return;

        // Save current note first
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            await saveDailyNote();
        }

        btn.textContent = 'Reviewing...';
        btn.classList.add('reviewing');

        try {
            const res = await fetch('/api/daily-review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ note_date: dailyNoteDate }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: 'Unknown error' }));
                throw new Error(err.detail || err.error || 'Review failed');
            }

            const result = await res.json();
            btn.textContent = 'Reviewed ✓';
            btn.classList.remove('reviewing');
            btn.classList.add('reviewed');

            // Display results
            displayReviewResults(result);

        } catch (err) {
            btn.textContent = 'Review Day';
            btn.classList.remove('reviewing');
            console.error('Daily review failed:', err);
            alert('Review failed: ' + err.message);
        }
    }

    }

    function navigateToEntity(view, name) {
        // Navigate to the entity view and highlight/scroll to the named entity
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`[data-view="${view}"]`);
        if (navBtn) navBtn.classList.add('active');
        currentView = view;
        loadView(view);
        // After load, try to find and highlight the entity
        setTimeout(() => {
            const rows = document.querySelectorAll('.expandable');
            for (const row of rows) {
                if (row.textContent.toLowerCase().includes(name.toLowerCase())) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.style.background = 'var(--accent-dim)';
                    setTimeout(() => row.style.background = '', 2000);
                    break;
                }
            }
        }, 500);
    }

    function displayReviewResults(result) {
        const review = result.review || {};
        const writes = result.writes || {};

        // Remove existing results if any
        const existing = document.getElementById('reviewResults');
        if (existing) existing.remove();

        const container = document.createElement('div');
        container.className = 'review-results';
        container.id = 'reviewResults';

        let html = `
            <div class="review-results-header">
                <span>AI Review Complete</span>
            </div>
            <div class="review-results-body">
        `;

        // Summary
        if (review.review_summary) {
            html += `<div class="review-section">
                <div class="review-summary">${review.review_summary}</div>
            </div>`;
        }

        // Stats
        html += `<div class="review-stats">`;
        if (writes.people_log) html += `<span class="review-stat"><strong>${writes.people_log}</strong> people entries</span>`;
        if (writes.product_evidence) html += `<span class="review-stat"><strong>${writes.product_evidence}</strong> product evidence</span>`;
        if (writes.product_decisions) html += `<span class="review-stat"><strong>${writes.product_decisions}</strong> decisions</span>`;
        if (writes.project_updates) html += `<span class="review-stat"><strong>${writes.project_updates}</strong> project updates</span>`;
        if (writes.reflections) html += `<span class="review-stat"><strong>${writes.reflections}</strong> reflections</span>`;
        html += `</div>`;

        // People entries
        if (review.people_entries?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">People (${review.people_entries.length})</div>`;
            for (const e of review.people_entries) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('contacts', '${e.person_name}')">${e.person_name}:</a> ${e.entry}</div>`;
            }
            html += `</div>`;
        }

        // Product evidence
        if (review.product_evidence?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Product Evidence (${review.product_evidence.length})</div>`;
            for (const e of review.product_evidence) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('products', '${e.product_name}')">${e.product_name}:</a> ${e.evidence}</div>`;
            }
            html += `</div>`;
        }

        // Decisions
        if (review.product_decisions?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Decisions (${review.product_decisions.length})</div>`;
            for (const e of review.product_decisions) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('products', '${e.product_name || 'General'}')">${e.product_name || 'General'}:</a> ${e.decision}</div>`;
            }
            html += `</div>`;
        }

        // Project updates
        if (review.project_updates?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Project Updates (${review.project_updates.length})</div>`;
            for (const e of review.project_updates) {
                html += `<div class="review-item"><a class="review-entity-link" onclick="navigateToEntity('projects', '${e.project_name}')">${e.project_name}:</a> ${e.update}</div>`;
            }
            html += `</div>`;
        }

        // Reflections
        if (review.reflections?.length) {
            html += `<div class="review-section">
                <div class="review-section-title">Reflections (${review.reflections.length})</div>`;
            for (const e of review.reflections) {
                html += `<div class="review-item">
                    <div>${e.observation}</div>
                    ${e.coach_perspective ? `<div style="margin-top: 0.3rem; color: var(--text-muted); font-style: italic;">Coach: ${e.coach_perspective}</div>` : ''}
                </div>`;
            }
            html += `</div>`;
        }

        html += `</div>`;
        container.innerHTML = html;

        // Append after the daily sections
        const sections = document.getElementById('dailySections');
        if (sections) {
            sections.parentNode.insertBefore(container, sections.nextSibling);
        }
    }

    function navigateDailyNote(offset) {
        if (dailyIsDirty) {
            clearTimeout(dailySaveTimer);
            saveDailyNote();
        }
        destroyDailyEditors();

        const d = new Date(dailyNoteDate + 'T12:00:00');
        d.setDate(d.getDate() + offset);
        const newDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        loadDailyNote(newDate);
    }

    function openDailyDatePicker() {
        const input = document.createElement('input');
        input.type = 'date';
        input.value = dailyNoteDate;
        input.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
        document.body.appendChild(input);

        input.addEventListener('change', () => {
            if (input.value) {
                if (dailyIsDirty) {
                    clearTimeout(dailySaveTimer);
                    saveDailyNote();
                }
                destroyDailyEditors();
                loadDailyNote(input.value);
            }
            input.remove();
        });
        input.addEventListener('blur', () => setTimeout(() => input.remove(), 200));

        try { input.showPicker(); } catch { input.click(); }
    }

    // ─── Articles ─────────────────────────────────────────────
    async function fetchArticles() {
        const f = articleFilters;
        const from = (f.page - 1) * ARTICLES_PER_PAGE;
        const to = from + ARTICLES_PER_PAGE - 1;

        let query = db.from('content')
            .select('id, title, type, url, source, author, tags, status, captured_at, body, metadata', { count: 'exact' })
            .eq('type', 'article')
            .order('captured_at', { ascending: false })
            .range(from, to);

        if (f.status) query = query.eq('status', f.status);
        if (f.source) query = query.eq('source', f.source);
        if (f.tag) query = query.contains('tags', [f.tag]);
        if (f.dateRange) {
            const d = new Date();
            d.setDate(d.getDate() - f.dateRange);
            query = query.gte('captured_at', d.toISOString());
        }

        const { data, count, error } = await query;
        return { data, count, error };
    }

    async function loadArticleFilterOptions() {
        if (articleSources.length && articleTopTags.length) return;

        // Fetch unique sources
        const { data: srcData } = await db.from('content')
            .select('source')
            .eq('type', 'article')
            .not('source', 'is', null)
            .order('source');
        const srcSet = new Set();
        (srcData || []).forEach(r => { if (r.source) srcSet.add(r.source); });
        articleSources = [...srcSet].sort();

        // Fetch top tags via all articles' tags arrays
        const { data: tagData } = await db.from('content')
            .select('tags')
            .eq('type', 'article')
            .not('tags', 'is', null);
        const tagCounts = {};
        (tagData || []).forEach(r => (r.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
        articleTopTags = Object.entries(tagCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 30)
            .map(([tag, count]) => ({ tag, count }));
    }

    function populateArticleDropdowns() {
        const srcSel = document.getElementById('articleSourceFilter');
        const tagSel = document.getElementById('articleTagFilter');
        if (!srcSel || !tagSel) return;

        srcSel.innerHTML = '<option value="">All sources</option>' +
            articleSources.map(s => `<option value="${esc(s)}"${articleFilters.source === s ? ' selected' : ''}>${esc(s)}</option>`).join('');
        tagSel.innerHTML = '<option value="">All tags</option>' +
            articleTopTags.map(t => `<option value="${esc(t.tag)}"${articleFilters.tag === t.tag ? ' selected' : ''}>${esc(t.tag)} (${t.count})</option>`).join('');
    }

    function updateArticlesCount() {
        const el = document.getElementById('articlesCount');
        if (!el) return;
        if (articlesTotalCount === 0) { el.textContent = 'No articles'; return; }
        const from = (articleFilters.page - 1) * ARTICLES_PER_PAGE + 1;
        const to = Math.min(articleFilters.page * ARTICLES_PER_PAGE, articlesTotalCount);
        el.textContent = `Showing ${from}\u2013${to} of ${articlesTotalCount}`;
    }

    function updatePagination(totalPages) {
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        const info = document.getElementById('articlePageInfo');
        if (!prev || !next || !info) return;
        prev.disabled = articleFilters.page <= 1;
        next.disabled = articleFilters.page >= totalPages;
        info.textContent = totalPages > 0 ? `Page ${articleFilters.page} of ${totalPages}` : '';
    }

    async function reloadArticles() {
        const tbody = document.getElementById('articlesBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading...</td></tr>';

        const { data, count, error } = await fetchArticles();
        if (error) {
            if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--red)">Error: ${esc(error.message)}</td></tr>`;
            return;
        }

        articlesData = data || [];
        articlesTotalCount = count || 0;
        const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);

        renderArticleRows(articlesData);
        updateArticlesCount();
        updatePagination(totalPages);
    }

    function wireArticleFilterEvents() {
        // Status buttons
        document.querySelectorAll('.article-status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-status-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.status = btn.dataset.status || null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Date range buttons
        document.querySelectorAll('.article-date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.article-date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                articleFilters.dateRange = btn.dataset.days ? parseInt(btn.dataset.days) : null;
                articleFilters.page = 1;
                reloadArticles();
            });
        });

        // Source dropdown
        const srcSel = document.getElementById('articleSourceFilter');
        if (srcSel) srcSel.addEventListener('change', () => {
            articleFilters.source = srcSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Tag dropdown
        const tagSel = document.getElementById('articleTagFilter');
        if (tagSel) tagSel.addEventListener('change', () => {
            articleFilters.tag = tagSel.value || null;
            articleFilters.page = 1;
            reloadArticles();
        });

        // Pagination
        const prev = document.getElementById('articlePrev');
        const next = document.getElementById('articleNext');
        if (prev) prev.addEventListener('click', () => { if (articleFilters.page > 1) { articleFilters.page--; reloadArticles(); } });
        if (next) next.addEventListener('click', () => {
            const totalPages = Math.ceil(articlesTotalCount / ARTICLES_PER_PAGE);
            if (articleFilters.page < totalPages) { articleFilters.page++; reloadArticles(); }
        });

        // Client-side search on current page
        const search = document.getElementById('searchArticles');
        if (search) search.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            if (!q) { renderArticleRows(articlesData); return; }
            const filtered = articlesData.filter(a =>
                a.title.toLowerCase().includes(q) ||
                (a.source || '').toLowerCase().includes(q) ||
                (a.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderArticleRows(filtered);
        });
    }

    async function loadArticles() {
        const main = document.getElementById('mainContent');

        const [_, result] = await Promise.all([

        articlesTotalCount = result.count || 0;

        const statusAll = !articleFilters.status;
        const dateAll = !articleFilters.dateRange;

        main.innerHTML = `
            <div class="page-header">
                <h2 class="page-title">Articles</h2>
                <span class="articles-count" id="articlesCount"></span>
                <input type="text" class="search-input" placeholder="Search this page..." id="searchArticles">
            </div>
            <div class="filters">
                <div class="filter-group">
                    <button class="filter-btn article-status-btn${statusAll ? ' active' : ''}" data-status="">All</button>
                    <button class="filter-btn article-status-btn${articleFilters.status === 'new' ? ' active' : ''}" data-status="new">New</button>
                    <button class="filter-btn article-status-btn${articleFilters.status === 'read' ? ' active' : ''}" data-status="read">Read</button>
                    <button class="filter-btn article-status-btn${articleFilters.status === 'archived' ? ' active' : ''}" data-status="archived">Archived</button>
                </div>
                <div class="filter-group">
                    <button class="filter-btn article-date-btn${dateAll ? ' active' : ''}" data-days="">All time</button>

                    <button class="filter-btn article-date-btn${articleFilters.dateRange === 30 ? ' active' : ''}" data-days="30">30d</button>
                    <button class="filter-btn article-date-btn${articleFilters.dateRange === 90 ? ' active' : ''}" data-days="90">90d</button>
                </div>
                <select class="filter-select" id="articleSourceFilter"><option value="">All sources</option></select>
                <select class="filter-select" id="articleTagFilter"><option value="">All tags</option></select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Source</th>
                            <th>Tags</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="articlesBody"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="articlePrev" disabled>&larr; Prev</button>
                <span class="pagination-info" id="articlePageInfo"></span>
                <button id="articleNext"${totalPages <= 1 ? ' disabled' : ''}>Next &rarr;</button>
            </div>
        `;

        populateArticleDropdowns();
        renderArticleRows(articlesData);
        updateArticlesCount();
        updatePagination(totalPages);
        wireArticleFilterEvents();
    }

    function renderArticleRows(data) {
        const tbody = document.getElementById('articlesBody');
        tbody.innerHTML = data.map(a => `
            <tr class="expandable" data-id="${a.id}">
                <td class="title-cell"${appSettings.showThumbnails ? ' style="display: flex; align-items: center; gap: 0.5rem;"' : ''}>
                    ${appSettings.showThumbnails
                        ? (a.metadata?.image_url
                            ? `<img src="${a.metadata.image_url}" class="article-thumb" loading="lazy" onerror="this.style.display='none'">`
                            : `<span class="article-thumb-placeholder">${icon('file-text')}</span>`)
                        : ''}
                    <div>
                        <div class="title-text">${esc(a.title)}</div>
                        ${a.url ? `<a class="title-url" href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(truncUrl(a.url))}</a>` : ''}
                    </div>
                </td>
                <td class="source-cell">${esc(a.source || '-')}</td>
                <td>${(a.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
                <td class="date-cell">${formatDate(a.captured_at)}</td>
                <td><span class="status-dot status-${a.status}"></span>${a.status}</td>
            </tr>

        // Click to open modal
        tbody.querySelectorAll('tr.expandable').forEach(row => {
            row.addEventListener('click', () => {
                const item = data.find(a => a.id === row.dataset.id);
                if (item) openContentModal(item);
            });
        });
    }

    // ─── Thoughts ──────────────────────────────────────────────

            <div class="page-header">

            </div>
            <div class="table-wrap">

                        <tr><th>Title</th><th>Type</th><th>Tags</th><th>Date</th></tr>
                    </thead>
                    <tbody id="thoughtsBody"></tbody>
